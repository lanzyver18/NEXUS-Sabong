<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | NEXUS PRO</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --green: #00ff88; --red: #ff4444; }
        body { background: #000; color: #fff; overflow-x: hidden; }
        
        .top-nav { position: relative; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px 12px 75px; background: #000; border-bottom: 2px solid #222; }

        .profile-container { max-width: 480px; margin: 40px auto; padding: 0 20px 100px; }
        
        .profile-header { text-align: center; padding: 40px 0; border-radius: 24px; background: radial-gradient(circle at top, #111, #000); border: 1px solid #222; margin-bottom: 25px; position: relative; overflow: hidden; }
        .profile-header::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--gold); box-shadow: 0 0 15px var(--gold); }

        .avatar-circle { width: 90px; height: 90px; background: var(--gold); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; margin: 0 auto 15px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); border: 4px solid #000; }
        
        .badge-role { font-size: 0.65rem; background: rgba(212, 175, 55, 0.1); color: var(--gold); padding: 5px 14px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.3); display: inline-block; font-family: 'Goldman'; letter-spacing: 1px; margin-top: 10px; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .stat-card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; border-radius: 14px; text-align: center; }
        .stat-card label { display: block; font-size: 0.55rem; color: #444; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; }
        .stat-card span { font-family: 'Goldman'; color: var(--gold); font-size: 1rem; }

        .menu-group-label { margin: 25px 0 10px; color: #333; font-size: 0.65rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; padding-left: 5px; }
        .menu-item { display: flex; align-items: center; justify-content: space-between; padding: 18px; background: #080808; border-radius: 14px; margin-bottom: 10px; text-decoration: none; color: #eee; transition: 0.3s; border: 1px solid #111; font-size: 0.85rem; }
        .menu-item:hover { border-color: var(--gold); transform: translateX(5px); background: #0c0c0c; }
        .menu-item span:last-child { color: var(--gold); font-family: 'Goldman'; opacity: 0.5; }

        .btn-logout { width: 100%; margin-top: 40px; background: #000; color: var(--red); border: 1px solid var(--red); padding: 18px; border-radius: 14px; font-weight: bold; cursor: pointer; font-family: 'Goldman'; letter-spacing: 2px; transition: 0.3s; opacity: 0.7; }
        .btn-logout:hover { opacity: 1; background: rgba(255, 68, 68, 0.05); }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo" style="color:var(--gold); font-family:'Goldman'; font-weight:bold; font-size:1.2rem; letter-spacing:2px;">NEXUS</div>
        <div style="color: var(--green); font-weight: bold; font-family: 'Goldman';">₱<span id="display-balance">0.00</span></div>
    </nav>

    <div class="profile-container">
        
        <div class="profile-header">
            <div class="avatar-circle" id="user-initial">-</div>
            <h2 id="display-username" style="margin: 0; letter-spacing: 2px; font-family: 'Goldman';">SYNCING...</h2>
            <div id="role-badge-container"><span class="badge-role">VERIFYING...</span></div>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <label>Member Since</label>
                <span id="join-date" style="font-size: 0.8rem;">--/--/--</span>
            </div>
            <div class="stat-card">
                <label>Security Status</label>
                <span style="color:var(--green); font-size: 0.8rem;">ENCRYPTED</span>
            </div>
            <div class="stat-card">
                <label>Current Tier</label>
                <span id="level-display">NODE --</span>
            </div>
            <div class="stat-card">
                <label>Active Bonus</label>
                <span id="bonus-rate">0.00%</span>
            </div>
        </div>

        <div class="menu-list">
            <div class="menu-group-label">Financial Services</div>
            <a href="/wallet/" class="menu-item">
                <span>Vault & Liquidation</span>
                <span>EXECUTE →</span>
            </a>
            <a href="/history/wallet.html" class="menu-item">
                <span>Audit Trails</span>
                <span>VIEW →</span>
            </a>

            <div id="management-section" style="display:none;">
                <div class="menu-group-label">Hierarchy Protocol</div>
                <a href="/admin/index.html" id="admin-link" class="menu-item" style="border-color: var(--gold);">
                    <span id="mng-text">Management Console</span>
                    <span>ACCESS →</span>
                </a>
            </div>

            <button class="btn-logout" id="btn-logout">TERMINATE SESSION</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
        import { injectMenu } from "/menu.js";

        const firebaseConfig = { apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q", authDomain: "nexus-sabong.firebaseapp.com", projectId: "nexus-sabong", storageBucket: "nexus-sabong.firebasestorage.app", messagingSenderId: "421723311", appId: "1:421723311:web:1780f179e7c2a7cc0e285a" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        injectMenu();

        // NEXUS SELF-HEALING PROTOCOL
        async function checkSystemIntegrity(user) {
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            
            // If the database was wiped and user has no Firestore doc, recreate it as Level 6 (Player)
            // If it's your Admin email, you can manually change this to level 1 in Firestore console once
            if (!snap.exists()) {
                console.log("Nexus: Initializing fresh node...");
                await setDoc(userRef, {
                    username: user.email.split('@')[0],
                    level: 6,
                    role: "PLAYER",
                    balance: 100,
                    commissionRate: 0,
                    uplinePath: [],
                    totalCommission: 0,
                    totalTurnover: 0,
                    createdAt: serverTimestamp()
                });
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await checkSystemIntegrity(user);
                const userRef = doc(db, "users", user.uid);
                
                onSnapshot(userRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        const username = data.username || "Player";
                        const level = data.level || 7;
                        const role = data.role || "PLAYER";

                        document.getElementById('display-username').innerText = username.toUpperCase();
                        document.getElementById('user-initial').innerText = username.charAt(0).toUpperCase();
                        document.getElementById('level-display').innerText = `NODE ${level}`;
                        document.getElementById('bonus-rate').innerText = `${(data.commissionRate || 0).toFixed(2)}%`;
                        document.getElementById('role-badge-container').innerHTML = `<span class="badge-role">${role.replace('_', ' ')}</span>`;
                        document.getElementById('display-balance').innerText = (data.balance || 0).toLocaleString(undefined, {minimumFractionDigits: 2});
                        
                        if (data.createdAt) {
                            document.getElementById('join-date').innerText = data.createdAt.toDate().toLocaleDateString();
                        }

                        // Hierarchy Logic
                        if (level <= 5) {
                            document.getElementById('management-section').style.display = "block";
                            const mngText = document.getElementById('mng-text');
                            const adminLink = document.getElementById('admin-link');
                            
                            if (level === 1) {
                                mngText.innerText = "System Command Center";
                                adminLink.href = "/admin/index.html";
                            } else {
                                mngText.innerText = "Network Manager";
                                adminLink.href = "/admin/agents.html";
                            }
                        }
                    }
                });
            } else { window.location.href = "/login/"; }
        });

        document.getElementById('btn-logout').onclick = () => {
            if(confirm("TERMINATE NEXUS SESSION?")) {
                signOut(auth).then(() => window.location.href = "/login/");
            }
        };
    </script>
</body>
</html>
