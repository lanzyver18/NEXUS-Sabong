<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS Casino | The High Life</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --platinum: #e5e5e5;
            --dark-card: #1c1c1c;
            --brushed-metal: linear-gradient(145deg, #1c1c1c, #2a2a2a);
            --gold-glow: 0 0 25px rgba(212, 175, 55, 0.4);
        }

        /* BACKGROUND & TEXTURE */
        body {
            background-color: #030303;
            background-image: 
                linear-gradient(rgba(10,10,10,0.9), rgba(0,0,0,0.95)),
                url('https://www.transparenttextures.com/patterns/dark-circles.png'); /* Subtle texture */
            margin: 0; padding: 0;
            color: white; font-family: 'Inter', sans-serif;
        }

        /* HEADER & BALANCE SECTION */
        .casino-header {
            text-align: center;
            padding: 50px 20px 70px;
            background: radial-gradient(circle at top, #222, #000);
            border-bottom: 2px solid #222;
        }

        .user-greeting { color: var(--platinum); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; font-weight: bold; }
        .user-name { color: white; font-size: 2.2rem; font-weight: 900; margin: 15px 0 20px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }

        .balance-chip {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #000;
            padding: 12px 30px;
            border-radius: 50px;
            border: 2px solid var(--gold);
            font-size: 1.4rem;
            font-weight: 900;
            color: #00ff88; /* Winner Green */
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
            position: relative;
        }

        .chip-icon { width: 20px; height: 20px; background: #00ff88; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 10px #00ff88; }

        /* CASINO GAME GRID */
        .casino-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: -40px auto 50px;
            padding: 0 20px;
        }

        .game-card {
            background: var(--brushed-metal);
            border-radius: 18px;
            border: 2px solid #2a2a2a;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The Gold Shine Effect on Hover */
        .game-card:hover {
            border-color: var(--gold);
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--gold-glow);
        }

        /* Inner Reflection effect */
        .game-card::before {
            content: "";
            position: absolute;
            top: -100%; left: -100%;
            width: 50%; height: 300%;
            background: rgba(255,255,255,0.05);
            transform: rotate(45deg);
            transition: 0.5s;
        }
        .game-card:hover::before { top: 100%; left: 100%; }

        .game-icon { font-size: 3rem; display: block; margin-bottom: 15px; text-shadow: 0 0 15px currentColor; }
        .game-label { color: var(--platinum); font-weight: bold; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .game-hint { color: #666; font-size: 0.7rem; margin-top: 5px; }

        /* ACTIVE ARENA TICKET */
        .arena-ticket {
            max-width: 900px;
            margin: 0 auto;
            background: var(--brushed-metal);
            border: 2px solid #222;
            padding: 18px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .arena-ticket:hover { border-color: #ff4444; }

        .live-status { display: flex; align-items: center; gap: 10px; color: #ff4444; font-weight: bold; font-size: 0.9rem; }
        .dot { width: 10px; height: 10px; background: #ff4444; border-radius: 50%; animation: livePulse 1.2s infinite; box-shadow: 0 0 10px #ff4444; }

        @keyframes livePulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        @media (max-width: 600px) { .casino-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="casino-header">
        <span class="user-greeting">WELCOME BACK, HUSTLER</span>
        <h1 class="user-name" id="display-user">PLAYER</h1>
        
        <div class="balance-chip">
            <div class="chip-icon"></div>
            ₱<span id="display-balance">0.00</span>
        </div>
    </div>

    <div class="casino-grid">
        <a href="/games/" class="game-card" style="color: #ff4444;">
            <span class="game-icon">🐓</span>
            <span class="game-label">Sabong Arena</span>
            <span class="game-hint">Live 24/7</span>
        </a>
        <a href="/wallet/" class="game-card" style="color: #ffaa00;">
            <span class="game-icon">💰</span>
            <span class="game-label">Cash-In / Out</span>
            <span class="game-hint">Via Official Agents</span>
        </a>
        <a href="/profile/" class="game-card" style="color: #e5e5e5;">
            <span class="game-icon">👤</span>
            <span class="game-label">My Account</span>
            <span class="game-hint">Status & Settings</span>
        </a>
        <a href="/admin/" class="game-card" id="admin-link" style="display:none; color: #00ff88;">
            <span class="game-icon">⚙️</span>
            <span class="game-label">Admin Panel</span>
            <span class="game-hint">Authorized Only</span>
        </a>
    </div>

    <div class="arena-ticket" onclick="window.location.href='/games/'">
        <div class="live-status">
            <div class="dot"></div>
            FIGHT #125: MERON vs WALA
        </div>
        <div style="color: var(--gold); font-weight: bold; font-size: 0.9rem;">ENTER ARENA →</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // Your standard Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                
                // Fetch Username & Admin Status
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    const data = userSnap.data();
                    document.getElementById('display-user').innerText = data.username.toUpperCase();
                    
                    // Show Admin Link if they are admin
                    if(data.isAdmin) {
                        document.getElementById('admin-link').style.display = "flex";
                    }
                }

                // Live Balance Listener
                onSnapshot(userRef, (snapshot) => {
                    if (snapshot.exists()) {
                        document.getElementById('display-balance').innerText = 
                            (snapshot.data().balance || 0).toLocaleString(undefined, {
                                minimumFractionDigits: 2,
                                maximumFractionDigits: 2
                            });
                    }
                });
            } else {
                window.location.href = "/login/";
            }
        });
    </script>
</body>
</html>
