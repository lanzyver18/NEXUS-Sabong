<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | Live Arena Lobby</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hero-section {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, #1a1a1a, #0a0a0a);
            border-bottom: 1px solid #222;
        }

        .welcome-text { color: #888; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; }
        .user-name { color: var(--gold); font-size: 2rem; font-weight: 900; margin: 10px 0; }

        .lobby-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            max-width: 600px;
            margin: -30px auto 40px;
            padding: 0 20px;
        }

        .nav-card {
            background: #161616;
            padding: 25px 15px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            border: 1px solid #333;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .nav-card:hover { 
            border-color: var(--gold); 
            transform: translateY(-5px);
            background: #1a1a1a;
        }

        .icon { font-size: 2rem; display: block; margin-bottom: 10px; }
        .label { color: #fff; font-weight: bold; font-size: 0.9rem; text-transform: uppercase; }

        .live-status-bar {
            max-width: 600px;
            margin: 0 auto;
            background: #000;
            border: 1px solid #222;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-indicator { color: #00ff88; font-weight: bold; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="hero-section">
        <span class="welcome-text">Welcome Back</span>
        <h1 class="user-name" id="display-user">PLAYER</h1>
        <div class="balance-box" style="display:inline-block; margin-top:10px; font-size: 1.2rem;">
            ₱<span id="display-balance">0.00</span>
        </div>
    </div>

    <div class="lobby-grid">
        <a href="/games/" class="nav-card">
            <span class="icon">🐓</span>
            <span class="label">Live Arena</span>
        </a>
        <a href="/wallet/" class="nav-card">
            <span class="icon">💰</span>
            <span class="label">Wallet</span>
        </a>
        <a href="/profile/" class="nav-card">
            <span class="icon">👤</span>
            <span class="label">Profile</span>
        </a>
        <a href="/admin/" class="nav-card" id="admin-link" style="display:none; border-color: #00ff88;">
            <span class="icon">⚙️</span>
            <span class="label" style="color: #00ff88;">Admin</span>
        </a>
    </div>

    <div class="live-status-bar">
        <div class="status-indicator">
            <div class="dot"></div>
            ARENA #125 IS LIVE
        </div>
        <a href="/games/" style="color: var(--gold); text-decoration: none; font-size: 0.8rem; font-weight: bold;">ENTER NOW →</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                
                // Fetch Username & Admin Status
                const userSnap = await getDoc(userRef);
                if (userSnap.exists()) {
                    const data = userSnap.data();
                    document.getElementById('display-user').innerText = data.username.toUpperCase();
                    
                    // Show Admin Link if they are admin
                    if(data.isAdmin) {
                        document.getElementById('admin-link').style.display = "block";
                    }
                }

                // Live Balance Listener
                onSnapshot(userRef, (snapshot) => {
                    if (snapshot.exists()) {
                        document.getElementById('display-balance').innerText = 
                            (snapshot.data().balance || 0).toLocaleString(undefined, {minimumFractionDigits: 2});
                    }
                });
            } else {
                window.location.href = "/login/";
            }
        });
    </script>
</body>
</html>
