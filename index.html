<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | Home Arena</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; }

        /* NAVIGATION FIXES */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #000;
            border-bottom: 2px solid #222;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .user-controls { display: flex; align-items: center; gap: 15px; }
        .balance-display { text-align: right; display: flex; flex-direction: column; }
        .balance-display small { color: #888; font-size: 0.6rem; letter-spacing: 1px; }
        .balance-display span { color: #00ff88; font-weight: bold; font-size: 1.1rem; }
        
        .nav-profile-btn {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 8px 15px;
            border-radius: 6px;
            font-family: 'Goldman', sans-serif;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .nav-profile-btn:active { transform: scale(0.95); background: var(--gold); color: black; }

        /* HERO SECTION */
        .hero {
            height: 40vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1511192336575-5a79af67a629?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-bottom: 2px solid var(--gold);
        }
        .hero h1 { font-size: 2.2rem; margin: 0; color: white; text-transform: uppercase; font-family: 'Goldman'; }
        .hero p { color: #ccc; margin: 10px 0 20px; font-size: 0.9rem; }
        .cta-button {
            background: var(--gold);
            color: black;
            padding: 15px 35px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            text-transform: uppercase;
        }

        /* LOBBY GRID */
        .lobby-grid { padding: 30px 20px 120px; max-width: 800px; margin: auto; }
        .category-title { color: var(--gold); font-weight: bold; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .game-card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            cursor: pointer;
            position: relative;
            min-height: 160px;
            display: flex;
            align-items: flex-end;
            padding: 15px;
            transition: 0.3s;
            text-decoration: none;
        }
        .game-card.live { border-color: var(--gold); background: linear-gradient(transparent, #000), url('https://images.unsplash.com/photo-1596727147705-61a532a655bd?auto=format&fit=crop&q=60'); background-size: cover; }
        .status-tag { position: absolute; top: 10px; left: 10px; background: #ff4444; color: white; font-size: 0.6rem; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .status-tag.gray { background: #555; }
        .game-card.locked { opacity: 0.5; cursor: not-allowed; }
        .card-info h3 { margin: 0; color: white; font-size: 1rem; }
        .card-info p { margin: 5px 0 0; color: #aaa; font-size: 0.75rem; }

        /* BOTTOM ACTIONS */
        .quick-actions { 
            display: flex; gap: 10px; padding: 15px 20px; 
            background: #000; position: fixed; bottom: 0; left: 0; 
            width: 100%; box-sizing: border-box; border-top: 1px solid #222; z-index: 100; 
        }
        .action-btn { flex: 1; padding: 15px; border: 1px solid var(--gold); background: transparent; color: var(--gold); border-radius: 8px; font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 0.8rem; }
        .action-btn.gold { background: var(--gold); color: black; }
        .admin-action { border-color: #00ff88; color: #00ff88; display: none; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo" style="color:var(--gold); font-family:'Goldman'; font-weight:bold; font-size:1.4rem;">NEXUS</div>
        <div class="user-controls">
            <div class="balance-display">
                <small id="user-display">LOADING...</small>
                <span>₱<span id="nav-balance">0.00</span></span>
            </div>
            <button class="nav-profile-btn" onclick="window.location.href='/profile/'">PROFILE</button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>LIVE ARENA OPEN</h1>
            <p>Reliable Sabong betting in the Philippines.</p>
            <button class="cta-button" onclick="window.location.href='/games/'">PLAY NOW</button>
        </div>
    </header>

    <main class="lobby-grid">
        <div class="category-title">AVAILABLE GAMES</div>
        <div class="grid-container">
            <a href="/games/" class="game-card live">
                <div class="status-tag">LIVE NOW</div>
                <div class="card-info">
                    <h3>LIVE SABONG</h3>
                    <p>Real-time betting</p>
                </div>
            </a>
            <div class="game-card locked">
                <div class="status-tag gray">COMING SOON</div>
                <div class="card-info">
                    <h3>DIGITAL SLOTS</h3>
                    <p>High RTP Games</p>
                </div>
            </div>
        </div>
    </main>

    <section class="quick-actions">
        <button onclick="window.location.href='/admin/'" id="admin-btn" class="action-btn admin-action">ADMIN</button>
        <button onclick="window.location.href='/wallet/'" class="action-btn gold">CASH IN</button>
        <button onclick="window.location.href='/wallet/'" class="action-btn">WITHDRAW</button>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                
                // Load Username & Admin status once
                const snap = await getDoc(userRef);
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('user-display').innerText = data.username ? data.username.toUpperCase() : "PLAYER";
                    if (data.isAdmin === true) {
                        document.getElementById('admin-btn').style.display = "block";
                    }
                }

                // Live balance listener
                onSnapshot(userRef, (doc) => {
                    if (doc.exists()) {
                        const bal = doc.data().balance || 0;
                        document.getElementById('nav-balance').innerText = bal.toLocaleString(undefined, {minimumFractionDigits: 2});
                    }
                });
            } else {
                window.location.href = "/login/";
            }
        });
    </script>
</body>
</html>
