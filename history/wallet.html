<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet History | NEXUS PRO</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --green: #00ff88; --red: #ff4444; }
        body { background: #000; color: #fff; overflow-x: hidden; }
        .top-nav { position: relative; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px 12px 75px; background: #000; border-bottom: 2px solid #222; }

        .history-container { max-width: 850px; margin: 40px auto; padding: 0 20px 100px; }
        
        /* Summary Grid */
        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .summary-card { background: linear-gradient(145deg, #111, #080808); padding: 18px; border-radius: 14px; border: 1px solid #222; text-align: center; }
        .summary-card small { font-size: 0.55rem; color: #555; text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-bottom: 6px; }
        .summary-card span { font-family: 'Goldman'; font-size: 1.1rem; color: var(--gold); }

        /* Tabs */
        .filter-tabs { display: flex; gap: 8px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .tab { background: #0a0a0a; border: 1px solid #222; color: #555; padding: 10px 16px; border-radius: 10px; font-size: 0.7rem; cursor: pointer; white-space: nowrap; transition: 0.2s; font-family: 'Goldman'; }
        .tab.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }

        /* Items */
        .history-item { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 16px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid transparent; transition: 0.3s; }
        .history-item:hover { border-color: #333; transform: scale(1.01); }
        .history-item.income { border-left-color: var(--green); }
        .history-item.expense { border-left-color: var(--red); }
        .history-item.comm { border-left-color: var(--gold); }

        .item-left { display: flex; flex-direction: column; }
        .type-label { font-weight: bold; color: #eee; font-size: 0.85rem; font-family: 'Goldman'; letter-spacing: 1px; }
        .sub-text { color: #444; font-size: 0.65rem; margin-top: 5px; display: flex; flex-direction: column; gap: 3px; }
        
        .item-right { text-align: right; }
        .amount { font-family: 'Goldman', sans-serif; font-weight: bold; font-size: 1.1rem; }
        .status-badge { font-size: 0.55rem; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; font-weight: bold; margin-top: 6px; display: inline-block; border: 1px solid transparent; }
        
        .badge-approved { background: rgba(0, 255, 136, 0.05); color: var(--green); border-color: rgba(0, 255, 136, 0.2); }
        .badge-rejected { background: rgba(255, 68, 68, 0.05); color: var(--red); border-color: rgba(255, 68, 68, 0.2); }
        .badge-pending { background: rgba(212, 175, 55, 0.05); color: var(--gold); border-color: rgba(212, 175, 55, 0.2); }

        @media (max-width: 700px) { .summary-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo" style="color:var(--gold); font-family:'Goldman'; font-weight:bold; font-size:1.2rem; letter-spacing:2px;">NEXUS FINANCE</div>
        <div id="nav-bal" style="color: var(--green); font-weight: bold; font-family: 'Goldman';">₱0.00</div>
    </nav>

    <div class="history-container">
        <div class="summary-grid">
            <div class="summary-card"><small>Total Inbound</small><span id="sum-in">₱0</span></div>
            <div class="summary-card"><small>Net Yield</small><span id="sum-comm" style="color:var(--green);">₱0</span></div>
            <div class="summary-card"><small>Outbound</small><span id="sum-out" style="color:var(--red);">₱0</span></div>
        </div>

        <div class="filter-tabs">
            <div class="tab active" onclick="setFilter('ALL')">ALL LOGS</div>
            <div class="tab" onclick="setFilter('COMMISSION')">COMMISSIONS</div>
            <div class="tab" onclick="setFilter('LOAD_IN')">CASH-IN</div>
            <div class="tab" onclick="setFilter('LOAD_OUT')">CASH-OUT</div>
            <div class="tab" onclick="setFilter('WITHDRAWAL')">WITHDRAWALS</div>
            <div class="tab" onclick="setFilter('REFUND')">REFUNDS</div>
        </div>

        <div id="wallet-history-list">
            <p style="color: #222; text-align: center; margin-top: 50px; font-family: 'Goldman';">DECRYPTING FINANCIAL STRAINS...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, where, orderBy, onSnapshot, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
        import { injectMenu } from "/menu.js";

        const firebaseConfig = { apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q", authDomain: "nexus-sabong.firebaseapp.com", projectId: "nexus-sabong", storageBucket: "nexus-sabong.firebasestorage.app", messagingSenderId: "421723311", appId: "1:421723311:web:1780f179e7c2a7cc0e285a" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        injectMenu();

        let currentFilter = 'ALL';
        let allLogs = [];

        async function checkSystemIntegrity(user) {
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            if (!snap.exists()) {
                await setDoc(userRef, { username: user.email.split('@')[0], level: 6, role: "PLAYER", balance: 100, uplinePath: [], commissionRate: 0, totalCommission: 0, totalTurnover: 0, createdAt: serverTimestamp() });
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await checkSystemIntegrity(user);
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if (snap.exists()) document.getElementById('nav-bal').innerText = `₱${snap.data().balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                });

                const q = query(collection(db, "wallet_logs"), where("uid", "==", user.uid), orderBy("timestamp", "desc"), limit(100));
                onSnapshot(q, (snap) => {
                    allLogs = [];
                    snap.forEach(d => allLogs.push(d.data()));
                    calculateStats();
                    renderLogs();
                });
            } else { window.location.href = "/login/"; }
        });

        function calculateStats() {
            let totalIn = 0, totalOut = 0, comms = 0;
            allLogs.forEach(l => {
                if(l.type === "LOAD_IN" || l.type === "REFUND") totalIn += l.amount;
                if(l.type === "LOAD_OUT" || l.type === "WITHDRAWAL") totalOut += l.amount;
                if(l.type === "COMMISSION") comms += l.amount;
            });
            document.getElementById('sum-in').innerText = `₱${totalIn.toLocaleString()}`;
            document.getElementById('sum-out').innerText = `₱${totalOut.toLocaleString()}`;
            document.getElementById('sum-comm').innerText = `₱${comms.toLocaleString()}`;
        }

        window.setFilter = (f) => {
            currentFilter = f;
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.innerText.includes(f) || (f === 'ALL' && t.innerText.includes('ALL')));
            });
            renderLogs();
        };

        function renderLogs() {
            const list = document.getElementById('wallet-history-list');
            list.innerHTML = "";
            const filtered = allLogs.filter(l => currentFilter === 'ALL' || l.type === currentFilter);

            if (filtered.length === 0) {
                list.innerHTML = `<p style="text-align:center; color:#222; margin-top:50px; font-family:Goldman; font-size:0.7rem;">NO TRANSACTION TRAILS FOUND</p>`;
                return;
            }

            filtered.forEach(d => {
                const isIncome = (d.type === "LOAD_IN" || d.type === "COMMISSION" || d.type === "REFUND");
                const borderClass = d.type === "COMMISSION" ? "comm" : (isIncome ? "income" : "expense");
                const status = d.status || 'SUCCESS';
                const date = d.timestamp?.toDate().toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) || 'Syncing...';
                
                list.innerHTML += `
                    <div class="history-item ${borderClass}">
                        <div class="item-left">
                            <span class="type-label">${d.type.replace('_',' ')}</span>
                            <div class="sub-text">
                                ${d.fromUser ? `<span>FROM: ${d.fromUser.toUpperCase()}</span>` : ''}
                                ${d.toUser ? `<span>TO: ${d.toUser.toUpperCase()}</span>` : ''}
                                <small>${date}</small>
                            </div>
                        </div>
                        <div class="item-right">
                            <div class="amount" style="color: ${isIncome ? 'var(--green)' : 'var(--red)'}">
                                ${isIncome ? '+' : '-'}₱${parseFloat(d.amount).toLocaleString(undefined, {minimumFractionDigits: 2})}
                            </div>
                            <span class="status-badge badge-${status.toLowerCase()}">${status}</span>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
