<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bet History | NEXUS PRO</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --green: #00ff88; --red: #ff4444; --blue: #0084FF; }
        body { background: #000; color: #fff; overflow-x: hidden; padding-bottom: 100px; }
        
        .top-nav { position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #000; border-bottom: 2px solid #222; }

        .bet-container { max-width: 850px; margin: 20px auto; padding: 0 15px; }
        
        /* Stats Summary */
        .history-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 25px; }
        .stat-box { background: linear-gradient(145deg, #111, #080808); padding: 15px; border-radius: 14px; border: 1px solid #1a1a1a; text-align: center; }
        .stat-box h4 { font-size: 0.5rem; color: #444; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1.5px; }
        .stat-box span { font-family: 'Goldman'; font-size: 1rem; color: var(--gold); }

        /* Filter Tabs */
        .filter-row { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .filter-btn { background: #0a0a0a; border: 1px solid #222; color: #555; padding: 10px 18px; border-radius: 10px; font-size: 0.65rem; cursor: pointer; transition: 0.2s; white-space: nowrap; font-family: 'Goldman'; text-transform: uppercase; }
        .filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        /* Bet Cards */
        .bet-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 16px; margin-bottom: 12px; padding: 18px; border-left: 4px solid #333; position: relative; transition: 0.3s; }
        .bet-card.win { border-left-color: var(--green); }
        .bet-card.loss { border-left-color: var(--red); }
        .bet-card.pending { border-left-color: #ffaa00; }
        
        .bet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .game-tag { font-size: 0.5rem; padding: 3px 8px; border-radius: 4px; background: #1a1a1a; color: #555; font-weight: bold; border: 1px solid #222; }
        
        .bet-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; font-size: 0.75rem; }
        .label { color: #333; text-transform: uppercase; font-size: 0.5rem; display: block; margin-bottom: 2px; letter-spacing: 1px; font-weight: bold; }
        .value { color: #eee; font-weight: 500; font-family: 'Goldman'; font-size: 0.8rem; }
        
        .payout-val { font-family: 'Goldman'; font-size: 0.9rem; }
        .win-txt { color: var(--green); }
        .loss-txt { color: var(--red); }

        @media (min-width: 900px) { .top-nav { padding-left: 20px !important; } }
        @media (max-width: 600px) { .history-stats { grid-template-columns: 1fr 1fr; } .bet-details { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo" style="color:var(--gold); font-family:'Goldman'; font-weight:bold; font-size:1.2rem;">NEXUS LOGS</div>
        <div id="nav-bal" style="color: var(--green); font-weight: bold; font-family: 'Goldman';">₱0.00</div>
    </nav>

    <div class="bet-container">
        <div class="history-stats">
            <div class="stat-box"><h4>Deployments</h4><span id="stat-count">0</span></div>
            <div class="stat-box"><h4>Net Volume</h4><span id="stat-volume">₱0</span></div>
            <div class="stat-box"><h4>P/L Status</h4><span id="stat-profit">₱0</span></div>
            <div class="stat-box"><h4>Success</h4><span id="stat-winrate">0%</span></div>
        </div>

        <div class="filter-row">
            <button class="filter-btn active" onclick="setFilter('ALL')">All Ops</button>
            <button class="filter-btn" onclick="setFilter('WIN')">Successful</button>
            <button class="filter-btn" onclick="setFilter('LOSS')">Liquidated</button>
            <button class="filter-btn" onclick="setFilter('PENDING')">Active</button>
        </div>

        <div id="bet-list">
            <p style="color: #222; text-align: center; margin-top: 50px; font-family: 'Goldman'; letter-spacing: 2px;">DECRYPTING LEDGER...</p>
        </div>
    </div>

    <script type="module">
        import { supabase } from "/supabase.js";
        import { injectMenu } from "/menu.js";

        let currentFilter = "ALL";
        let allActivity = [];
        let userId = null;

        injectMenu();

        async function initHistory() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { window.location.href = "/login/"; return; }
            userId = session.user.id;

            // 1. Listen for Profile (Balance Sync)
            supabase.channel('history-nav-sync')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'profiles', filter: `id=eq.${userId}` }, 
                    payload => {
                        document.getElementById('nav-bal').innerText = `₱${parseFloat(payload.new.balance).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    }).subscribe();

            // 2. Fetch Initial Balance
            const { data: profile } = await supabase.from('profiles').select('balance').eq('id', userId).single();
            if(profile) document.getElementById('nav-bal').innerText = `₱${parseFloat(profile.balance).toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            // 3. Load Bet Data
            loadBets();

            // 4. Real-time Bet Updates
            supabase.channel('bet-realtime')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'bets', filter: `uid=eq.${userId}` }, () => loadBets())
                .subscribe();
        }

        async function loadBets() {
            // This query joins Arena bets. 
            // If you have Crash/Mines bets in a different table, you would use a 'union' approach or fetch both.
            const { data: bets, error } = await supabase
                .from('bets')
                .select('*')
                .eq('uid', userId)
                .order('created_at', { ascending: false })
                .limit(100);

            if (bets) {
                allActivity = bets;
                calculateStats();
                renderActivity();
            }
        }

        function calculateStats() {
            let volume = 0, profit = 0, wins = 0, totalSettled = 0;
            allActivity.forEach(b => {
                const amt = parseFloat(b.amount || 0);
                const payout = parseFloat(b.payout || 0);
                volume += amt;
                if(b.status === "WIN") { profit += (payout - amt); wins++; totalSettled++; }
                if(b.status === "LOSS") { profit -= amt; totalSettled++; }
            });

            document.getElementById('stat-count').innerText = allActivity.length;
            document.getElementById('stat-volume').innerText = `₱${volume.toLocaleString()}`;
            document.getElementById('stat-profit').innerText = `₱${profit.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('stat-profit').style.color = profit >= 0 ? "var(--green)" : "var(--red)";
            document.getElementById('stat-winrate').innerText = totalSettled > 0 ? Math.round((wins / totalSettled) * 100) + "%" : "0%";
        }

        window.setFilter = (f) => {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase().includes(f.toLowerCase()) || (f === 'ALL' && btn.innerText.toLowerCase().includes('all')));
            });
            renderActivity();
        };

        function renderActivity() {
            const list = document.getElementById('bet-list');
            list.innerHTML = "";
            const filtered = allActivity.filter(b => currentFilter === "ALL" || b.status === currentFilter);

            if (filtered.length === 0) {
                list.innerHTML = `<p style="text-align:center; color:#222; margin-top:50px; font-family:Goldman; font-size:0.7rem; text-transform:uppercase; letter-spacing:2px;">No records found</p>`;
                return;
            }

            filtered.forEach(b => {
                const status = (b.status || 'PENDING').toLowerCase();
                const time = new Date(b.created_at).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                const sideColor = b.side === 'MERON' ? 'var(--red)' : (b.side === 'WALA' ? 'var(--blue)' : 'var(--gold)');
                const isWin = b.status === 'WIN';
                const isLoss = b.status === 'LOSS';
                
                list.innerHTML += `
                    <div class="bet-card ${status}">
                        <div class="bet-header">
                            <div><span class="game-tag">${b.game_type || 'ARENA'}</span><b style="font-family:'Goldman'; font-size:0.7rem; letter-spacing:1px; color:#444;">#${b.id.split('-')[0].toUpperCase()}</b></div>
                            <span style="font-size:0.55rem; font-family:'Goldman'; color:${isWin ? 'var(--green)' : (status === 'pending' ? '#ffaa00' : 'var(--red)')}">${status.toUpperCase()}</span>
                        </div>
                        <div class="bet-details">
                            <div><span class="label">Objective</span><span class="value" style="color:${sideColor}">${b.side || 'CRASH'}</span></div>
                            <div><span class="label">Investment</span><span class="value">₱${parseFloat(b.amount).toLocaleString()}</span></div>
                            <div><span class="label">Protocol P/L</span><span class="payout-val ${isWin ? 'win-txt' : 'loss-txt'}">${isWin ? '+₱' + parseFloat(b.payout).toLocaleString() : (isLoss ? '-₱' + parseFloat(b.amount).toLocaleString() : '---')}</span></div>
                        </div>
                        <div style="margin-top:10px; border-top:1px solid #111; padding-top:8px; display:flex; justify-content:space-between; align-items:center;">
                             <span class="label" style="margin:0;">Timestamp: ${time}</span>
                             <span style="font-size:0.5rem; color:#222; font-family:Goldman;">SECURE_TRACE_02</span>
                        </div>
                    </div>
                `;
            });
        }

        initHistory();
    </script>
</body>
</html>
