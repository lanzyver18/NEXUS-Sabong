<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Manager | NEXUS</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; }
        
        .btn-nexus {
            font-family: 'Goldman', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
            height: 45px;
        }

        .btn-gold { background: var(--gold); color: black; min-width: 120px; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        
        .agent-container { max-width: 1100px; margin: 20px auto; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .stat-card h4 { font-size: 0.6rem; color: #555; text-transform: uppercase; margin-bottom: 8px; }
        .stat-card .val { font-family: 'Goldman', sans-serif; font-size: 1.3rem; }
        
        .ref-panel { background: #0a0a0a; border: 1px dashed var(--gold); border-radius: 12px; padding: 25px; margin-bottom: 25px; text-align: center; }
        .ref-input-group { display: flex; gap: 12px; margin: 15px auto 0; max-width: 600px; }
        .ref-input-group input { flex: 1; background: #000; border: 1px solid #333; color: var(--gold); padding: 0 15px; border-radius: 8px; height: 45px; }

        .panel { background: #111; border-radius: 15px; border: 1px solid #333; padding: 25px; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; gap: 15px; }
        
        /* SEARCH FILTER */
        .search-wrapper { position: relative; flex: 1; max-width: 300px; }
        .search-wrapper input { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 10px 15px; border-radius: 8px; font-size: 0.8rem; outline: none; }
        .search-wrapper input:focus { border-color: var(--gold); }

        .agent-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .agent-table th { text-align: left; color: #555; padding: 12px; border-bottom: 1px solid #222; text-transform: uppercase; font-size: 0.65rem; }
        .agent-table td { padding: 15px 12px; border-bottom: 1px solid #1a1a1a; }
        
        .role-badge { background: #000; padding: 4px 8px; border-radius: 4px; font-size: 0.65rem; color: var(--gold); text-transform: uppercase; border: 1px solid #333; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: #0f0f0f; width: 90%; max-width: 420px; padding: 30px; border-radius: 20px; border: 1px solid var(--gold); }
        .modal label { font-size: 0.65rem; color: #666; text-transform: uppercase; display: block; margin-top: 15px; margin-bottom: 5px; }
        .modal input, .modal select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        
        #upline-verify-status { font-size: 0.7rem; margin-top: 5px; font-weight: bold; min-height: 1em; }

        .top-nav { position: relative; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px 12px 75px; background: #000; border-bottom: 2px solid #222; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo" style="color:var(--gold); font-family:'Goldman'; font-weight:bold; font-size:1.2rem;">AGENT CENTER</div>
        <div id="my-role-display" style="color: #888; font-size: 0.7rem; font-family: 'Goldman';">TIER: ---</div>
    </nav>

    <div class="agent-container">
        <div class="ref-panel">
            <h4 style="margin:0; color: var(--gold); font-size: 0.8rem; letter-spacing: 2px; font-family: 'Goldman';">NETWORK RECRUITMENT LINK</h4>
            <div class="ref-input-group">
                <input type="text" id="referral-url" readonly>
                <button class="btn-nexus btn-gold" onclick="copyReferral()">COPY LINK</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h4>Personal Rate</h4><span class="val" id="my-comm-rate" style="color:var(--gold);">0%</span></div>
            <div class="stat-card"><h4>Team Size</h4><span class="val" id="count-downlines" style="color:white;">0</span></div>
            <div class="stat-card"><h4>Team Turnover</h4><span class="val" id="team-turnover" style="color:#00ff88;">₱0</span></div>
            <div class="stat-card"><h4>Total Earnings</h4><span class="val" id="total-earned" style="color:var(--gold);">₱0</span></div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <h3 style="margin:0; color: var(--gold); font-family: 'Goldman'; font-size: 1rem;">DOWNLINE MANAGEMENT</h3>
                <div class="search-wrapper">
                    <input type="text" id="table-search" placeholder="Search downline ID..." oninput="filterDownlineTable()">
                </div>
                <button class="btn-nexus btn-gold" style="font-size: 0.7rem; height: 38px;" onclick="toggleModal(true)">+ New Account</button>
            </div>
            <div style="overflow-x: auto;">
                <table class="agent-table">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Comm %</th>
                            <th>Turnover</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="agent-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="create-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-top:0; color:var(--gold); font-family: 'Goldman'; text-align:center;">NETWORK PLACEMENT</h3>
            
            <div id="create-only-fields">
                <label>Target Username</label>
                <input type="text" id="new-username" placeholder="Enter ID">

                <label>Assigned Role</label>
                <select id="new-role"></select>

                <label>Placement (Upline ID)</label>
                <input type="text" id="new-upline" placeholder="Search Upline Username..." oninput="verifyUpline(this.value)">
                <div id="upline-verify-status"></div>
            </div>

            <label>Commission Rate (%)</label>
            <input type="number" id="new-comm" step="0.01" oninput="validateInputRate()">
            <div id="rate-warning" style="color: #ff4444; font-size: 0.7rem; display: none; margin: 10px 0; text-align: center;">Rate exceeds Upline's spread!</div>

            <button class="btn-nexus btn-gold" id="btn-save" style="width:100%; margin-top:20px;" onclick="handleSave()">Confirm Placement</button>
            <button class="btn-nexus btn-outline" style="width:100%; margin-top:10px; border:none; color:#555;" onclick="toggleModal(false)">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, getDocs, updateDoc, collection, query, where, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
        import { injectMenu } from "/menu.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseAuth = auth;
        window.firebaseDb = db;
        injectMenu();

        // UPDATED 6-TIER STRUCTURE
        const TIERS = [
            { role: "ADMIN", level: 1 }, 
            { role: "OPERATOR", level: 2 }, 
            { role: "INCO", level: 3 },
            { role: "SUBOP", level: 4 }, 
            { role: "AGENT", level: 5 }, 
            { role: "PLAYER", level: 6 }
        ];

        let myData = null;
        let editingUserId = null;
        let verifiedUplineData = null;
        let allDownlines = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if(snap.exists()) {
                    myData = snap.data();
                    if(myData.level >= 6) window.location.href = "/"; // Player redirect
                    setupUI();
                    loadDownlines();
                }
            } else { window.location.href = "/login/"; }
        });

        function setupUI() {
            document.getElementById('my-role-display').innerText = `TIER: ${myData.role}`;
            document.getElementById('my-comm-rate').innerText = `${myData.commissionRate}%`;
            document.getElementById('total-earned').innerText = `₱${(myData.totalCommission || 0).toLocaleString()}`;
            document.getElementById('referral-url').value = `${window.location.origin}/register/?ref=${auth.currentUser.uid}`;
            document.getElementById('new-upline').value = myData.username;
            verifyUpline(myData.username);

            const select = document.getElementById('new-role');
            select.innerHTML = "";
            TIERS.forEach(t => {
                if (t.level > myData.level) {
                    let opt = document.createElement('option');
                    opt.value = t.role;
                    opt.dataset.level = t.level;
                    opt.innerText = t.role.replace("_", " ");
                    select.appendChild(opt);
                }
            });
        }

        window.verifyUpline = async (username) => {
            const status = document.getElementById('upline-verify-status');
            if(!username) return status.innerText = "";
            
            const q = query(collection(db, "users"), where("username", "==", username.toLowerCase()));
            const snap = await getDocs(q);
            
            if(!snap.empty) {
                const data = snap.docs[0].data();
                if (data.level >= 6) { // Can't place under a player
                    verifiedUplineData = null;
                    status.innerText = "❌ Cannot place under a PLAYER";
                    status.style.color = "#ff4444";
                    return;
                }
                verifiedUplineData = { id: snap.docs[0].id, ...data };
                status.innerText = `✅ ${verifiedUplineData.role} (${verifiedUplineData.commissionRate}% max)`;
                status.style.color = "#00ff88";
            } else {
                verifiedUplineData = null;
                status.innerText = "❌ User not found";
                status.style.color = "#ff4444";
            }
        };

        function loadDownlines() {
            const q = query(collection(db, "users"), where("uplineId", "==", auth.currentUser.uid));
            onSnapshot(q, (snap) => {
                allDownlines = [];
                let teamT = 0;
                snap.forEach(doc => {
                    const d = doc.data();
                    d.id = doc.id;
                    allDownlines.push(d);
                    teamT += (d.totalTurnover || 0);
                });
                document.getElementById('count-downlines').innerText = snap.size;
                document.getElementById('team-turnover').innerText = `₱${teamT.toLocaleString()}`;
                renderTable(allDownlines);
            });
        }

        function renderTable(data) {
            const list = document.getElementById('agent-list');
            list.innerHTML = data.length ? "" : '<tr><td colspan="5" style="text-align:center; padding:40px; color:#333;">No direct downlines found.</td></tr>';
            
            data.forEach(u => {
                list.innerHTML += `
                    <tr>
                        <td><strong style="color:white;">${u.username}</strong></td>
                        <td><span class="role-badge">${u.role}</span></td>
                        <td>${u.commissionRate}%</td>
                        <td style="color:#00ff88;">₱${(u.totalTurnover || 0).toLocaleString()}</td>
                        <td><button class="btn-edit" style="color:var(--gold); border:none; background:none; cursor:pointer;" onclick="openEdit('${u.id}', '${u.username}', ${u.commissionRate})">EDIT RATE</button></td>
                    </tr>
                `;
            });
        }

        window.filterDownlineTable = () => {
            const term = document.getElementById('table-search').value.toLowerCase();
            const filtered = allDownlines.filter(u => u.username.includes(term));
            renderTable(filtered);
        };

        window.handleSave = async () => {
            const comm = parseFloat(document.getElementById('new-comm').value);
            if (!verifiedUplineData && !editingUserId) return alert("Select a valid Upline.");
            if (isNaN(comm) || comm > verifiedUplineData.commissionRate) return alert("Rate exceeds Upline limit.");

            const saveBtn = document.getElementById('btn-save');
            saveBtn.disabled = true;
            saveBtn.innerText = "PROCESSING...";

            try {
                if (editingUserId) {
                    await updateDoc(doc(db, "users", editingUserId), { commissionRate: comm });
                } else {
                    const user = document.getElementById('new-username').value.trim().toLowerCase();
                    const roleSelect = document.getElementById('new-role');
                    const role = roleSelect.value;
                    const level = parseInt(roleSelect.options[roleSelect.selectedIndex].dataset.level);

                    await addDoc(collection(db, "users"), {
                        username: user, role, level, commissionRate: comm,
                        uplineId: verifiedUplineData.id,
                        uplinePath: [...(verifiedUplineData.uplinePath || []), verifiedUplineData.id],
                        balance: 0, totalTurnover: 0, totalCommission: 0, createdAt: new Date()
                    });
                }
                toggleModal(false);
            } catch (e) { alert(e.message); }
            finally { saveBtn.disabled = false; saveBtn.innerText = "Confirm Placement"; }
        };

        window.copyReferral = () => {
            navigator.clipboard.writeText(document.getElementById("referral-url").value);
            alert("Referral Link Copied!");
        };

        window.openEdit = (uid, username, currentRate) => {
            editingUserId = uid;
            document.getElementById('modal-title').innerText = `EDIT: ${username.toUpperCase()}`;
            document.getElementById('create-only-fields').style.display = "none";
            document.getElementById('new-comm').value = currentRate;
            toggleModal(true);
        };

        window.toggleModal = (show) => {
            if(!show) editingUserId = null;
            document.getElementById('create-modal').style.display = show ? 'flex' : 'none';
            if(show && !editingUserId) {
                document.getElementById('modal-title').innerText = "NETWORK PLACEMENT";
                document.getElementById('create-only-fields').style.display = "block";
                setupUI();
            }
        };

        window.validateInputRate = () => {
            const val = parseFloat(document.getElementById('new-comm').value);
            const max = verifiedUplineData ? verifiedUplineData.commissionRate : 0;
            document.getElementById('rate-warning').style.display = val > max ? "block" : "none";
            document.getElementById('btn-save').disabled = val > max;
        };
    </script>
</body>
</html>
