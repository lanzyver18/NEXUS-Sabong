<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Suite | NEXUS</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .admin-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        
        /* INSIGHT CARDS */
        .insight-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .insight-card { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .insight-card h4 { color: #888; font-size: 0.7rem; margin: 0; text-transform: uppercase; }
        .insight-card .val { color: var(--gold); font-size: 1.5rem; font-weight: bold; margin-top: 5px; display: block; }

        /* PANELS */
        .panel { background: #111; border-radius: 15px; border: 1px solid #333; padding: 20px; margin-bottom: 20px; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; margin-bottom: 15px; padding-bottom: 10px; }
        
        /* TRANSACTION & PLAY LOGS */
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .log-table th { text-align: left; color: #555; padding: 10px; border-bottom: 1px solid #222; }
        .log-table td { padding: 12px 10px; border-bottom: 1px solid #1a1a1a; }
        .win { color: #00ff88; font-weight: bold; }
        .loss { color: #ff4444; font-weight: bold; }

        /* SEARCH AREA */
        .search-box { background: #000; border: 1px solid var(--gold); padding: 15px; border-radius: 10px; }
        
        @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo">NEXUS ADMIN</div>
        <div style="color: #00ff88; font-size: 0.8rem;">● SYSTEM ONLINE</div>
    </nav>

    <div class="admin-grid">
        
        <div class="main-admin">
            
            <div class="insight-row">
                <div class="insight-card"><h4>Total House Bank</h4><span class="val" id="stat-total-bank">₱0</span></div>
                <div class="insight-card"><h4>Active Players</h4><span class="val" id="stat-players">0</span></div>
                <div class="insight-card"><h4>Total Loads (24h)</h4><span class="val" id="stat-loads">₱0</span></div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h3 style="margin:0; color: var(--gold);">LIVE PLAY HISTORY</h3>
                    <span class="text-muted">Real-time Game Results</span>
                </div>
                <table class="log-table">
                    <thead>
                        <tr>
                            <th>Player</th>
                            <th>Game/Fight</th>
                            <th>Bet</th>
                            <th>Result</th>
                            <th>Profit/Loss</th>
                        </tr>
                    </thead>
                    <tbody id="play-history-list">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="sidebar-admin">
            <div class="panel search-box">
                <h3 style="margin-top:0; font-size: 1rem;">LOAD CREDITS</h3>
                <input type="text" id="target-username" placeholder="Username (e.g. kenny88)">
                <button class="btn-main btn-dark" id="btn-check" style="width:100%; margin-bottom:10px;">CHECK PLAYER</button>
                
                <div id="player-preview" style="display:none; background:#0a0a0a; padding:10px; border-radius:5px; margin-bottom:15px;">
                    <span id="res-name" style="font-weight:bold; color:var(--gold);">---</span><br>
                    <small>Balance: </small><span id="res-bal" style="color:#00ff88;">₱0</span>
                </div>

                <input type="number" id="load-amt" placeholder="Amount (e.g. 1000)">
                <button class="btn-main btn-gold" id="btn-confirm" style="width:100%;">SEND CREDITS</button>
            </div>

            <div class="panel">
                <h3 style="margin-top:0; font-size: 1rem;">RECENT AGENT LOADS</h3>
                <div id="load-history-list">
                    </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, getDocs, updateDoc, increment, collection, query, where, orderBy, limit, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activePlayerId = null;

        // 1. SECURITY GATE
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const adminSnap = await getDoc(doc(db, "users", user.uid));
                if (!adminSnap.exists() || !adminSnap.data().isAdmin) {
                    window.location.href = "/";
                } else {
                    initDashboard();
                }
            } else { window.location.href = "/login/"; }
        });

        function initDashboard() {
            // STATS: Active Players & Total Bank
            onSnapshot(collection(db, "users"), (snap) => {
                let totalBank = 0;
                document.getElementById('stat-players').innerText = snap.size;
                snap.forEach(user => {
                    totalBank += (user.data().balance || 0);
                });
                document.getElementById('stat-total-bank').innerText = "₱" + totalBank.toLocaleString();
            });

            // LOGS: Recent Plays (Wins/Losses)
            // Note: You must create a 'bets' collection when users play
            onSnapshot(query(collection(db, "bets"), orderBy("timestamp", "desc"), limit(10)), (snap) => {
                const list = document.getElementById('play-history-list');
                list.innerHTML = "";
                snap.forEach(bet => {
                    const d = bet.data();
                    const profitClass = d.status === "WIN" ? "win" : "loss";
                    list.innerHTML += `
                        <tr>
                            <td>${d.username}</td>
                            <td>Fight #${d.fightId}</td>
                            <td>₱${d.amount}</td>
                            <td>${d.status}</td>
                            <td class="${profitClass}">${d.status === 'WIN' ? '+₱'+d.payout : '-₱'+d.amount}</td>
                        </tr>
                    `;
                });
            });

            // LOGS: Recent Agent Transfers
            onSnapshot(query(collection(db, "logs"), orderBy("timestamp", "desc"), limit(5)), (snap) => {
                const list = document.getElementById('load-history-list');
                list.innerHTML = "";
                snap.forEach(log => {
                    const d = log.data();
                    list.innerHTML += `
                        <div style="font-size:0.75rem; padding:8px 0; border-bottom:1px solid #222;">
                            Sent <strong>₱${d.amount}</strong> to <strong>${d.toUsername}</strong>
                        </div>
                    `;
                });
            });
        }

        // AGENT TOOL: Search Player
        document.getElementById('btn-check').onclick = async () => {
            const username = document.getElementById('target-username').value.trim().toLowerCase();
            const q = query(collection(db, "users"), where("username", "==", username));
            const snap = await getDocs(q);
            
            if(!snap.empty) {
                const player = snap.docs[0];
                activePlayerId = player.id;
                document.getElementById('res-name').innerText = player.data().username.toUpperCase();
                document.getElementById('res-bal').innerText = "₱" + (player.data().balance || 0).toLocaleString();
                document.getElementById('player-preview').style.display = "block";
            } else { alert("Player not found!"); }
        };

        // AGENT TOOL: Transfer
        document.getElementById('btn-confirm').onclick = async () => {
            const amount = parseInt(document.getElementById('load-amt').value);
            if(!activePlayerId || isNaN(amount)) return alert("Search player and enter amount");

            if(confirm(`Transfer ₱${amount}?`)) {
                await updateDoc(doc(db, "users", activePlayerId), { balance: increment(amount) });
                await addDoc(collection(db, "logs"), {
                    agent: auth.currentUser.uid,
                    toUsername: document.getElementById('res-name').innerText,
                    amount: amount,
                    timestamp: new Date()
                });
                alert("Transfer Successful");
                location.reload();
            }
        };
    </script>
</body>
</html>
