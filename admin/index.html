<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Suite | NEXUS</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .top-nav { display: flex; justify-content: space-between; align-items: center; position: relative; padding: 12px 20px 12px 75px; background: #000; border-bottom: 2px solid #222; position: sticky; top: 0; z-index: 1000; }
        .admin-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .insight-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .insight-card { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .insight-card h4 { color: #888; font-size: 0.6rem; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .insight-card .val { color: var(--gold); font-size: 1.4rem; font-weight: bold; margin-top: 5px; display: block; font-family: 'Goldman'; }
        .panel { background: #111; border-radius: 15px; border: 1px solid #333; padding: 20px; margin-bottom: 20px; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; margin-bottom: 15px; padding-bottom: 10px; }
        
        .trend-container { display: flex; gap: 5px; overflow-x: auto; padding: 10px 0; }
        .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
        .dot.meron { background: #ff4444; box-shadow: 0 0 8px #ff4444; }
        .dot.wala { background: #4444ff; box-shadow: 0 0 8px #4444ff; }
        .dot.draw { background: #ffaa00; }

        .lock-btn { width: 100%; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-family: 'Goldman'; margin-bottom: 15px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .w-request { background: #000; padding: 15px; border-radius: 10px; border-left: 4px solid var(--gold); margin-bottom: 12px; }
        .btn-sm { padding: 8px 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; font-family: 'Goldman'; }
        .btn-approve { background: #00ff88; color: black; }
        
        .log-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; color: #eee; }
        .log-table th { text-align: left; color: #555; padding: 10px; border-bottom: 1px solid #222; text-transform: uppercase; font-size: 0.65rem; }
        .log-table td { padding: 12px 10px; border-bottom: 1px solid #1a1a1a; }
        
        .role-tag { font-size: 0.6rem; padding: 2px 6px; border-radius: 3px; background: #222; color: var(--gold); border: 1px solid #333; }
        .search-box { background: #000; border: 1px solid var(--gold); padding: 15px; border-radius: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; outline: none; }
        
        /* LIVE BET STREAM */
        .live-bets { height: 200px; overflow-y: auto; font-size: 0.7rem; font-family: monospace; padding: 10px; background: #050505; border-radius: 8px; border: 1px solid #222; }
        .bet-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #111; }
        
        @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo" style="color:var(--gold); font-family:'Goldman'; font-weight:bold; font-size:1.2rem;">NEXUS MANAGEMENT</div>
        <div id="session-status" style="color: #00ff88; font-size: 0.8rem; font-weight: bold;">● TIER VERIFIED</div>
    </nav>

    <div class="admin-grid">
        <div class="main-admin">
            
            <div class="insight-row">
                <div class="insight-card"><h4>System Float</h4><span class="val" id="stat-total-bank">₱0</span></div>
                <div class="insight-card"><h4>Network Commission</h4><span class="val" id="stat-network-comm" style="color:#00ff88;">₱0</span></div>
                <div class="insight-card"><h4>Pending Cash-Out</h4><span class="val" id="stat-pending-w" style="color:#ffaa00;">₱0</span></div>
            </div>

            <div class="panel" id="trend-panel" style="display: none;">
                <div class="panel-header">
                    <h3 style="margin:0; color: var(--gold); font-family: 'Goldman'; font-size: 0.9rem;">ARENA ROADMAP (LAST 50)</h3>
                </div>
                <div class="trend-container" id="roadmap-display"></div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h3 style="margin:0; color: var(--gold); font-family: 'Goldman'; font-size: 1rem;">LIVE BETS (PENDING)</h3>
                    <span id="pending-bet-count" style="color:#555; font-size:0.7rem;">0 ACTIVE</span>
                </div>
                <div class="live-bets" id="live-bet-stream">
                    </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h3 style="margin:0; color: var(--gold); font-family: 'Goldman'; font-size: 1rem;">DOWNLINE OVERVIEW</h3>
                </div>
                <div style="overflow-x: auto;">
                    <table class="log-table">
                        <thead>
                            <tr>
                                <th>Username / Role</th>
                                <th>Balance</th>
                                <th>Earnings</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="downline-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="sidebar-admin">
            <div class="panel" id="fight-control-panel" style="border: 1px solid var(--gold); display:none; margin-bottom: 20px;">
                <h3 style="margin:0; color: var(--gold); margin-bottom:15px; font-size: 0.9rem; font-family: 'Goldman';">FIGHT CONTROL</h3>
                
                <button id="btn-lock-betting" onclick="toggleBettingLock()" class="lock-btn">
                    SYNCING...
                </button>

                <div style="display: grid; grid-template-columns: 1fr; gap: 8px;">
                    <button onclick="settleFight('MERON')" style="background:#ff4444; color:white; padding:12px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">SETTLE MERON</button>
                    <button onclick="settleFight('WALA')" style="background:#4444ff; color:white; padding:12px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">SETTLE WALA</button>
                    <button onclick="settleFight('DRAW')" style="background:#333; color:white; padding:12px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">DRAW / CANCEL</button>
                </div>
            </div>

            <div class="panel search-box" id="arena-settings-panel" style="border-color: #00ff88; display: none;">
                <h3 style="margin-top:0; font-size: 0.8rem; color: #00ff88; font-family: 'Goldman';">ARENA SETTINGS</h3>
                <label style="font-size:0.6rem; color:#444;">MULTIPLIER</label>
                <div style="display: flex; gap: 10px; margin-bottom:10px;">
                    <input type="number" id="payout-multiplier" step="0.01" style="margin:0; font-family: 'Goldman';">
                    <button onclick="updatePayout()" class="btn-sm btn-approve">SAVE</button>
                </div>
                <button onclick="forceResetHype()" style="width:100%; background:#222; color:#555; padding:8px; border:none; border-radius:4px; cursor:pointer; font-size:0.6rem;">FORCE HYPE RESET</button>
            </div>

            <div class="panel search-box" style="margin-top:20px;">
                <h3 style="margin-top:0; font-size: 0.9rem; color: var(--gold); font-family: 'Goldman';">CREDIT LOADER</h3>
                <input type="text" id="target-username" placeholder="Search ID...">
                <button onclick="checkUser()" style="width:100%; margin-bottom:10px; background:#222; color:white; padding:10px; border:none; border-radius:5px; font-family: 'Goldman'; cursor:pointer;">FIND USER</button>
                <div id="player-preview" style="display:none; background:#0a0a0a; padding:12px; border-radius:8px; margin-bottom:15px; border-left:3px solid var(--gold);">
                    <span id="res-name" style="font-weight:bold; color:white; font-size: 0.8rem;">---</span><br>
                    <span id="res-bal" style="color:#00ff88; font-weight:bold; font-family: 'Goldman';">₱0</span>
                </div>
                <input type="number" id="load-amt" placeholder="Amount (₱)">
                <button onclick="confirmLoad()" style="width:100%; background:var(--gold); color: black; padding:15px; border:none; border-radius:5px; font-weight:bold; font-family: 'Goldman'; cursor:pointer;">LOAD CREDITS</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, collection, query, where, onSnapshot, writeBatch, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
        import { injectMenu } from "/menu.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseAuth = auth;
        window.firebaseDb = db;
        injectMenu();

        let myTierData = null;
        let activePlayerId = null;
        let arenaLocked = false;
        window.currentMultiplier = 1.90;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists() && snap.data().level <= 6) {
                    myTierData = snap.data();
                    initManagement();
                } else { window.location.href = "/"; }
            } else { window.location.href = "/login/"; }
        });

        function initManagement() {
            const downlineQuery = query(collection(db, "users"), where("uplineId", "==", auth.currentUser.uid));
            onSnapshot(downlineQuery, (snap) => {
                let totalBank = 0;
                let networkComm = 0;
                const table = document.getElementById('downline-table-body');
                table.innerHTML = "";
                snap.forEach(uDoc => {
                    const u = uDoc.data();
                    totalBank += (u.balance || 0);
                    networkComm += (u.totalCommission || 0);
                    table.innerHTML += `<tr><td><strong>${u.username}</strong><br><span class="role-tag">${u.role}</span></td><td style="color:#00ff88;">₱${(u.balance || 0).toLocaleString()}</td><td>₱${(u.totalCommission || 0).toLocaleString()}</td><td><button class="btn-sm" style="background:#222; color:var(--gold); border:1px solid var(--gold);" onclick="quickSelectUser('${u.username}')">LOAD</button></td></tr>`;
                });
                document.getElementById('stat-total-bank').innerText = "₱" + totalBank.toLocaleString();
                document.getElementById('stat-network-comm').innerText = "₱" + networkComm.toLocaleString();
            });

            if (myTierData.level === 1) {
                document.getElementById('fight-control-panel').style.display = "block";
                document.getElementById('arena-settings-panel').style.display = "block";
                document.getElementById('trend-panel').style.display = "block";
                syncArenaControl();
                streamLiveBets();
            }
        }

        function streamLiveBets() {
            const q = query(collection(db, "bets"), where("status", "==", "PENDING"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                const stream = document.getElementById('live-bet-stream');
                document.getElementById('pending-bet-count').innerText = `${snap.size} ACTIVE`;
                stream.innerHTML = "";
                snap.forEach(d => {
                    const b = d.data();
                    const color = b.side === "MERON" ? "#ff4444" : "#4444ff";
                    stream.innerHTML += `<div class="bet-row"><span style="color:#888">${b.username.toUpperCase()}</span><span style="color:${color}; font-weight:bold;">${b.side}: ₱${b.amount.toLocaleString()}</span></div>`;
                });
            });
        }

        function syncArenaControl() {
            onSnapshot(doc(db, "settings", "arena"), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    arenaLocked = data.isLocked || false;
                    const lockBtn = document.getElementById('btn-lock-betting');
                    lockBtn.innerText = arenaLocked ? "OPEN BETTING" : "CLOSE BETTING";
                    lockBtn.style.background = arenaLocked ? "#00ff88" : "#ff4444";
                    lockBtn.style.color = arenaLocked ? "black" : "white";

                    const m = data.payoutMultiplier || 1.90;
                    document.getElementById('payout-multiplier').value = m;
                    window.currentMultiplier = m;

                    const roadmap = data.history || [];
                    const roadDiv = document.getElementById('roadmap-display');
                    roadDiv.innerHTML = "";
                    roadmap.slice(-50).forEach(res => {
                        const dot = document.createElement('div');
                        dot.className = `dot ${res.toLowerCase()}`;
                        roadDiv.appendChild(dot);
                    });
                }
            });
        }

        window.forceResetHype = async () => {
            if (confirm("Reset rigged totals to 0 instantly?")) {
                await updateDoc(doc(db, "settings", "arena"), { resetTime: new Date() });
            }
        };

        window.toggleBettingLock = async () => {
            await updateDoc(doc(db, "settings", "arena"), { isLocked: !arenaLocked });
        };

        window.settleFight = async (winner) => {
            if (myTierData.level !== 1) return;
            const m = window.currentMultiplier;
            if (!confirm(`Settle as ${winner}?`)) return;
            
            const batch = writeBatch(db);
            const q = query(collection(db, "bets"), where("status", "==", "PENDING"));
            const snap = await getDocs(q);
            
            snap.forEach(bDoc => {
                const b = bDoc.data();
                if (b.side === winner) {
                    const win = Math.floor(b.amount * m);
                    batch.update(doc(db, "users", b.uid), { balance: increment(win) });
                    batch.update(doc(db, "bets", bDoc.id), { status: "WIN", payout: win });
                } else if (winner === "DRAW") {
                    batch.update(doc(db, "users", b.uid), { balance: increment(b.amount) });
                    batch.update(doc(db, "bets", bDoc.id), { status: "DRAW", payout: b.amount });
                } else {
                    batch.update(doc(db, "bets", bDoc.id), { status: "LOSS", payout: 0 });
                }
            });

            const arenaRef = doc(db, "settings", "arena");
            const arenaSnap = await getDoc(arenaRef);
            let history = arenaSnap.exists() ? (arenaSnap.data().history || []) : [];
            history.push(winner);
            if(history.length > 100) history.shift();
            batch.update(arenaRef, { history: history, isLocked: true, resetTime: new Date() });

            await batch.commit();
            alert("Fight Settled & Hype Reset.");
        };

        window.checkUser = async () => {
            const username = document.getElementById('target-username').value.trim().toLowerCase();
            const q = query(collection(db, "users"), where("username", "==", username));
            const snap = await getDocs(q);
            if (!snap.empty) {
                const p = snap.docs[0];
                activePlayerId = p.id;
                document.getElementById('res-name').innerText = p.data().username.toUpperCase();
                document.getElementById('res-bal').innerText = "₱" + (p.data().balance || 0).toLocaleString();
                document.getElementById('player-preview').style.display = "block";
            } else alert("User not found");
        };

        window.confirmLoad = async () => {
            const amt = parseInt(document.getElementById('load-amt').value);
            if (!activePlayerId || isNaN(amt)) return;
            if (confirm(`Load ₱${amt}?`)) {
                await updateDoc(doc(db, "users", activePlayerId), { balance: increment(amt) });
                await addDoc(collection(db, "wallet_logs"), { uid: auth.currentUser.uid, type: "LOAD", toUser: document.getElementById('res-name').innerText, amount: amt, timestamp: new Date() });
                alert("Success");
                location.reload();
            }
        };

        window.quickSelectUser = (u) => { document.getElementById('target-username').value = u; checkUser(); };
        window.updatePayout = async () => {
            const newVal = parseFloat(document.getElementById('payout-multiplier').value);
            await updateDoc(doc(db, "settings", "arena"), { payoutMultiplier: newVal });
            alert("Payout Saved");
        };
    </script>
</body>
</html>
