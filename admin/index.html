<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Suite | NEXUS</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .admin-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .insight-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .insight-card { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .insight-card h4 { color: #888; font-size: 0.7rem; margin: 0; text-transform: uppercase; }
        .insight-card .val { color: var(--gold); font-size: 1.5rem; font-weight: bold; margin-top: 5px; display: block; }

        .panel { background: #111; border-radius: 15px; border: 1px solid #333; padding: 20px; margin-bottom: 20px; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; margin-bottom: 15px; padding-bottom: 10px; }
        
        /* WITHDRAWAL TICKETS */
        .w-request { background: #000; padding: 15px; border-radius: 10px; border-left: 4px solid var(--gold); margin-bottom: 12px; }
        .w-details { font-size: 0.8rem; color: #ccc; margin-top: 5px; line-height: 1.4; }
        .w-actions { display: flex; gap: 10px; margin-top: 12px; }
        .btn-sm { padding: 8px 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        .btn-approve { background: #00ff88; color: black; }
        .btn-reject { background: #ff4444; color: white; }

        .log-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; color: #eee; }
        .log-table th { text-align: left; color: #555; padding: 10px; border-bottom: 1px solid #222; text-transform: uppercase; }
        .log-table td { padding: 12px 10px; border-bottom: 1px solid #1a1a1a; }
        
        .type-cashin { color: #00ff88; font-weight: bold; }
        .search-box { background: #000; border: 1px solid var(--gold); padding: 15px; border-radius: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        
        @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo" style="color:var(--gold); font-family:'Goldman';">NEXUS ADMIN</div>
        <div style="color: #00ff88; font-size: 0.8rem;">● SYSTEM ONLINE</div>
    </nav>

    <div class="admin-grid">
        <div class="main-admin">
            
            <div class="insight-row">
                <div class="insight-card"><h4>House Bank</h4><span class="val" id="stat-total-bank">₱0</span></div>
                <div class="insight-card"><h4>Active Players</h4><span class="val" id="stat-players">0</span></div>
                <div class="insight-card"><h4>Pending W.</h4><span class="val" id="stat-pending-w" style="color:#ffaa00;">₱0</span></div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h3 style="margin:0; color: var(--gold);">WITHDRAWAL REQUESTS</h3>
                    <span class="text-muted" id="w-count">0 PENDING</span>
                </div>
                <div id="withdrawal-list">
                    <p style="text-align:center; color:#444; padding:20px;">No pending withdrawals.</p>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h3 style="margin:0; color: var(--gold);">MASTER TRANSACTION LOG</h3>
                </div>
                <table class="log-table">
                    <thead><tr><th>Time</th><th>User</th><th>Type</th><th>Amount</th></tr></thead>
                    <tbody id="master-log-list"></tbody>
                </table>
            </div>

            <div class="panel">
                <div class="panel-header"><h3 style="margin:0; color: var(--gold);">LIVE BETS</h3></div>
                <table class="log-table">
                    <thead><tr><th>User</th><th>Side</th><th>Bet</th><th>Status</th><th>Profit</th></tr></thead>
                    <tbody id="play-history-list"></tbody>
                </table>
            </div>
        </div>

        <div class="sidebar-admin">
            <div class="panel" style="border: 1px solid var(--gold);">
                <h3 style="margin:0; color: var(--gold); margin-bottom:10px;">FIGHT CONTROL</h3>
                <div style="display: grid; grid-template-columns: 1fr; gap: 8px;">
                    <button onclick="settleFight('MERON')" style="background:#ff4444; color:white; padding:12px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">MERON</button>
                    <button onclick="settleFight('WALA')" style="background:#4444ff; color:white; padding:12px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">WALA</button>
                    <button onclick="settleFight('DRAW')" style="background:#333; color:white; padding:12px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">DRAW</button>
                </div>
            </div>

            <div class="panel search-box">
                <h3 style="margin-top:0; font-size: 1rem; color: var(--gold);">CASH-IN TOOL</h3>
                <input type="text" id="target-username" placeholder="Username">
                <button class="btn-main btn-dark" id="btn-check" style="width:100%; margin-bottom:10px; background:#222; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;">SEARCH</button>
                <div id="player-preview" style="display:none; background:#0a0a0a; padding:10px; border-radius:5px; margin-bottom:15px; border-left:3px solid var(--gold);">
                    <span id="res-name" style="font-weight:bold; color:white;">---</span><br>
                    <span id="res-bal" style="color:#00ff88; font-weight:bold;">₱0</span>
                </div>
                <input type="number" id="load-amt" placeholder="Amount">
                <button class="btn-main btn-gold" id="btn-confirm" style="width:100%; background:var(--gold); padding:15px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">SEND CREDITS</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, getDocs, updateDoc, increment, collection, query, where, orderBy, limit, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activePlayerId = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const adminSnap = await getDoc(doc(db, "users", user.uid));
                if (adminSnap.exists() && adminSnap.data().isAdmin) {
                    initDashboard();
                } else { window.location.href = "/"; }
            } else { window.location.href = "/login/"; }
        });

        function initDashboard() {
            // Stats
            onSnapshot(collection(db, "users"), (snap) => {
                let total = 0;
                document.getElementById('stat-players').innerText = snap.size;
                snap.forEach(u => total += (u.data().balance || 0));
                document.getElementById('stat-total-bank').innerText = "₱" + total.toLocaleString();
            });

            // Withdrawal Listener (Simplified Query to avoid index issues)
            onSnapshot(query(collection(db, "withdrawals"), where("status", "==", "PENDING")), (snap) => {
                const list = document.getElementById('withdrawal-list');
                const statPending = document.getElementById('stat-pending-w');
                let totalP = 0;
                list.innerHTML = snap.empty ? '<p style="text-align:center; color:#444; padding:20px;">No pending withdrawals.</p>' : '';
                document.getElementById('w-count').innerText = snap.size + " PENDING";

                snap.forEach(req => {
                    const d = req.data();
                    totalP += d.amount;
                    list.innerHTML += `
                        <div class="w-request">
                            <strong style="color:var(--gold)">${d.username.toUpperCase()}</strong> 
                            <span style="float:right; font-weight:bold; color:#00ff88;">₱${d.amount.toLocaleString()}</span>
                            <div class="w-details">
                                BANK: ${d.bank} | NAME: ${d.accountName}<br>
                                ACCT: ${d.accountNumber}
                            </div>
                            <div class="w-actions">
                                <button class="btn-sm btn-approve" onclick="handleWithdraw('${req.id}', 'APPROVED')">PAID</button>
                                <button class="btn-sm btn-reject" onclick="handleWithdraw('${req.id}', 'REJECTED', '${d.uid}', ${d.amount})">REJECT</button>
                            </div>
                        </div>`;
                });
                statPending.innerText = "₱" + totalP.toLocaleString();
            });

            // Master Logs Listener
            onSnapshot(query(collection(db, "logs"), orderBy("timestamp", "desc"), limit(15)), (snap) => {
                const l = document.getElementById('master-log-list');
                l.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const time = d.timestamp?.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) || '--:--';
                    l.innerHTML += `<tr><td>${time}</td><td>${d.toUsername}</td><td class="type-cashin">CASH-IN</td><td style="color:#00ff88;">+₱${d.amount}</td></tr>`;
                });
            });

            // Play History
            onSnapshot(query(collection(db, "bets"), orderBy("timestamp", "desc"), limit(10)), (snap) => {
                const h = document.getElementById('play-history-list');
                h.innerHTML = "";
                snap.forEach(b => {
                    const d = b.data();
                    const statusClass = d.status.toLowerCase();
                    h.innerHTML += `<tr><td>${d.username}</td><td>${d.side}</td><td>₱${d.amount}</td><td class="${statusClass}">${d.status}</td><td>${d.status==='WIN' ? '+₱'+(d.payout-d.amount) : '---'}</td></tr>`;
                });
            });
        }

        window.handleWithdraw = async (id, status, pUid, amt) => {
            if(!confirm(`Mark as ${status}?`)) return;
            try {
                if(status === 'REJECTED') {
                    await updateDoc(doc(db, "users", pUid), { balance: increment(amt) });
                }
                await updateDoc(doc(db, "withdrawals", id), { status: status });
                alert("Success");
            } catch (e) { alert("Error"); }
        };

        window.checkUser = async () => {
            const user = document.getElementById('target-username').value.trim().toLowerCase();
            const q = query(collection(db, "users"), where("username", "==", user));
            const snap = await getDocs(q);
            if(!snap.empty) {
                const p = snap.docs[0];
                activePlayerId = p.id;
                document.getElementById('res-name').innerText = p.data().username.toUpperCase();
                document.getElementById('res-bal').innerText = "₱" + (p.data().balance || 0).toLocaleString();
                document.getElementById('player-preview').style.display = "block";
            } else { alert("User not found."); }
        };

        window.confirmLoad = async () => {
            const amt = parseInt(document.getElementById('load-amt').value);
            if(!activePlayerId || isNaN(amt)) return alert("Select user and amount.");
            if(confirm(`Send ₱${amt}?`)) {
                await updateDoc(doc(db, "users", activePlayerId), { balance: increment(amt) });
                await addDoc(collection(db, "logs"), { 
                    agent: auth.currentUser.uid, 
                    toUsername: document.getElementById('res-name').innerText, 
                    amount: amt, 
                    timestamp: new Date() 
                });
                alert("Success");
                document.getElementById('load-amt').value = "";
            }
        };

        window.settleFight = async (winner) => {
            const fightId = "125";
            if(!confirm(`Declare ${winner} winner?`)) return;
            const q = query(collection(db, "bets"), where("fightId", "==", fightId), where("status", "==", "PENDING"));
            const snap = await getDocs(q);
            for (const b of snap.docs) {
                const bd = b.data();
                if(bd.side === winner) {
                    const pay = Math.floor(bd.amount * 1.9);
                    await updateDoc(doc(db, "users", bd.uid), { balance: increment(pay) });
                    await updateDoc(doc(db, "bets", b.id), { status: "WIN", payout: pay });
                } else if(winner === "DRAW") {
                    await updateDoc(doc(db, "users", bd.uid), { balance: increment(bd.amount) });
                    await updateDoc(doc(db, "bets", b.id), { status: "DRAW", payout: bd.amount });
                } else {
                    await updateDoc(doc(db, "bets", b.id), { status: "LOSS", payout: 0 });
                }
            }
            alert("Fight Settled.");
        };
    </script>
</body>
</html>
