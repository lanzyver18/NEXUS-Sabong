<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Control | NEXUS</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .admin-box { background: #111; padding: 25px; border-radius: 15px; border: 1px solid var(--gold); margin-top: 20px; }
        .player-preview { background: #000; padding: 15px; border-radius: 8px; margin: 15px 0; display: none; border-left: 4px solid var(--gold); }
        .log-container { margin-top: 30px; background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .log-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .log-item:last-child { border: none; }
        .log-amt { color: #00ff88; font-weight: bold; }
        .btn-action { cursor: pointer !important; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; margin-top: 10px; transition: 0.2s; }
        .gold { background: var(--gold); color: black; }
        .search { background: #333; color: white; margin-bottom: 15px; }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="/" style="color: var(--gold); text-decoration: none;">← ARENA LOBBY</a>
        <div class="balance-box" style="color: #00ff88;">AGENT AUTHORIZED</div>
    </nav>

    <div style="max-width: 450px; margin: auto; padding: 20px;">
        <h2 style="text-align: center; color: var(--gold);">AGENT TRANSFER TOOL</h2>
        
        <div class="admin-box">
            <label class="text-muted">FIND PLAYER ID</label>
            <input type="text" id="target-uid" placeholder="Paste Player UID here...">
            <button class="btn-action search" id="btn-search">CHECK PLAYER BALANCE</button>
            
            <div id="player-info" class="player-preview">
                <strong id="display-name" style="color: white;">---</strong><br>
                <span class="text-muted">Current Wallet: ₱<span id="display-balance" style="color: #00ff88;">0</span></span>
            </div>

            <label class="text-muted">AMOUNT TO SEND</label>
            <input type="number" id="amount-to-add" placeholder="Ex: 500">
            
            <button class="btn-action gold" id="btn-confirm-load">CONFIRM & SEND CREDITS</button>
        </div>

        <div class="log-container">
            <h3 style="font-size: 0.9rem; color: var(--gold); margin-top: 0;">RECENT LOAD HISTORY</h3>
            <div id="history-list">
                <p class="text-muted" style="text-align: center; padding: 10px;">No transfers yet today.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, increment, collection, addDoc, query, where, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a",
            measurementId: "G-W2B0R09D8L"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 3. SECURITY GATE: Ensure user is Admin
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const adminSnap = await getDoc(doc(db, "users", user.uid));
                if (!adminSnap.exists() || !adminSnap.data().isAdmin) {
                    alert("ACCESS DENIED: Agents Only.");
                    window.location.href = "/";
                } else {
                    loadHistory(user.uid); // Load the logs once authorized
                }
            } else { window.location.href = "/login/"; }
        });

        // BALANCE CHECK LOGIC
        document.getElementById('btn-search').onclick = async () => {
            const uid = document.getElementById('target-uid').value.trim();
            if (!uid) return alert("Please enter a Player ID.");

            const playerSnap = await getDoc(doc(db, "users", uid));
            if (playerSnap.exists()) {
                document.getElementById('display-name').innerText = playerSnap.data().fullName || "Anonymous Player";
                document.getElementById('display-balance').innerText = (playerSnap.data().balance || 0).toLocaleString();
                document.getElementById('player-info').style.display = "block";
            } else {
                alert("ID not found. Double check the UID.");
            }
        };

        // TRANSFER & LOGGING LOGIC
        document.getElementById('btn-confirm-load').onclick = async () => {
            const uid = document.getElementById('target-uid').value.trim();
            const amount = parseInt(document.getElementById('amount-to-add').value);

            if (!uid || isNaN(amount) || amount <= 0) return alert("Invalid Amount.");

            if (confirm(`Confirm Transfer of ₱${amount}?`)) {
                try {
                    // Update Player
                    await updateDoc(doc(db, "users", uid), { balance: increment(amount) });

                    // Create Transaction Log
                    await addDoc(collection(db, "logs"), {
                        agentId: auth.currentUser.uid,
                        playerUid: uid,
                        amount: amount,
                        timestamp: new Date()
                    });

                    alert("CREDITS SENT SUCCESSFULLY!");
                    document.getElementById('amount-to-add').value = "";
                    document.getElementById('btn-search').click(); // Refresh display
                } catch (e) { alert("Permission Error! Check Firestore Rules."); }
            }
        };

        // HISTORY LISTENER
        function loadHistory(agentId) {
            const q = query(collection(db, "logs"), where("agentId", "==", agentId), orderBy("timestamp", "desc"), limit(5));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('history-list');
                if (snapshot.empty) return;
                list.innerHTML = "";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    list.innerHTML += `
                        <div class="log-item">
                            <span>ID: ...${data.playerUid.slice(-5)}</span>
                            <span class="log-amt">+₱${data.amount}</span>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
