<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard | NEXUS</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .admin-wrapper { max-width: 450px; margin: 40px auto; padding: 0 20px; }
        .admin-card { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .player-info-box { background: #000; padding: 15px; border-radius: 10px; border-left: 4px solid #D4AF37; margin: 15px 0; display: none; }
        
        .input-label { color: #888; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        .btn-main { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; margin-bottom: 10px; }
        .btn-gold { background: #D4AF37; color: black; }
        .btn-dark { background: #333; color: white; }
        .btn-main:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-main:active { transform: translateY(0); }

        .log-container { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #222; }
        .log-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.8rem; color: #ccc; }
        .log-amt { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="/" style="color: #D4AF37; text-decoration: none; font-weight: bold;">← ARENA</a>
        <div style="color: #00ff88; font-weight: bold; font-size: 0.8rem;">AGENT AUTHORIZED</div>
    </nav>

    <div class="admin-wrapper">
        <h2 style="color: #D4AF37; text-align: center; letter-spacing: 2px;">AGENT TRANSFER</h2>

        <div class="admin-card">
            <span class="input-label">1. Find Player by Username</span>
            <input type="text" id="search-username" placeholder="Enter Username (e.g. bosskenny)">
            <button class="btn-main btn-dark" id="btn-lookup">CHECK BALANCE</button>

            <div id="player-preview" class="player-info-box">
                <strong id="res-name" style="color: white; font-size: 1.1rem;">---</strong><br>
                <span style="color: #888;">Current Wallet: </span>
                <span id="res-balance" style="color: #00ff88; font-weight: bold;">₱0.00</span>
            </div>

            <span class="input-label">2. Amount to Transfer</span>
            <input type="number" id="load-amount" placeholder="Enter Amount (e.g. 500)">
            <button class="btn-main btn-gold" id="btn-send">CONFIRM & SEND CREDITS</button>
        </div>

        <div class="log-container">
            <h3 style="color: #D4AF37; font-size: 0.9rem; margin-top: 0;">RECENT LOAD HISTORY</h3>
            <div id="history-list">
                <p style="color: #555; text-align: center; font-size: 0.8rem;">No transfers recorded today.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, increment, collection, query, where, getDocs, addDoc, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let activePlayerUid = null;

        // 1. SECURITY GATE: Ensure user is Admin
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const adminSnap = await getDoc(doc(db, "users", user.uid));
                if (!adminSnap.exists() || adminSnap.data().isAdmin !== true) {
                    alert("ACCESS DENIED: Agents Only.");
                    window.location.href = "/";
                } else {
                    loadHistory(user.uid);
                }
            } else { window.location.href = "/login/"; }
        });

        // 2. SEARCH PLAYER LOGIC
        document.getElementById('btn-lookup').onclick = async () => {
            const usernameInput = document.getElementById('search-username').value.trim().toLowerCase();
            if (!usernameInput) return alert("Please type a username.");

            const q = query(collection(db, "users"), where("username", "==", usernameInput));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                const playerDoc = querySnapshot.docs[0];
                activePlayerUid = playerDoc.id;
                document.getElementById('res-name').innerText = playerDoc.data().username.toUpperCase();
                document.getElementById('res-balance').innerText = "₱" + (playerDoc.data().balance || 0).toLocaleString();
                document.getElementById('player-preview').style.display = "block";
            } else {
                alert("Player username not found!");
                document.getElementById('player-preview').style.display = "none";
                activePlayerUid = null;
            }
        };

        // 3. TRANSFER LOGIC
        document.getElementById('btn-send').onclick = async () => {
            const amount = parseInt(document.getElementById('load-amount').value);
            if (!activePlayerUid) return alert("Find a player first!");
            if (isNaN(amount) || amount === 0) return alert("Enter a valid amount.");

            if (confirm(`Send ₱${amount} to ${document.getElementById('res-name').innerText}?`)) {
                try {
                    // Update Player Balance
                    await updateDoc(doc(db, "users", activePlayerUid), {
                        balance: increment(amount)
                    });

                    // Create History Log
                    await addDoc(collection(db, "logs"), {
                        agentId: auth.currentUser.uid,
                        toUsername: document.getElementById('res-name').innerText,
                        amount: amount,
                        timestamp: new Date()
                    });

                    alert("CREDITS TRANSFERRED SUCCESSFULLY!");
                    document.getElementById('load-amount').value = "";
                    document.getElementById('btn-lookup').click(); // Refresh display
                } catch (e) {
                    alert("Error: Check your Firestore Permissions.");
                }
            }
        };

        // 4. LOAD HISTORY LOGS
        function loadHistory(agentId) {
            const logQ = query(collection(db, "logs"), where("agentId", "==", agentId), orderBy("timestamp", "desc"), limit(5));
            onSnapshot(logQ, (snap) => {
                const logDiv = document.getElementById('history-list');
                if (snap.empty) return;
                logDiv.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    logDiv.innerHTML += `
                        <div class="log-item">
                            <span>To: ${d.toUsername}</span>
                            <span class="log-amt">${d.amount > 0 ? '+' : ''}₱${d.amount}</span>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
