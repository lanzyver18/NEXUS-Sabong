<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard | NEXUS</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Force Button Interactivity */
        .btn-action {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer !important; /* Forces the hand icon */
            transition: transform 0.1s, filter 0.2s;
            text-transform: uppercase;
        }
        .btn-action:active { transform: scale(0.98); filter: brightness(0.8); }
        .gold { background: #D4AF37; color: black; }
        .search-btn { background: #333; color: white; margin-bottom: 20px; }
        
        .admin-box { 
            background: #111; 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            margin-top: 20px;
        }
        .player-preview { 
            background: #000; 
            padding: 15px; 
            border-radius: 8px; 
            margin: 15px 0; 
            display: none; 
            border-left: 4px solid #D4AF37; 
        }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .text-muted { color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="/" style="color: #D4AF37; text-decoration: none;">← LOBBY</a>
        <div style="color: #00ff88; font-weight: bold;">AGENT MODE</div>
    </nav>

    <div style="max-width: 450px; margin: auto; padding: 20px;">
        <h2 style="color: #D4AF37; text-align: center;">AGENT TRANSFER TOOL</h2>
        
        <div class="admin-box">
            <label class="text-muted">1. FIND PLAYER BY ID</label>
            <input type="text" id="target-uid" placeholder="Paste Player UID here...">
            <button class="btn-action search-btn" id="btn-search">SEARCH PLAYER</button>
            
            <div id="player-info" class="player-preview">
                <strong id="display-name" style="color: white;">---</strong><br>
                <span class="text-muted">Current Balance: ₱<span id="display-balance" style="color: #00ff88;">0</span></span>
            </div>

            <label class="text-muted">2. AMOUNT TO LOAD</label>
            <input type="number" id="amount-to-add" placeholder="Example: 500">
            
            <button class="btn-action gold" id="btn-confirm-load">CONFIRM & LOAD CREDITS</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // Firebase Config (Using your provided keys)
        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a",
            measurementId: "G-W2B0R09D8L"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Security Check
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (!snap.exists() || !snap.data().isAdmin) {
                    alert("Unauthorized! Redirecting...");
                    window.location.href = "/";
                }
            } else { window.location.href = "/login/"; }
        });

        // Search Logic
        document.getElementById('btn-search').onclick = async () => {
            const uid = document.getElementById('target-uid').value.trim();
            if (!uid) return alert("Paste a UID first");

            const playerSnap = await getDoc(doc(db, "users", uid));
            if (playerSnap.exists()) {
                document.getElementById('display-name').innerText = playerSnap.data().fullName || playerSnap.data().email;
                document.getElementById('display-balance').innerText = (playerSnap.data().balance || 0).toLocaleString();
                document.getElementById('player-info').style.display = "block";
            } else {
                alert("Player not found!");
                document.getElementById('player-info').style.display = "none";
            }
        };

        // Transfer Logic
        document.getElementById('btn-confirm-load').onclick = async () => {
            const uid = document.getElementById('target-uid').value.trim();
            const amount = parseInt(document.getElementById('amount-to-add').value);

            if (!uid || isNaN(amount) || amount <= 0) {
                alert("Please check the ID and Amount.");
                return;
            }

            if (confirm(`Send ₱${amount} to this player?`)) {
                try {
                    const playerRef = doc(db, "users", uid);
                    await updateDoc(playerRef, {
                        balance: increment(amount)
                    });
                    alert("SUCCESS: Credits Loaded!");
                    location.reload(); // Refresh to update view
                } catch (e) {
                    alert("ERROR: Check your Firestore Rules permissions!");
                }
            }
        };
    </script>
</body>
</html>
