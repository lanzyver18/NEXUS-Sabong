<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NEXUS</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="logo">NEXUS</div>
        <h2>PLAYER LOGIN</h2>
        
        <input type="text" id="login-username" placeholder="Username">
        <input type="password" id="login-pass" placeholder="Password">
        
        <button class="btn-action gold" id="btn-login">SIGN IN</button>
        <p class="auth-footer">New here? <a href="/register/">Register</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('btn-login').onclick = async () => {
            const user = document.getElementById('login-username').value.trim().toLowerCase();
            const pass = document.getElementById('login-pass').value;

            try {
                const fakeEmail = `${user}@nexus-sabong.com`;
                await signInWithEmailAndPassword(auth, fakeEmail, pass);
                window.location.href = "/";
            } catch (error) { alert("Login failed. Check username/password."); }
        };
    </script>
</body>
</html>
