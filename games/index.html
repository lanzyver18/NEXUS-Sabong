<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Arena | NEXUS</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .arena-container { max-width: 1200px; margin: 20px auto; display: grid; grid-template-columns: 1fr 350px; gap: 20px; padding: 0 15px; }
        
        .video-player { background: #000; aspect-ratio: 16/9; border: 2px solid #222; border-radius: 12px; overflow: hidden; position: relative; }
        .live-tag { position: absolute; top: 15px; left: 15px; background: #ff4444; color: white; padding: 5px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; animation: pulse 1.5s infinite; z-index: 10; }
        
        /* GAME TREND / ROADMAP */
        .trend-container { background: #000; padding: 12px; border-radius: 12px; border: 1px solid #222; margin-bottom: 15px; display: flex; gap: 6px; overflow-x: auto; min-height: 30px; align-items: center; }
        .trend-dot { min-width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: bold; color: white; flex-shrink: 0; font-family: 'Goldman'; }
        .dot-meron { background: #ff4444; box-shadow: 0 0 10px rgba(255,68,68,0.4); }
        .dot-wala { background: #4444ff; box-shadow: 0 0 10px rgba(68,68,255,0.4); }
        .dot-draw { background: #ffaa00; }

        /* VOLUME BAR & STATS */
        .vol-header { display: flex; justify-content: space-between; font-size: 0.65rem; color: #888; margin-bottom: 5px; font-family: 'Goldman'; }
        .volume-container { margin-bottom: 15px; background: #222; height: 12px; border-radius: 6px; overflow: hidden; display: flex; border: 1px solid #333; }
        .vol-meron { background: #ff4444; width: 50%; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        .vol-wala { background: #4444ff; width: 50%; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }

        .betting-panel { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; display: flex; flex-direction: column; }
        
        /* BET CARDS - LOCKED STATE */
        .bet-card { border: 2px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 12px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; }
        .bet-card.locked { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.5); }
        .meron { border-color: #ff4444; color: #ff4444; background: rgba(255, 68, 68, 0.05); }
        .wala { border-color: #4444ff; color: #4444ff; background: rgba(68, 68, 255, 0.05); }
        .meron:not(.locked):hover { background: #ff4444; color: white; }
        .wala:not(.locked):hover { background: #4444ff; color: white; }
        .odds { font-family: 'Goldman'; font-size: 1.8rem; display: block; margin: 2px 0; }

        .chip-row { display: flex; gap: 8px; margin: 15px 0; overflow-x: auto; padding-bottom: 5px; }
        .chip { background: #222; border: 1px solid #444; color: #eee; padding: 8px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .chip:hover { border-color: var(--gold); color: var(--gold); }

        .bet-input { background: #000; border: 1px solid #444; color: #00ff88; padding: 15px; width: 100%; border-radius: 8px; text-align: center; font-size: 1.2rem; font-family: 'Goldman'; box-sizing: border-box; }

        .history-list { margin-top: 20px; flex-grow: 1; border-top: 1px solid #222; padding-top: 15px; }
        .history-item { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
        
        .top-nav { position: relative; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px 12px 75px; background: #000; border-bottom: 2px solid #222; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @media (max-width: 900px) { .arena-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo" style="color:var(--gold); font-family:'Goldman'; font-weight:bold; font-size:1.2rem;">NEXUS ARENA</div>
        <div style="color: #00ff88; font-weight: bold; font-family: 'Goldman';">₱<span id="display-balance">0.00</span></div>
    </nav>

    <div class="arena-container">
        <div class="main-content">
            <div class="trend-container" id="game-trend">
                <span style="color:#444; font-size:0.6rem; text-transform:uppercase; letter-spacing:1px;">Syncing Roadmap...</span>
            </div>

            <div class="video-player">
                <div class="live-tag" id="live-status-tag">LIVE FEED</div>
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/live_stream?channel=YOUR_CHANNEL_ID" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <div class="betting-panel">
            <h3 style="text-align: center; color: var(--gold); margin-top: 0; font-family: 'Goldman'; letter-spacing: 1px;">FIGHT CONTROL</h3>
            
            <div class="vol-header">
                <span id="txt-vol-meron">MERON 50%</span>
                <span id="txt-vol-wala">50% WALA</span>
            </div>
            <div class="volume-container">
                <div id="bar-meron" class="vol-meron"></div>
                <div id="bar-wala" class="vol-wala"></div>
            </div>

            <div class="bet-card meron" id="card-meron" onclick="placeBet('MERON')">
                <small>BET ON</small>
                <span class="odds">MERON</span>
                <small id="meron-payout-label">Payout: ...</small>
            </div>

            <div class="bet-card wala" id="card-wala" onclick="placeBet('WALA')">
                <small>BET ON</small>
                <span class="odds">WALA</span>
                <small id="wala-payout-label">Payout: ...</small>
            </div>

            <div class="chip-row">
                <div class="chip" onclick="setBet(100)">₱100</div>
                <div class="chip" onclick="setBet(500)">₱500</div>
                <div class="chip" onclick="setBet(1000)">₱1K</div>
                <div class="chip" onclick="setBet(5000)">₱5K</div>
                <div class="chip" onclick="setBet('MAX')">MAX</div>
            </div>

            <input type="number" id="bet-amount" class="bet-input" placeholder="Amount">
            
            <div class="history-list">
                <h4 style="font-size: 0.7rem; color: #555; margin-bottom: 10px; letter-spacing: 1px;">MY RECENT BETS</h4>
                <div id="local-bet-history"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, addDoc, collection, getDoc, writeBatch, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
        import { injectMenu } from "/menu.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseAuth = auth;
        window.firebaseDb = db;
        injectMenu();

        let currentBalance = 0;
        let currentUserData = null;
        let isLocked = false;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                onSnapshot(userRef, (snapshot) => {
                    if (snapshot.exists()) {
                        currentUserData = snapshot.data();
                        currentBalance = currentUserData.balance || 0;
                        document.getElementById('display-balance').innerText = currentBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
                    }
                });

                // Arena State Listener (Lock/Multiplier/Trend)
                onSnapshot(doc(db, "settings", "arena"), (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        
                        // 1. Handle Betting Lock
                        isLocked = data.isLocked || false;
                        const cards = [document.getElementById('card-meron'), document.getElementById('card-wala')];
                        const liveTag = document.getElementById('live-status-tag');

                        cards.forEach(c => c.classList.toggle('locked', isLocked));
                        if(isLocked) {
                            liveTag.innerText = "BETTING CLOSED";
                            liveTag.style.background = "#555";
                            liveTag.style.animation = "none";
                        } else {
                            liveTag.innerText = "LIVE FEED";
                            liveTag.style.background = "#ff4444";
                            liveTag.style.animation = "pulse 1.5s infinite";
                        }

                        // 2. Multipliers
                        let multiplier = data.payoutMultiplier || 1.90;
                        document.getElementById('meron-payout-label').innerText = `Payout: ${multiplier.toFixed(2)}`;
                        document.getElementById('wala-payout-label').innerText = `Payout: ${multiplier.toFixed(2)}`;

                        // 3. Roadmap
                        const history = data.history || [];
                        const trendEl = document.getElementById('game-trend');
                        trendEl.innerHTML = "";
                        history.slice(-25).forEach(res => {
                            const dot = document.createElement('div');
                            dot.className = `trend-dot dot-${res.toLowerCase()}`;
                            dot.innerText = res.charAt(0);
                            trendEl.appendChild(dot);
                        });
                    }
                });

                // Global Betting Volume
                onSnapshot(query(collection(db, "bets"), where("status", "==", "PENDING")), (snap) => {
                    let mTotal = 0, wTotal = 0;
                    snap.forEach(d => {
                        if (d.data().side === 'MERON') mTotal += d.data().amount;
                        else wTotal += d.data().amount;
                    });
                    const total = mTotal + wTotal;
                    const mPerc = total > 0 ? Math.round((mTotal/total)*100) : 50;
                    const wPerc = 100 - mPerc;
                    
                    document.getElementById('bar-meron').style.width = mPerc + "%";
                    document.getElementById('bar-wala').style.width = wPerc + "%";
                    document.getElementById('txt-vol-meron').innerText = `MERON ${mPerc}%`;
                    document.getElementById('txt-vol-wala').innerText = `${wPerc}% WALA`;
                });

                // Session history
                onSnapshot(query(collection(db, "bets"), where("uid", "==", user.uid), orderBy("timestamp", "desc"), limit(5)), (snap) => {
                    const hist = document.getElementById('local-bet-history');
                    hist.innerHTML = snap.empty ? '<p style="text-align:center; color:#333; font-size:0.7rem; margin-top:10px;">No bets yet.</p>' : "";
                    snap.forEach(doc => {
                        const b = doc.data();
                        const color = b.side === 'MERON' ? '#ff4444' : '#4444ff';
                        hist.innerHTML += `<div class="history-item"><span>₱${b.amount.toLocaleString()} <b style="color:${color}">${b.side}</b></span><span style="color:${b.status === 'WIN' ? '#00ff88' : '#666'}">${b.status}</span></div>`;
                    });
                });

            } else { window.location.href = "/login/"; }
        });

        window.setBet = (val) => {
            const input = document.getElementById('bet-amount');
            input.value = (val === 'MAX') ? Math.floor(currentBalance) : val;
        };

        window.placeBet = async (side) => {
            if (isLocked) return alert("Betting is currently CLOSED.");
            
            const amount = parseInt(document.getElementById('bet-amount').value);
            if (isNaN(amount) || amount < 100) return alert("Min bet ₱100");
            if (amount > currentBalance) return alert("Insufficient Balance!");

            if (confirm(`Confirm ₱${amount} on ${side}?`)) {
                try {
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: increment(-amount) });
                    await addDoc(collection(db, "bets"), {
                        uid: auth.currentUser.uid, username: currentUserData.username,
                        amount, side, fightId: "125", status: "PENDING", timestamp: new Date()
                    });
                    // Commission logic remains the same...
                    distributeCommissions(amount, currentUserData.uplinePath);
                } catch (e) { alert("Betting Error!"); }
            }
        };

        async function distributeCommissions(betAmount, uplinePath) {
            if (!uplinePath) return;
            const batch = writeBatch(db);
            let distributedSoFar = 0;
            const reversedPath = [...uplinePath].reverse();
            for (const uplineUid of reversedPath) {
                const snap = await getDoc(doc(db, "users", uplineUid));
                if (snap.exists()) {
                    const u = snap.data();
                    const spread = (u.commissionRate || 0) - distributedSoFar;
                    if (spread > 0) {
                        const earned = betAmount * (spread / 100);
                        batch.update(doc(db, "users", uplineUid), { balance: increment(earned), totalTurnover: increment(betAmount) });
                        batch.set(doc(collection(db, "wallet_logs")), { uid: uplineUid, type: "COMMISSION", amount: earned, fromUser: currentUserData.username, status: "APPROVED", timestamp: new Date() });
                        distributedSoFar = u.commissionRate;
                    }
                }
            }
            await batch.commit();
        }
    </script>
</body>
</html>
