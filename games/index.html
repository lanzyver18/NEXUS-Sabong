<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Arena | NEXUS</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .arena-container { max-width: 1000px; margin: 20px auto; display: grid; grid-template-columns: 1fr 320px; gap: 20px; padding: 0 15px; }
        .video-player { background: #000; aspect-ratio: 16/9; border: 2px solid #222; border-radius: 12px; overflow: hidden; position: relative; }
        .live-tag { position: absolute; top: 15px; left: 15px; background: #ff4444; color: white; padding: 5px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; animation: pulse 1.5s infinite; }
        
        .betting-panel { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .bet-card { border: 2px solid #333; padding: 20px; border-radius: 10px; margin-bottom: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        .meron { border-color: #ff4444; color: #ff4444; }
        .wala { border-color: #4444ff; color: #4444ff; }
        .meron:hover { background: #ff4444; color: white; }
        .wala:hover { background: #4444ff; color: white; }
        
        .odds { font-size: 1.8rem; font-weight: bold; display: block; margin: 5px 0; }
        .bet-input { background: #000; border: 1px solid #444; color: white; padding: 12px; width: 100%; border-radius: 8px; margin-top: 10px; text-align: center; font-size: 1.1rem; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @media (max-width: 850px) { .arena-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="/" style="color: var(--gold); text-decoration: none; font-weight: bold;">← LOBBY</a>
        <div class="balance-box">₱<span id="display-balance">0.00</span></div>
    </nav>

    <div class="arena-container">
        <div class="video-player">
            <div class="live-tag">LIVE FEED</div>
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/live_stream?channel=YOUR_CHANNEL_ID" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="betting-panel">
            <h3 style="text-align: center; color: var(--gold); margin-top: 0;">FIGHT #125</h3>
            
            <div class="bet-card meron" onclick="placeBet('MERON')">
                <small>BET ON</small>
                <span class="odds">MERON</span>
                <small>Payout: 1.90</small>
            </div>

            <div class="bet-card wala" onclick="placeBet('WALA')">
                <small>BET ON</small>
                <span class="odds">WALA</span>
                <small>Payout: 1.80</small>
            </div>

            <input type="number" id="bet-amount" class="bet-input" placeholder="Bet Amount (₱)" value="100">
            <p style="font-size: 0.65rem; color: #666; text-align: center; margin-top: 10px;">Min Bet: ₱100 | Max Bet: ₱10,000</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, addDoc, collection, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentBalance = 0;
        let currentUserData = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                
                // Keep track of user data for bet records
                const userSnap = await getDoc(userRef);
                currentUserData = userSnap.data();

                // Live Balance Listener
                onSnapshot(userRef, (snapshot) => {
                    if (snapshot.exists()) {
                        currentBalance = snapshot.data().balance || 0;
                        document.getElementById('display-balance').innerText = currentBalance.toLocaleString(undefined, {minimumFractionDigits: 2});
                    }
                });
            } else { window.location.href = "/login/"; }
        });

        window.placeBet = async (side) => {
            const amount = parseInt(document.getElementById('bet-amount').value);

            if (isNaN(amount) || amount < 100) return alert("Minimum bet is ₱100");
            if (amount > currentBalance) return alert("Insufficient Balance!");

            if (confirm(`Confirm ₱${amount} bet on ${side}?`)) {
                try {
                    const userRef = doc(db, "users", auth.currentUser.uid);
                    
                    // 1. Deduct Balance
                    await updateDoc(userRef, {
                        balance: increment(-amount)
                    });

                    // 2. Create Bet Record (This populates your Admin History)
                    await addDoc(collection(db, "bets"), {
                        uid: auth.currentUser.uid,
                        username: currentUserData.username,
                        amount: amount,
                        side: side,
                        fightId: "125", // In a real app, this comes from a 'currentFight' doc
                        status: "PENDING",
                        timestamp: new Date()
                    });

                    alert(`Bet Placed on ${side}! Good luck!`);

                } catch (e) {
                    alert("Error placing bet. Please try again.");
                    console.error(e);
                }
            }
        };
    </script>
</body>
</html>
