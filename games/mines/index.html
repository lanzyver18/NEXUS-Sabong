<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Mines | PRO</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --green: #00ff88; --red: #ff4444; --panel-bg: #0f0f0f; }
        
        /* Navigation alignment consistent with Wallet */
        .top-nav { 
            position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 20px 12px 75px;
            background: #000; border-bottom: 2px solid #222; 
        }

        .mines-wrapper { max-width: 900px; margin: 30px auto; display: grid; grid-template-columns: 320px 1fr; gap: 25px; padding: 0 15px; }

        /* SIDEBAR CONTROLS */
        .control-panel { background: var(--panel-bg); padding: 25px; border-radius: 24px; border: 1px solid #222; display: flex; flex-direction: column; gap: 18px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); height: fit-content; }
        
        .stat-box { background: #000; padding: 15px; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .stat-box label { font-size: 0.6rem; color: #555; text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-bottom: 5px; }
        .stat-box span { font-family: 'Goldman'; font-size: 1.6rem; color: var(--gold); }

        .input-group label { display: block; font-size: 0.6rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: white; border-radius: 10px; outline: none; transition: 0.3s; font-family: 'Goldman'; }
        input:focus { border-color: var(--gold); }

        .btn-action { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-family: 'Goldman'; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-play { background: var(--gold); color: black; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2); }
        .btn-cashout { background: var(--green); color: black; display: none; box-shadow: 0 5px 15px rgba(0, 255, 136, 0.2); }
        .btn-action:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

        /* THE GRID */
        .board-container { background: #080808; padding: 20px; border-radius: 28px; border: 1px solid #222; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; aspect-ratio: 1/1; }
        
        .cell { 
            background: linear-gradient(145deg, #1a1a1a, #111); 
            border-radius: 14px; border: 1px solid #252525; cursor: pointer; 
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.05);
        }
        .cell:hover:not(.revealed) { background: #222; transform: scale(1.03); border-color: var(--gold); }
        .cell.revealed.safe { background: rgba(0, 255, 136, 0.08); border-color: var(--green); color: var(--green); cursor: default; animation: popIn 0.3s ease; }
        .cell.revealed.mine { background: rgba(255, 68, 68, 0.08); border-color: var(--red); color: var(--red); cursor: default; animation: shake 0.4s; }

        @keyframes popIn { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        @media (max-width: 750px) { .mines-wrapper { grid-template-columns: 1fr; } .board-container { order: -1; } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo" style="color:var(--gold); font-family:'Goldman'; font-weight:bold; font-size:1.2rem;">NEXUS MINES</div>
        <div style="color: var(--green); font-weight: bold; font-family: 'Goldman';" id="display-balance">₱0.00</div>
    </nav>

    <div class="mines-wrapper">
        <div class="control-panel">
            <div class="stat-box">
                <label>Multiplier</label>
                <span id="current-mult">1.00x</span>
            </div>

            <div class="input-group">
                <label>Bet Amount</label>
                <input type="number" id="bet-amount" value="100" min="10">
            </div>

            <div class="input-group">
                <label>Mines Count</label>
                <input type="number" id="mine-count" value="3" min="1" max="24">
            </div>

            <button id="btn-start" class="btn-action btn-play" onclick="startGame()">Start Protocol</button>
            <button id="btn-cashout" class="btn-action btn-cashout" onclick="cashout()">Secure ₱0.00</button>
        </div>

        <div class="board-container">
            <div class="grid" id="grid">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
        import { injectMenu } from "/menu.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        injectMenu();

        let balance = 0;
        let gameActive = false;
        let mines = [];
        let revealedCount = 0;
        let currentBet = 0;
        let currentMineSetting = 3;

        onAuthStateChanged(auth, user => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), snap => {
                    if (snap.exists()) {
                        balance = snap.data().balance;
                        document.getElementById('display-balance').innerText = `₱${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    }
                });
            } else { window.location.href = "/login/"; }
        });

        function calculateMultiplier(mines, revealed) {
            let mult = 1;
            for (let i = 0; i < revealed; i++) {
                mult = mult * ((25 - i) / (25 - mines - i));
            }
            return mult * 0.96; // 4% House Edge for stability
        }

        window.startGame = async () => {
            const betInput = document.getElementById('bet-amount');
            const mineInput = document.getElementById('mine-count');
            const bet = parseInt(betInput.value);
            const count = parseInt(mineInput.value);
            
            if (bet > balance || bet < 10) return alert("Insufficient balance or invalid bet.");
            if (count < 1 || count > 24) return alert("Mine count must be 1-24.");

            try {
                await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: increment(-bet) });
                
                gameActive = true;
                currentBet = bet;
                currentMineSetting = count;
                revealedCount = 0;
                mines = Array(25).fill(false);
                
                let placed = 0;
                while (placed < count) {
                    let idx = Math.floor(Math.random() * 25);
                    if (!mines[idx]) { mines[idx] = true; placed++; }
                }

                renderGrid();
                updateUI(true);
            } catch (e) { alert("Initialization Error."); }
        };

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = "cell";
                cell.onclick = () => revealCell(i, cell);
                grid.appendChild(cell);
            }
        }

        window.revealCell = (idx, el) => {
            if (!gameActive || el.classList.contains('revealed')) return;

            el.classList.add('revealed');
            if (mines[idx]) {
                el.classList.add('mine');
                el.innerText = "💣";
                gameOver(false);
            } else {
                el.classList.add('safe');
                el.innerText = "💎";
                revealedCount++;
                const newMult = calculateMultiplier(currentMineSetting, revealedCount);
                document.getElementById('current-mult').innerText = newMult.toFixed(2) + "x";
                document.getElementById('btn-cashout').innerText = `Secure ₱${Math.floor(currentBet * newMult).toLocaleString()}`;
            }
        };

        window.cashout = async () => {
            if (!gameActive || revealedCount === 0) return;
            const mult = calculateMultiplier(currentMineSetting, revealedCount);
            const win = Math.floor(currentBet * mult);
            
            try {
                await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: increment(win) });
                await addDoc(collection(db, "wallet_logs"), {
                    uid: auth.currentUser.uid, type: "MINES_WIN", amount: win, timestamp: new Date()
                });
                gameOver(true);
            } catch (e) { alert("Cashout Error."); }
        };

        function gameOver(win) {
            gameActive = false;
            updateUI(false);
            const cells = document.querySelectorAll('.cell');
            mines.forEach((isMine, idx) => {
                if (isMine) {
                    cells[idx].classList.add('revealed', 'mine');
                    cells[idx].innerText = "💣";
                } else if (!cells[idx].classList.contains('revealed')) {
                    cells[idx].style.opacity = "0.3";
                }
            });
        }

        function updateUI(active) {
            document.getElementById('btn-start').style.display = active ? 'none' : 'block';
            document.getElementById('btn-cashout').style.display = active ? 'block' : 'none';
            document.getElementById('bet-amount').disabled = active;
            document.getElementById('mine-count').disabled = active;
            if (!active) document.getElementById('current-mult').innerText = "1.00x";
        }

        // Initialize board on load
        renderGrid();
    </script>
</body>
</html>
