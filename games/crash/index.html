<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Crash | PRO</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --green: #00ff88; --red: #ff4444; --panel-bg: #0f0f0f; }
        
        body { background: #000; overflow: hidden; margin: 0; }

        .top-nav { 
            position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 20px 12px 75px;
            background: rgba(0,0,0,0.9); border-bottom: 2px solid #222; 
            backdrop-filter: blur(10px);
        }

        .crash-layout { 
            max-width: 1100px; margin: 20px auto; 
            display: grid; grid-template-columns: 340px 1fr; 
            gap: 20px; padding: 0 15px; 
        }

        /* DYNAMIC ARENA */
        .display-area { 
            background: radial-gradient(circle at bottom right, #1a1a1a 0%, #050505 100%); 
            border-radius: 30px; border: 1px solid #222; 
            height: 500px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; overflow: hidden;
            box-shadow: inset 0 0 100px rgba(0,0,0,1);
        }

        #main-mult { 
            font-family: 'Goldman'; font-size: 5.5rem; color: white; 
            z-index: 10; text-shadow: 0 0 30px rgba(0,0,0,0.5); 
            pointer-events: none;
        }
        #main-mult.crashed { color: var(--red); animation: shake 0.3s ease-in-out; }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }

        /* CONTROLS */
        .control-panel { background: var(--panel-bg); padding: 30px; border-radius: 24px; border: 1px solid #222; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-group label { display: block; font-size: 0.6rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 16px; background: #000; border: 1px solid #333; color: white; border-radius: 12px; outline: none; font-family: 'Goldman'; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--gold); background: #050505; }

        .btn-action { width: 100%; padding: 22px; border-radius: 16px; border: none; font-weight: bold; font-family: 'Goldman'; cursor: pointer; text-transform: uppercase; transition: 0.3s; letter-spacing: 1px; }
        .btn-bet { background: var(--gold); color: black; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2); }
        .btn-cashout { background: var(--green); color: black; display: none; box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3); }
        .btn-waiting { background: #1a1a1a; color: #444; cursor: not-allowed; display: none; border: 1px solid #222; }
        .btn-cashout span { display: block; font-size: 0.6rem; opacity: 0.8; margin-top: 4px; }

        .history-bar { display: flex; gap: 8px; overflow-x: auto; padding: 15px; background: #000; border-radius: 12px; border: 1px solid #1a1a1a; scrollbar-width: none; }
        .hist-item { padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-family: 'Goldman'; font-weight: bold; background: #111; flex-shrink: 0; border: 1px solid #222; }
        .hist-green { color: var(--green); border-color: rgba(0,255,136,0.2); }
        .hist-red { color: var(--red); border-color: rgba(255,68,68,0.2); }

        @keyframes shake {
            0%, 100% { transform: translate(0,0); }
            20% { transform: translate(-10px, 5px); }
            40% { transform: translate(10px, -5px); }
            60% { transform: translate(-5px, 10px); }
            80% { transform: translate(5px, -10px); }
        }

        @media (max-width: 900px) { .crash-layout { grid-template-columns: 1fr; } .display-area { height: 350px; } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo" style="color:var(--gold); font-family:'Goldman'; font-weight:bold; font-size:1.2rem; letter-spacing:2px;">NEXUS CRASH</div>
        <div style="color: var(--green); font-weight: bold; font-family: 'Goldman';" id="display-balance">₱0.00</div>
    </nav>

    <div class="crash-layout">
        <div class="control-panel">
            <div class="input-group">
                <label>Bet Amount</label>
                <input type="number" id="bet-amount" value="100" min="10" step="10">
            </div>
            <div class="input-group">
                <label>Auto Cashout</label>
                <input type="number" id="auto-cashout" placeholder="2.00" step="0.1" min="1.1">
            </div>

            <button id="btn-bet" class="btn-action btn-bet" onclick="placeBet()">Initiate Launch</button>
            <button id="btn-cashout" class="btn-action btn-cashout" onclick="cashout()">
                ABORT & CASHOUT
                <span id="cashout-preview">₱0.00</span>
            </button>
            <button id="btn-waiting" class="btn-action btn-waiting">Awaiting Ignition...</button>

            <div class="history-bar" id="history"></div>
        </div>

        <div class="display-area">
            <div id="status-text" style="color: #444; font-size: 0.6rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 3px; position: absolute; top: 25px; font-weight: bold; z-index: 10;">System Standby</div>
            <div id="main-mult">1.00x</div>
            <canvas id="crash-canvas"></canvas>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
        import { injectMenu } from "/menu.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.firebaseAuth = auth;
        window.firebaseDb = db;
        injectMenu();

        let balance = 0, currentMult = 1.00, gameStatus = "WAITING", hasBet = false, betPlacedForNext = false, myBetAmt = 0, crashPoint = 0, startTime = 0;
        
        // ANIMATION SYSTEM
        const canvas = document.getElementById('crash-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let rocketY = 0, rocketX = 0, rocketAngle = 0;

        function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor(x, y, color, speed) {
                this.x = x; this.y = y; this.color = color;
                this.size = Math.random() * 4 + 2;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = Math.random() * speed + 2;
                this.alpha = 1;
            }
            update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.02; }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }

        function drawRocket(x, y, angle, isExploding) {
            if(isExploding) {
                for(let i=0; i<5; i++) particles.push(new Particle(x, y, '#ff4444', 5));
                return;
            }
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            // Rocket Body
            ctx.fillStyle = '#eee';
            ctx.fillRect(-10, -25, 20, 40);
            // Nose
            ctx.beginPath(); ctx.fillStyle = '#ff4444';
            ctx.moveTo(-10, -25); ctx.lineTo(0, -45); ctx.lineTo(10, -25); ctx.fill();
            // Thruster Fire
            particles.push(new Particle(0, 15, Math.random() > 0.5 ? '#ffaa00' : '#ff4444', 3));
            ctx.restore();
        }

        onAuthStateChanged(auth, user => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), snap => {
                    if(snap.exists()) {
                        balance = snap.data().balance;
                        document.getElementById('display-balance').innerText = `₱${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    }
                });
            } else { window.location.href = "/login/"; }
        });

        function initEngine() {
            gameStatus = "WAITING";
            let countdown = 5.0;
            updateButtons();
            const timer = setInterval(() => {
                countdown -= 0.1;
                document.getElementById('status-text').innerText = `Ignition in ${countdown.toFixed(1)}s`;
                ctx.clearRect(0,0, canvas.width, canvas.height);
                // Draw rocket at bottom waiting
                drawRocket(canvas.width * 0.2, canvas.height * 0.8, -0.5, false);
                if (countdown <= 0) { clearInterval(timer); runRound(); }
            }, 100);
        }

        function runRound() {
            gameStatus = "RUNNING";
            document.getElementById('status-text').innerText = "IN FLIGHT";
            if (Math.random() < 0.08) crashPoint = 1.00;
            else crashPoint = parseFloat((Math.max(1.01, 0.92 / (1 - Math.random()))).toFixed(2));

            if (betPlacedForNext) { hasBet = true; betPlacedForNext = false; }
            updateButtons();
            startTime = Date.now();

            const tick = setInterval(() => {
                let elapsed = (Date.now() - startTime) / 1000;
                currentMult = Math.pow(1.08, elapsed); 
                document.getElementById('main-mult').innerText = currentMult.toFixed(2) + "x";
                
                if(hasBet) document.getElementById('cashout-preview').innerText = `₱${Math.floor(myBetAmt * currentMult).toLocaleString()}`;

                // Animation Frame
                ctx.clearRect(0,0, canvas.width, canvas.height);
                rocketX = (elapsed / 12) * canvas.width + (canvas.width * 0.2);
                rocketY = canvas.height * 0.8 - (Math.pow(1.08, elapsed) - 1) * 60;
                rocketAngle = -0.5 + (elapsed * 0.05);
                
                particles.forEach((p, i) => { p.update(); p.draw(); if(p.alpha <= 0) particles.splice(i, 1); });
                drawRocket(rocketX, rocketY, rocketAngle, false);

                const auto = parseFloat(document.getElementById('auto-cashout').value);
                if (hasBet && !isNaN(auto) && auto > 1 && currentMult >= auto) cashout();

                if (currentMult >= crashPoint) { clearInterval(tick); doCrash(); }
            }, 50);
        }

        function doCrash() {
            gameStatus = "CRASHED";
            hasBet = false;
            document.getElementById('main-mult').classList.add('crashed');
            document.getElementById('status-text').innerText = "EXPLODED";
            
            // Explosion Effect
            for(let i=0; i<50; i++) particles.push(new Particle(rocketX, rocketY, '#ffaa00', 8));
            
            addHistory(crashPoint);
            updateButtons();

            setTimeout(() => {
                document.getElementById('main-mult').classList.remove('crashed');
                document.getElementById('main-mult').innerText = "1.00x";
                particles = [];
                initEngine();
            }, 3000);
        }

        window.placeBet = async () => {
            const amt = parseInt(document.getElementById('bet-amount').value);
            if (amt > balance || amt < 10) return alert("Low Balance");
            await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: increment(-amt) });
            myBetAmt = amt;
            if (gameStatus === "WAITING") hasBet = true;
            else betPlacedForNext = true;
            updateButtons();
        };

        window.cashout = async () => {
            if (!hasBet || gameStatus !== "RUNNING") return;
            const win = Math.floor(myBetAmt * currentMult);
            hasBet = false;
            await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: increment(win) });
            await addDoc(collection(db, "wallet_logs"), { uid: auth.currentUser.uid, type: "CRASH_WIN", amount: win, timestamp: new Date() });
            updateButtons();
        };

        function updateButtons() {
            const bBet = document.getElementById('btn-bet'), bCash = document.getElementById('btn-cashout'), bWait = document.getElementById('btn-waiting');
            bBet.style.display = "none"; bCash.style.display = "none"; bWait.style.display = "none";
            if (hasBet && gameStatus === "RUNNING") bCash.style.display = "block";
            else if (betPlacedForNext || (hasBet && gameStatus === "WAITING")) bWait.style.display = "block";
            else bBet.style.display = "block";
        }

        function addHistory(val) {
            const bar = document.getElementById('history');
            const item = document.createElement('div');
            item.className = `hist-item ${val >= 2 ? 'hist-green' : 'hist-red'}`;
            item.innerText = val.toFixed(2) + "x";
            bar.prepend(item);
            if (bar.children.length > 10) bar.lastChild.remove();
        }

        initEngine();
    </script>
</body>
</html>
