<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Crash | PRO</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --green: #00ff88; --red: #ff4444; --panel-bg: #0f0f0f; }
        
        body { background: #000; overflow-x: hidden; margin: 0; color: white; -webkit-font-smoothing: antialiased; }

        /* CRITICAL MENU FIXES */
        #menu-container {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background: #000 !important; /* Forces solid background */
            z-index: 10000 !important; /* Sits above everything */
            display: none;
        }

        #menu-overlay {
            background: rgba(0, 0, 0, 0.9) !important;
            backdrop-filter: blur(10px) !important;
            z-index: 9999 !important;
        }

        /* Prevent background elements from leaking through top nav */
        .top-nav { 
            position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 20px 12px 75px;
            background: #000; /* Replaced RGBA with solid Hex */
            border-bottom: 2px solid #222; 
        }

        .crash-layout { 
            max-width: 1200px; margin: 20px auto; 
            display: grid; grid-template-columns: 360px 1fr; 
            gap: 25px; padding: 0 15px; 
        }

        .display-area { 
            background: #050505; border-radius: 28px; border: 1px solid #222; 
            height: 550px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 100px rgba(0,0,0,1);
        }

        .grid-bg {
            position: absolute; width: 400%; height: 400%;
            background-image: 
                linear-gradient(rgba(212, 175, 55, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 175, 55, 0.05) 1px, transparent 1px);
            background-size: 80px 80px;
            transform: perspective(1000px) rotateX(60deg);
            opacity: 0.5; z-index: 1; pointer-events: none;
        }

        #main-mult { 
            font-family: 'Goldman'; font-size: 7rem; color: white; 
            z-index: 10; text-shadow: 0 0 40px rgba(255,255,255,0.15); 
            pointer-events: none; transform: translateY(-30px);
            transition: color 0.3s, transform 0.1s;
        }
        #main-mult.crashed { color: var(--red); text-shadow: 0 0 50px rgba(255, 68, 68, 0.6); animation: crash-shake 0.4s ease-out; }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }

        .hud-overlay { position: absolute; width: 100%; height: 100%; z-index: 6; pointer-events: none; padding: 30px; box-sizing: border-box; }
        .hud-stat { position: absolute; font-size: 0.55rem; font-family: 'Goldman'; color: var(--gold); opacity: 0.4; text-transform: uppercase; letter-spacing: 1px; }
        .stat-tl { top: 30px; left: 30px; }
        .stat-tr { top: 30px; right: 30px; text-align: right; }

        .control-panel { 
            background: linear-gradient(145deg, #111, #080808); padding: 30px; border-radius: 28px; 
            border: 1px solid #252525; display: flex; flex-direction: column; gap: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .input-group label { display: block; font-size: 0.6rem; color: #555; text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 12px; font-weight: bold; }
        input { 
            width: 100%; padding: 18px; background: #000; border: 1px solid #333; 
            color: var(--gold); border-radius: 14px; outline: none; font-family: 'Goldman'; 
            transition: 0.3s; box-sizing: border-box; font-size: 1.2rem;
        }
        .btn-action { width: 100%; padding: 22px; border-radius: 16px; border: none; font-weight: bold; font-family: 'Goldman'; cursor: pointer; text-transform: uppercase; transition: 0.3s; letter-spacing: 2px; font-size: 1.1rem; }
        .btn-bet { background: var(--gold); color: black; box-shadow: 0 8px 0 #917725; }
        .btn-cashout { background: var(--green); color: black; display: none; box-shadow: 0 8px 0 #008f4c; }
        .btn-waiting { background: #1a1a1a; color: #444; cursor: not-allowed; display: none; border: 1px solid #222; }

        .history-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 16px; border: 1px solid #1a1a1a; scrollbar-width: none; margin-top: 10px; }
        .hist-item { padding: 8px 14px; border-radius: 10px; font-size: 0.8rem; font-family: 'Goldman'; font-weight: bold; background: #111; flex-shrink: 0; border: 1px solid #222; }
        .hist-green { color: var(--green); border-color: rgba(0, 255, 136, 0.2); }
        .hist-red { color: var(--red); border-color: rgba(255, 68, 68, 0.2); }

        @keyframes crash-shake {
            0% { transform: translate(0, -30px) scale(1); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-10px, -35px); }
            20%, 40%, 60%, 80% { transform: translate(10px, -25px); }
            100% { transform: translate(0, -30px) scale(0.9); }
        }

        @media (max-width: 900px) { .crash-layout { grid-template-columns: 1fr; } .display-area { height: 420px; } #main-mult { font-size: 4rem; } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo" style="color:var(--gold); font-family:'Goldman'; font-weight:bold; font-size:1.4rem; letter-spacing:3px;">NEXUS</div>
        <div style="color: var(--green); font-weight: bold; font-family: 'Goldman'; font-size: 1.2rem;" id="display-balance">₱0.00</div>
    </nav>

    <div class="crash-layout">
        <div class="control-panel">
            <div class="input-group">
                <label>Investment Value</label>
                <input type="number" id="bet-amount" value="100" min="10" step="10">
            </div>
            <div class="input-group">
                <label>Automatic Extraction</label>
                <input type="number" id="auto-cashout" value="2.00" step="0.1" min="1.1">
            </div>

            <button id="btn-bet" class="btn-action btn-bet" onclick="placeBet()">Initiate Round</button>
            <button id="btn-cashout" class="btn-action btn-cashout" onclick="cashout()">
                EXTRACT
                <span id="cashout-preview" style="display:block; font-size:0.7rem; opacity:0.6; margin-top:5px;">₱0.00</span>
            </button>
            <button id="btn-waiting" class="btn-action btn-waiting">Syncing Network...</button>

            <div class="history-bar" id="history"></div>
        </div>

        <div class="display-area">
            <div class="grid-bg" id="grid-bg"></div>
            <div class="hud-overlay">
                <div class="hud-stat stat-tl">NETWORK: STABLE <br> LATENCY: 12ms</div>
                <div class="hud-stat stat-tr">BUFFERING: 0% <br> NODE: RP-MNL-01</div>
            </div>
            <div id="status-text" style="color: var(--gold); font-size: 0.6rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 5px; position: absolute; top: 35px; font-weight: bold; z-index: 10; opacity: 0.5;">HUB CONNECTED</div>
            <div id="main-mult">1.00x</div>
            <canvas id="crash-canvas"></canvas>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
        import { injectMenu } from "/menu.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.firebaseAuth = auth;
        window.firebaseDb = db;
        injectMenu();

        let balance = 0, currentMult = 1.00, gameStatus = "WAITING", hasBet = false, betPlacedForNext = false, myBetAmt = 0, crashPoint = 0, startTime = 0;
        let particles = [];
        
        const canvas = document.getElementById('crash-canvas');
        const ctx = canvas.getContext('2d');
        const gridBg = document.getElementById('grid-bg');

        function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
        window.addEventListener('resize', resize); resize();

        class ExplosionParticle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 8 + 2;
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15;
                this.alpha = 1;
                this.color = Math.random() > 0.5 ? '#ff4444' : '#ffaa00';
            }
            update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.02; }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        onAuthStateChanged(auth, user => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), snap => {
                    if(snap.exists()) {
                        balance = snap.data().balance;
                        document.getElementById('display-balance').innerText = `₱${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    }
                });
            } else { window.location.href = "/login/"; }
        });

        function initEngine() {
            gameStatus = "WAITING";
            let countdown = 5.0;
            updateButtons();
            particles = [];
            const timer = setInterval(() => {
                countdown -= 0.1;
                document.getElementById('status-text').innerText = `NEXT SYNC IN ${countdown.toFixed(1)}S`;
                ctx.clearRect(0,0, canvas.width, canvas.height);
                if (countdown <= 0) { clearInterval(timer); runRound(); }
            }, 100);
        }

        function runRound() {
            gameStatus = "RUNNING";
            document.getElementById('status-text').innerText = "CLIMBING...";
            if (Math.random() < 0.08) crashPoint = 1.00;
            else crashPoint = parseFloat((Math.max(1.01, 0.93 / (1 - Math.random()))).toFixed(2));

            if (betPlacedForNext) { hasBet = true; betPlacedForNext = false; }
            updateButtons();
            startTime = Date.now();

            const tick = setInterval(() => {
                let elapsed = (Date.now() - startTime) / 1000;
                currentMult = Math.pow(1.08, elapsed); 
                document.getElementById('main-mult').innerText = currentMult.toFixed(2) + "x";
                
                if(hasBet) document.getElementById('cashout-preview').innerText = `₱${Math.floor(myBetAmt * currentMult).toLocaleString()}`;

                ctx.clearRect(0,0, canvas.width, canvas.height);
                
                const headX = (elapsed * 150);
                const headY = (currentMult - 1) * 300;
                const offsetX = canvas.width * 0.4 - headX;
                const offsetY = canvas.height * 0.7 + headY;

                ctx.save();
                ctx.translate(offsetX, offsetY);
                gridBg.style.transform = `perspective(1000px) rotateX(60deg) translateY(${headY % 80}px) translateX(${offsetX % 80}px)`;

                ctx.beginPath();
                ctx.lineWidth = 8;
                ctx.strokeStyle = '#D4AF37';
                ctx.lineCap = 'round';
                ctx.shadowBlur = 20; ctx.shadowColor = 'rgba(212, 175, 55, 0.6)';
                ctx.moveTo(0, 0);
                for(let i=0; i <= elapsed; i+=0.05) {
                    const lx = i * 150;
                    const ly = -(Math.pow(1.08, i) - 1) * 300;
                    ctx.lineTo(lx, ly);
                }
                ctx.stroke();

                ctx.shadowBlur = 40; ctx.fillStyle = "#fff";
                ctx.beginPath(); ctx.arc(headX, -headY, 8, 0, Math.PI * 2); ctx.fill();
                ctx.restore();

                const auto = parseFloat(document.getElementById('auto-cashout').value);
                if (hasBet && !isNaN(auto) && auto > 1 && currentMult >= auto) cashout();

                if (currentMult >= crashPoint) {
                    clearInterval(tick);
                    doCrash(headX, headY, offsetX, offsetY);
                }
            }, 30);
        }

        function doCrash(hx, hy, ox, oy) {
            gameStatus = "CRASHED";
            hasBet = false;
            document.getElementById('main-mult').classList.add('crashed');
            document.getElementById('status-text').innerText = "SIGNAL LOST";
            
            for(let i=0; i<60; i++) particles.push(new ExplosionParticle(ox + hx, oy - hy));

            const particleInterval = setInterval(() => {
                ctx.clearRect(0,0, canvas.width, canvas.height);
                particles.forEach((p, index) => {
                    p.update();
                    p.draw();
                    if(p.alpha <= 0) particles.splice(index, 1);
                });
                if(particles.length === 0) clearInterval(particleInterval);
            }, 16);

            addHistory(crashPoint);
            updateButtons();
            setTimeout(() => {
                document.getElementById('main-mult').classList.remove('crashed');
                document.getElementById('main-mult').innerText = "1.00x";
                initEngine();
            }, 3000);
        }

        window.placeBet = async () => {
            const amt = parseInt(document.getElementById('bet-amount').value);
            if (amt > balance || amt < 10) return alert("Verify Balance");
            await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: increment(-amt) });
            myBetAmt = amt;
            if (gameStatus === "WAITING") hasBet = true;
            else betPlacedForNext = true;
            updateButtons();
        };

        window.cashout = async () => {
            if (!hasBet || gameStatus !== "RUNNING") return;
            const win = Math.floor(myBetAmt * currentMult);
            hasBet = false;
            await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: increment(win) });
            await addDoc(collection(db, "wallet_logs"), { uid: auth.currentUser.uid, type: "CRASH_WIN", amount: win, timestamp: new Date() });
            updateButtons();
        };

        function updateButtons() {
            const bBet = document.getElementById('btn-bet'), bCash = document.getElementById('btn-cashout'), bWait = document.getElementById('btn-waiting');
            bBet.style.display = "none"; bCash.style.display = "none"; bWait.style.display = "none";
            if (hasBet && gameStatus === "RUNNING") bCash.style.display = "block";
            else if (betPlacedForNext || (hasBet && gameStatus === "WAITING")) bWait.style.display = "block";
            else bBet.style.display = "block";
        }

        function addHistory(val) {
            const bar = document.getElementById('history');
            const item = document.createElement('div');
            item.className = `hist-item ${val >= 2 ? 'hist-green' : 'hist-red'}`;
            item.innerText = val.toFixed(2) + "x";
            bar.prepend(item);
            if (bar.children.length > 10) bar.lastChild.remove();
        }

        initEngine();
    </script>
</body>
</html>
