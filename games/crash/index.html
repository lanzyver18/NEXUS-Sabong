<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Crash | PRO</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --green: #00ff88; --red: #ff4444; --panel-bg: #0f0f0f; }
        
        body { background: #000; overflow-x: hidden; margin: 0; color: white; }

        /* COMMAND NAV */
        .top-nav { 
            position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 20px 12px 75px;
            background: rgba(0,0,0,0.9); border-bottom: 1px solid #222; 
            backdrop-filter: blur(15px);
        }

        .crash-layout { 
            max-width: 1200px; margin: 20px auto; 
            display: grid; grid-template-columns: 360px 1fr; 
            gap: 25px; padding: 0 15px; 
        }

        /* ARENA VISUALS */
        .display-area { 
            background: #050505; 
            border-radius: 24px; border: 1px solid #222; 
            height: 550px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; overflow: hidden;
            box-shadow: inset 0 0 100px rgba(0,0,0,1);
        }

        #main-mult { 
            font-family: 'Goldman'; font-size: 6rem; color: white; 
            z-index: 10; text-shadow: 0 0 30px rgba(255,255,255,0.2); 
            pointer-events: none; transform: translateY(-20px);
        }
        #main-mult.crashed { color: var(--red); animation: shake 0.4s ease-in-out; }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }

        /* GLASS CONTROL PANEL */
        .control-panel { 
            background: rgba(15, 15, 15, 0.8); padding: 30px; border-radius: 24px; 
            border: 1px solid #333; display: flex; flex-direction: column; gap: 20px; 
            backdrop-filter: blur(10px);
        }
        
        .input-group label { display: block; font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: bold; }
        input { 
            width: 100%; padding: 16px; background: #000; border: 1px solid #222; 
            color: var(--gold); border-radius: 12px; outline: none; font-family: 'Goldman'; 
            transition: 0.3s; box-sizing: border-box; font-size: 1.1rem;
        }
        input:focus { border-color: var(--gold); background: #050505; }

        .btn-action { 
            width: 100%; padding: 22px; border-radius: 16px; border: none; 
            font-weight: bold; font-family: 'Goldman'; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            letter-spacing: 1.5px; font-size: 1rem;
        }
        
        .btn-bet { background: var(--gold); color: black; }
        .btn-cashout { background: var(--green); color: black; display: none; }
        .btn-waiting { background: #1a1a1a; color: #555; cursor: not-allowed; display: none; border: 1px solid #222; }
        .btn-cashout span { display: block; font-size: 0.7rem; opacity: 0.9; margin-top: 5px; font-family: sans-serif; letter-spacing: 0; }

        .history-bar { 
            display: flex; gap: 8px; overflow-x: auto; padding: 15px; 
            background: rgba(0,0,0,0.5); border-radius: 12px; border: 1px solid #1a1a1a; 
            scrollbar-width: none; margin-top: 10px;
        }
        .hist-item { padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; font-family: 'Goldman'; font-weight: bold; background: #111; flex-shrink: 0; border: 1px solid #222; }
        .hist-green { color: var(--green); border-color: rgba(0,255,136,0.1); }
        .hist-red { color: var(--red); border-color: rgba(255,68,68,0.1); }

        @keyframes shake {
            0%, 100% { transform: translate(0, -20px); }
            25% { transform: translate(-8px, -15px); }
            50% { transform: translate(8px, -25px); }
            75% { transform: translate(-8px, -20px); }
        }

        @media (max-width: 900px) { 
            .crash-layout { grid-template-columns: 1fr; } 
            .display-area { height: 400px; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo" style="color:var(--gold); font-family:'Goldman'; font-weight:bold; font-size:1.4rem; letter-spacing:2px;">NEXUS</div>
        <div style="color: var(--green); font-weight: bold; font-family: 'Goldman'; font-size: 1.1rem;" id="display-balance">₱0.00</div>
    </nav>

    <div class="crash-layout">
        <div class="control-panel">
            <div class="input-group">
                <label>Bet Amount</label>
                <input type="number" id="bet-amount" value="100" min="10" step="10">
            </div>
            <div class="input-group">
                <label>Auto Cashout</label>
                <input type="number" id="auto-cashout" value="2.00" step="0.1" min="1.1">
            </div>

            <button id="btn-bet" class="btn-action btn-bet" onclick="placeBet()">Place Bet</button>
            <button id="btn-cashout" class="btn-action btn-cashout" onclick="cashout()">
                CASHOUT
                <span id="cashout-preview">SECURE ₱0.00</span>
            </button>
            <button id="btn-waiting" class="btn-action btn-waiting">Awaiting Round...</button>

            <div class="history-bar" id="history"></div>
        </div>

        <div class="display-area">
            <div id="status-text" style="color: var(--gold); font-size: 0.65rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 4px; position: absolute; top: 30px; font-weight: bold; z-index: 10; opacity: 0.6;">SYSTEM READY</div>
            <div id="main-mult">1.00x</div>
            <canvas id="crash-canvas"></canvas>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
        import { injectMenu } from "/menu.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.firebaseAuth = auth;
        window.firebaseDb = db;
        injectMenu();

        let balance = 0, currentMult = 1.00, gameStatus = "WAITING", hasBet = false, betPlacedForNext = false, myBetAmt = 0, crashPoint = 0, startTime = 0;
        
        const canvas = document.getElementById('crash-canvas');
        const ctx = canvas.getContext('2d');

        function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
        window.addEventListener('resize', resize); resize();

        onAuthStateChanged(auth, user => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), snap => {
                    if(snap.exists()) {
                        balance = snap.data().balance;
                        document.getElementById('display-balance').innerText = `₱${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    }
                });
            } else { window.location.href = "/login/"; }
        });

        function initEngine() {
            gameStatus = "WAITING";
            let countdown = 5.0;
            updateButtons();
            const timer = setInterval(() => {
                countdown -= 0.1;
                document.getElementById('status-text').innerText = `NEXT ROUND IN ${countdown.toFixed(1)}S`;
                ctx.clearRect(0,0, canvas.width, canvas.height);
                if (countdown <= 0) { clearInterval(timer); runRound(); }
            }, 100);
        }

        function runRound() {
            gameStatus = "RUNNING";
            document.getElementById('status-text').innerText = "LIVE CLIMB";
            
            // House Edge Management: 7% Instant Crash
            if (Math.random() < 0.07) crashPoint = 1.00;
            else crashPoint = parseFloat((Math.max(1.01, 0.94 / (1 - Math.random()))).toFixed(2));

            if (betPlacedForNext) { hasBet = true; betPlacedForNext = false; }
            updateButtons();
            startTime = Date.now();

            const tick = setInterval(() => {
                let elapsed = (Date.now() - startTime) / 1000;
                currentMult = Math.pow(1.08, elapsed); 
                document.getElementById('main-mult').innerText = currentMult.toFixed(2) + "x";
                
                if(hasBet) document.getElementById('cashout-preview').innerText = `SECURE ₱${Math.floor(myBetAmt * currentMult).toLocaleString()}`;

                // --- LINE DRAWING LOGIC ---
                ctx.clearRect(0,0, canvas.width, canvas.height);
                
                const padding = 60;
                const maxW = canvas.width - padding * 2;
                const maxH = canvas.height - padding * 2;
                
                // Drawing the Progress Line
                ctx.beginPath();
                ctx.lineWidth = 6;
                ctx.strokeStyle = '#D4AF37';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(212,175,55,0.5)';
                
                ctx.moveTo(padding, canvas.height - padding);
                
                for(let i=0; i <= elapsed; i+=0.1) {
                    const scaleX = Math.min(i / 10, 1);
                    const scaleY = (Math.pow(1.08, i) - 1) / (Math.pow(1.08, elapsed) + 1);
                    const lx = padding + (maxW * scaleX);
                    const ly = (canvas.height - padding) - (maxH * scaleY);
                    ctx.lineTo(lx, ly);
                }
                ctx.stroke();

                // Draw end point dot
                const currentX = padding + (maxW * Math.min(elapsed / 10, 1));
                const currentY = (canvas.height - padding) - (maxH * ((currentMult - 1) / (currentMult + 1)));
                ctx.beginPath();
                ctx.fillStyle = "#fff";
                ctx.arc(currentX, currentY, 5, 0, Math.PI * 2);
                ctx.fill();

                const auto = parseFloat(document.getElementById('auto-cashout').value);
                if (hasBet && !isNaN(auto) && auto > 1 && currentMult >= auto) cashout();

                if (currentMult >= crashPoint) { clearInterval(tick); doCrash(); }
            }, 40);
        }

        function doCrash() {
            gameStatus = "CRASHED";
            hasBet = false;
            document.getElementById('main-mult').classList.add('crashed');
            document.getElementById('main-mult').innerText = crashPoint.toFixed(2) + "x";
            document.getElementById('status-text').innerText = "CRASHED";
            
            addHistory(crashPoint);
            updateButtons();

            setTimeout(() => {
                document.getElementById('main-mult').classList.remove('crashed');
                document.getElementById('main-mult').innerText = "1.00x";
                initEngine();
            }, 3000);
        }

        window.placeBet = async () => {
            const amt = parseInt(document.getElementById('bet-amount').value);
            if (amt > balance || amt < 10) return alert("Insufficient balance");
            await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: increment(-amt) });
            myBetAmt = amt;
            if (gameStatus === "WAITING") hasBet = true;
            else betPlacedForNext = true;
            updateButtons();
        };

        window.cashout = async () => {
            if (!hasBet || gameStatus !== "RUNNING") return;
            const win = Math.floor(myBetAmt * currentMult);
            hasBet = false;
            await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: increment(win) });
            await addDoc(collection(db, "wallet_logs"), { uid: auth.currentUser.uid, type: "CRASH_WIN", amount: win, timestamp: new Date() });
            updateButtons();
        };

        function updateButtons() {
            const bBet = document.getElementById('btn-bet'), bCash = document.getElementById('btn-cashout'), bWait = document.getElementById('btn-waiting');
            bBet.style.display = "none"; bCash.style.display = "none"; bWait.style.display = "none";
            if (hasBet && gameStatus === "RUNNING") bCash.style.display = "block";
            else if (betPlacedForNext || (hasBet && gameStatus === "WAITING")) bWait.style.display = "block";
            else bBet.style.display = "block";
        }

        function addHistory(val) {
            const bar = document.getElementById('history');
            const item = document.createElement('div');
            item.className = `hist-item ${val >= 2 ? 'hist-green' : 'hist-red'}`;
            item.innerText = val.toFixed(2) + "x";
            bar.prepend(item);
            if (bar.children.length > 10) bar.lastChild.remove();
        }

        initEngine();
    </script>
</body>
</html>
