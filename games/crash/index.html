<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Crash | CHRONOS SYNC</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --green: #00ff88; --red: #ff4444; --panel-bg: #0f0f0f; }
        body { background: #000; overflow-x: hidden; margin: 0; color: white; -webkit-font-smoothing: antialiased; }

        /* SOLID MENU FIX */
        #menu-container { position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; background: #000 !important; z-index: 10001 !important; display: none; }
        #menu-overlay { background: rgba(0, 0, 0, 0.95) !important; backdrop-filter: blur(15px) !important; z-index: 10000 !important; }

        .top-nav { position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px 12px 75px; background: #000; border-bottom: 2px solid #222; }
        .crash-layout { max-width: 1200px; margin: 20px auto; display: grid; grid-template-columns: 360px 1fr; gap: 25px; padding: 0 15px; }

        .display-area { background: #050505; border-radius: 28px; border: 1px solid #222; height: 550px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 100px rgba(0,0,0,1); }
        .grid-bg { position: absolute; width: 400%; height: 400%; background-image: linear-gradient(rgba(212, 175, 55, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(212, 175, 55, 0.03) 1px, transparent 1px); background-size: 80px 80px; transform: perspective(1000px) rotateX(60deg); opacity: 0.5; z-index: 1; pointer-events: none; }

        #main-mult { font-family: 'Goldman'; font-size: 7rem; color: white; z-index: 10; text-shadow: 0 0 40px rgba(255,255,255,0.15); pointer-events: none; transform: translateY(-30px); transition: 0.1s; text-align: center; }
        #main-mult small { display: block; font-size: 1rem; color: var(--gold); letter-spacing: 5px; opacity: 0.6; margin-top: -10px; text-transform: uppercase; }
        #main-mult.crashed { color: var(--red); animation: crash-shake 0.4s ease-out; }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }

        .hud-overlay { position: absolute; width: 100%; height: 100%; z-index: 6; pointer-events: none; padding: 30px; box-sizing: border-box; }
        .hud-stat { position: absolute; font-size: 0.55rem; font-family: 'Goldman'; color: var(--gold); opacity: 0.4; text-transform: uppercase; letter-spacing: 1px; line-height: 1.5; }
        .stat-tl { top: 30px; left: 30px; }
        .stat-tr { top: 30px; right: 30px; text-align: right; }

        .control-panel { background: linear-gradient(145deg, #111, #080808); padding: 30px; border-radius: 28px; border: 1px solid #252525; display: flex; flex-direction: column; gap: 20px; }
        input { width: 100%; padding: 18px; background: #000; border: 1px solid #333; color: var(--gold); border-radius: 14px; outline: none; font-family: 'Goldman'; font-size: 1.2rem; }
        
        .btn-action { width: 100%; padding: 22px; border-radius: 16px; border: none; font-weight: bold; font-family: 'Goldman'; cursor: pointer; text-transform: uppercase; transition: 0.3s; letter-spacing: 2px; font-size: 1.1rem; }
        .btn-bet { background: var(--gold); color: black; box-shadow: 0 8px 0 #917725; }
        .btn-cashout { background: var(--green); color: black; display: none; box-shadow: 0 8px 0 #008f4c; }
        .btn-waiting { background: #1a1a1a; color: #444; cursor: not-allowed; display: none; border: 1px solid #222; }

        .history-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 16px; border: 1px solid #1a1a1a; scrollbar-width: none; margin-top: 10px; min-height: 45px; align-items: center; }
        .hist-item { padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-family: 'Goldman'; font-weight: bold; background: #111; flex-shrink: 0; border: 1px solid #222; }
        .hist-green { color: var(--green); border-color: rgba(0,255,136,0.2); }
        .hist-red { color: var(--red); border-color: rgba(255,68,68,0.2); }

        @keyframes crash-shake { 0% { transform: translate(0, -30px); } 20% { transform: translate(-10px, -35px); } 40% { transform: translate(10px, -25px); } 100% { transform: translate(0, -30px) scale(0.9); } }
        @media (max-width: 900px) { .crash-layout { grid-template-columns: 1fr; } .display-area { height: 420px; } #main-mult { font-size: 4rem; } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo" style="color:var(--gold); font-family:'Goldman'; font-weight:bold; font-size:1.4rem; letter-spacing:3px;">NEXUS</div>
        <div style="color: var(--green); font-weight: bold; font-family: 'Goldman'; font-size: 1.2rem;" id="display-balance">₱0.00</div>
    </nav>

    <div class="crash-layout">
        <div class="control-panel">
            <div class="input-group">
                <label style="font-size: 0.6rem; color: #555; text-transform: uppercase;">Investment</label>
                <input type="number" id="bet-amount" value="100" min="10">
            </div>
            <div class="input-group">
                <label style="font-size: 0.6rem; color: #555; text-transform: uppercase;">Extraction Trigger</label>
                <input type="number" id="auto-cashout" value="2.00" step="0.1">
            </div>

            <button id="btn-bet" class="btn-action btn-bet" onclick="placeBet()">Initiate Round</button>
            <button id="btn-cashout" class="btn-action btn-cashout" onclick="cashout()">
                EXTRACT <span id="cashout-preview" style="display:block; font-size:0.7rem; opacity:0.6; margin-top:5px;">₱0.00</span>
            </button>
            <button id="btn-waiting" class="btn-action btn-waiting">Syncing...</button>

            <div class="history-bar" id="history-log"></div>
        </div>

        <div class="display-area" id="game-arena">
            <div class="grid-bg" id="grid-bg"></div>
            <div class="hud-overlay">
                <div class="hud-stat stat-tl">NETWORK: DETERMINISTIC <br> ENGINE: CHRONOS V2 <br> STATUS: <span id="hud-status">SYNCING</span></div>
                <div class="hud-stat stat-tr">VECTOR POS: <span id="hud-coords">0,0</span> <br> G-FORCE: <span id="hud-g">1.0</span>G <br> SESSION: <span id="session-id">0000</span></div>
            </div>
            <div id="status-text" style="color: var(--gold); font-size: 0.6rem; position: absolute; top: 35px; font-weight: bold; z-index: 10; opacity: 0.5; letter-spacing: 5px; text-transform: uppercase;">Clock Synchronized</div>
            <div id="main-mult">1.00x</div>
            <canvas id="crash-canvas"></canvas>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
        import { injectMenu } from "/menu.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        injectMenu();

        let balance = 0, currentMult = 1.00, hasBet = false, myBetAmt = 0, lastLoggedCycle = -1;
        const canvas = document.getElementById('crash-canvas');
        const ctx = canvas.getContext('2d');
        const gridBg = document.getElementById('grid-bg');
        const arena = document.getElementById('game-arena');

        function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
        window.addEventListener('resize', resize); resize();

        function seededRandom(seed) {
            var x = Math.sin(seed) * 10000;
            return x - Math.floor(x);
        }

        function getGameCycle() {
            const now = Date.now();
            const bettingWindow = 10000; // 10s
            const resultWindow = 5000;   // 5s
            
            // Calculating the total cycle. The flight length is determined by the crash point.
            // We use a modular approach to determine which "second" of the game we are in.
            const cycleBase = 30000; // 30s max potential cycle to keep seeds stable
            const cycleId = Math.floor(now / cycleBase);
            const elapsedInCycle = now % cycleBase;

            const seed = cycleId * 777;
            const houseEdge = 0.05; 
            let crashPoint;
            if (seededRandom(seed) < houseEdge) crashPoint = 1.00;
            else crashPoint = parseFloat((0.95 / (1 - seededRandom(seed + 1))).toFixed(2));

            // Time it takes to reach crashPoint at 1.07 growth rate:
            const flightDuration = (Math.log(crashPoint) / Math.log(1.07)) * 1000;
            const totalRoundTime = bettingWindow + flightDuration;
            const resetTime = totalRoundTime + resultWindow;

            if (elapsedInCycle < bettingWindow) {
                return { status: "WAITING", time: (bettingWindow - elapsedInCycle) / 1000, crashPoint, cycleId };
            } 
            else if (elapsedInCycle < totalRoundTime) {
                const flightTime = (elapsedInCycle - bettingWindow) / 1000;
                return { status: "RUNNING", mult: Math.pow(1.07, flightTime), elapsed: flightTime, crashPoint, cycleId };
            }
            else if (elapsedInCycle < resetTime) {
                return { status: "CRASHED", crashPoint, cycleId, cooldown: (resetTime - elapsedInCycle) / 1000 };
            }
            else {
                // Loop catch for betting start
                return { status: "WAITING", time: 0.1, crashPoint, cycleId };
            }
        }

        function gameLoop() {
            const cycle = getGameCycle();
            const mainMult = document.getElementById('main-mult');
            const statusText = document.getElementById('status-text');
            const hudStatus = document.getElementById('hud-status');

            document.getElementById('session-id').innerText = cycle.cycleId;

            if (cycle.status === "WAITING") {
                mainMult.innerHTML = `${cycle.time.toFixed(1)}s<small>TIME TO INVEST</small>`;
                mainMult.classList.remove('crashed');
                statusText.innerText = "ACCEPTING INVESTMENTS";
                hudStatus.innerText = "BETTING";
                arena.style.transform = "none";
                ctx.clearRect(0,0, canvas.width, canvas.height);
            } 
            else if (cycle.status === "RUNNING") {
                currentMult = cycle.mult;
                mainMult.innerHTML = `${currentMult.toFixed(2)}x<small>CLIMBING</small>`;
                statusText.innerText = "IN FLIGHT";
                hudStatus.innerText = "FLIGHT";
                
                // Camera Shake based on Multiplier
                const shake = Math.min(10, currentMult);
                arena.style.transform = `translate(${(Math.random()-0.5)*shake}px, ${(Math.random()-0.5)*shake}px)`;
                document.getElementById('hud-g').innerText = (1 + currentMult/5).toFixed(1);

                renderLine(cycle.elapsed, currentMult);
                
                if (hasBet) {
                    document.getElementById('cashout-preview').innerText = `₱${Math.floor(myBetAmt * currentMult).toLocaleString()}`;
                    if (parseFloat(document.getElementById('auto-cashout').value) <= currentMult) cashout();
                }
            } 
            else if (cycle.status === "CRASHED") {
                if (lastLoggedCycle !== cycle.cycleId) {
                    logHistory(cycle.crashPoint);
                    lastLoggedCycle = cycle.cycleId;
                }
                mainMult.innerHTML = `${cycle.crashPoint.toFixed(2)}x<small>CRASHED</small>`;
                mainMult.classList.add('crashed');
                statusText.innerText = "PREPARING NEXT SYNC";
                hudStatus.innerText = "COOLDOWN";
                arena.style.transform = "none";
                hasBet = false;
            }

            updateButtons(cycle.status);
            requestAnimationFrame(gameLoop);
        }

        function renderLine(elapsed, mult) {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            const scale = mult > 3 ? (3 / mult) : 1;
            const spacingX = 180 * scale, spacingY = 320 * scale;
            const headX = elapsed * spacingX, headY = (mult - 1) * spacingY;
            const cx = canvas.width * 0.35 - headX, cy = canvas.height * 0.75 + headY;
            document.getElementById('hud-coords').innerText = `${Math.floor(headX)},${Math.floor(headY)}`;

            ctx.save();
            ctx.translate(cx, cy);
            gridBg.style.transform = `perspective(1000px) rotateX(60deg) translateY(${(headY % 80)}px) translateX(${(cx % 80)}px)`;
            ctx.beginPath();
            ctx.lineWidth = 10 * scale; ctx.strokeStyle = '#D4AF37'; ctx.lineCap = 'round';
            ctx.shadowBlur = 15; ctx.shadowColor = 'rgba(212, 175, 55, 0.5)';
            ctx.moveTo(0, 0);
            for(let i=0; i <= elapsed; i+=0.1) {
                ctx.lineTo(i * spacingX, -(Math.pow(1.07, i) - 1) * spacingY);
            }
            ctx.stroke();
            ctx.shadowBlur = 30; ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(headX, -headY, 7 * scale, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function logHistory(val) {
            const bar = document.getElementById('history-log');
            const item = document.createElement('div');
            item.className = `hist-item ${val >= 2 ? 'hist-green' : 'hist-red'}`;
            item.innerText = val.toFixed(2) + "x";
            bar.prepend(item);
            if (bar.children.length > 12) bar.lastChild.remove();
        }

        window.placeBet = async () => {
            const cycle = getGameCycle();
            if (cycle.status !== "WAITING") return alert("Round In Progress");
            const amt = parseInt(document.getElementById('bet-amount').value);
            if (amt > balance || amt < 10) return alert("Verify Credits");
            await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: increment(-amt) });
            myBetAmt = amt; hasBet = true;
        };

        window.cashout = async () => {
            if (!hasBet || getGameCycle().status !== "RUNNING") return;
            const win = Math.floor(myBetAmt * currentMult);
            hasBet = false;
            await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: increment(win) });
            await addDoc(collection(db, "wallet_logs"), { uid: auth.currentUser.uid, type: "CRASH_WIN", amount: win, timestamp: serverTimestamp() });
        };

        function updateButtons(status) {
            const bBet = document.getElementById('btn-bet'), bCash = document.getElementById('btn-cashout'), bWait = document.getElementById('btn-waiting');
            bBet.style.display = "none"; bCash.style.display = "none"; bWait.style.display = "none";
            if (hasBet && status === "RUNNING") bCash.style.display = "block";
            else if (hasBet && status === "WAITING") { bWait.style.display = "block"; bWait.innerText = "INVESTED"; }
            else if (status === "WAITING") bBet.style.display = "block";
            else bWait.style.display = "block";
        }

        onAuthStateChanged(auth, user => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), snap => {
                    if(snap.exists()) {
                        balance = snap.data().balance || 0;
                        document.getElementById('display-balance').innerText = `₱${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                    }
                });
                gameLoop();
            } else { window.location.href = "/login/"; }
        });
    </script>
</body>
</html>
