<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus | Emergency Restore</title>
    <link href="https://fonts.googleapis.com/css2?family=Goldman&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #D4AF37; font-family: 'Goldman'; text-align: center; padding: 50px; }
        .status { margin-top: 20px; color: #fff; font-size: 0.8rem; }
        button { background: #D4AF37; color: #000; border: none; padding: 20px; border-radius: 10px; cursor: pointer; font-family: 'Goldman'; font-weight: bold; }
    </style>
</head>
<body>
    <h1>NEXUS PROTOCOL RECONSTRUCTION</h1>
    <p>This will automatically re-create your "Settings" and your "Admin Profile".</p>
    <button onclick="runRestore()">INITIALIZE DATABASE</button>
    <div id="logs" class="status"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.runRestore = async () => {
            const user = auth.currentUser;
            if (!user) return alert("Please log in to your site first so I can find your UID!");
            
            const log = (txt) => document.getElementById('logs').innerHTML += `<br> ${txt}`;
            
            try {
                // 1. Restore Crash Settings
                log("Building 'settings/crash'...");
                await setDoc(doc(db, "settings", "crash"), {
                    status: "WAITING",
                    history: [],
                    lastUpdate: serverTimestamp(),
                    crashPoint: 1.50
                });

                // 2. Restore Arena Settings
                log("Building 'settings/arena'...");
                await setDoc(doc(db, "settings", "arena"), {
                    isLocked: false,
                    payoutMultiplier: 1.90,
                    history: [],
                    currentFightId: "Fight #1"
                });

                // 3. Restore your Admin Profile
                log(`Restoring Admin Profile for UID: ${user.uid}...`);
                await setDoc(doc(db, "users", user.uid), {
                    username: "Admin",
                    level: 1,
                    role: "ADMIN",
                    balance:0,
                    uplinePath: [],
                    commissionRate: 10,
                    totalCommission: 0,
                    totalTurnover: 0,
                    createdAt: serverTimestamp()
                });

                log("<br><b>RESTORATION COMPLETE. REFRESH YOUR MAIN SITE.</b>");
            } catch (e) {
                log(`<span style="color:red">ERROR: ${e.message}</span>`);
            }
        };
    </script>
</body>
</html>
