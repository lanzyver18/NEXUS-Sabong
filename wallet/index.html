<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet | NEXUS</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --green: #00ff88; }
        
        .wallet-wrapper { max-width: 500px; margin: 20px auto; padding: 0 15px; }
        
        /* HEADER CARD */
        .wallet-card { 
            background: #0f0f0f; border-radius: 20px; border: 1px solid #222; 
            padding: 30px; margin-bottom: 25px; text-align: center; position: relative;
        }
        .balance-display { font-family: 'Goldman'; font-size: 2.2rem; color: var(--green); margin: 10px 0; cursor: pointer; transition: 0.3s; }
        .balance-display.blurred { filter: blur(10px); }
        .eye-btn { position: absolute; top: 20px; right: 25px; color: #444; cursor: pointer; font-size: 1.1rem; }

        /* TABS NAV */
        .wallet-tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .w-tab { 
            color: #555; font-size: 0.75rem; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; padding: 8px 0; border-bottom: 2px solid transparent; 
            transition: 0.2s; font-family: 'Goldman';
        }
        .w-tab.active { color: var(--gold); border-color: var(--gold); }

        /* CONTENT PANELS */
        .panel { background: #0f0f0f; border: 1px solid #222; border-radius: 15px; padding: 25px; display: none; }
        .panel.active { display: block; }

        /* BANK VAULT CARDS */
        .vault-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; scrollbar-width: none; }
        .vault-card { 
            min-width: 140px; background: #000; border: 1px solid #333; 
            padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.2s; text-align: left;
        }
        .vault-card:hover, .vault-card.selected { border-color: var(--gold); background: #111; }
        .vault-card small { color: var(--gold); font-size: 0.6rem; text-transform: uppercase; display: block; }
        .vault-card span { color: #eee; font-size: 0.8rem; font-weight: bold; margin-top: 4px; display: block; }

        /* FORM STYLING */
        .form-group { margin-bottom: 15px; text-align: left; }
        label { color: #555; font-size: 0.65rem; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        input, select { 
            width: 100%; padding: 16px; background: #000; border: 1px solid #333; 
            color: white; border-radius: 10px; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); }

        .btn-submit { 
            width: 100%; padding: 18px; background: var(--gold); color: black; 
            border: none; border-radius: 12px; font-weight: bold; font-family: 'Goldman'; 
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3); }

        .top-nav { position: relative; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px 12px 75px; background: #000; border-bottom: 2px solid #222; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo" style="color:var(--gold); font-family:'Goldman'; font-weight:bold; font-size:1.2rem;">NEXUS WALLET</div>
        <div style="color: var(--green); font-weight: bold; font-family: 'Goldman'; font-size: 0.9rem;" id="nav-bal">₱0.00</div>
    </nav>

    <div class="wallet-wrapper">
        
        <div class="wallet-card">
            <span class="eye-btn" onclick="toggleBlur()">👁️</span>
            <small style="color: #666; letter-spacing: 2px;">AVAILABLE CREDITS</small>
            <div class="balance-display" id="main-balance">₱0.00</div>
            <div style="font-size: 0.6rem; color: #444; letter-spacing: 1px;" id="player-id">ID: ---</div>
        </div>

        <div class="wallet-tabs">
            <div class="w-tab active" onclick="switchTab(this, 'withdraw')">Withdraw</div>
            <div class="w-tab" onclick="switchTab(this, 'revenue')">Revenue</div>
            <div class="w-tab" onclick="switchTab(this, 'vault')">Bank Vault</div>
        </div>

        <div id="withdraw" class="panel active">
            <label>QUICK SELECT FROM VAULT</label>
            <div class="vault-scroll" id="vault-items">
                </div>

            <div class="form-group">
                <label>Target Bank / Wallet</label>
                <select id="w-bank">
                    <option value="GCASH">GCASH</option>
                    <option value="MAYA">MAYA</option>
                    <option value="BDO">BDO</option>
                    <option value="GOTYME">GOTYME</option>
                </select>
            </div>

            <div class="form-group">
                <label>Transfer Amount</label>
                <input type="number" id="w-amount" placeholder="Min ₱100">
            </div>

            <button class="btn-submit" id="btn-withdraw">SUBMIT WITHDRAWAL</button>
        </div>

        <div id="revenue" class="panel">
            <div style="text-align: center; padding: 20px;">
                <label>TOTAL COMMISSION EARNED</label>
                <h2 style="color: var(--gold); font-family: 'Goldman'; margin: 10px 0;" id="rev-total">₱0.00</h2>
                <div style="background: #000; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-top: 15px;">
                    <small style="color: #555;">CURRENT RATE</small>
                    <div style="color: white; font-family: 'Goldman';" id="rev-rate">0%</div>
                </div>
            </div>
        </div>

        <div id="vault" class="panel">
            <h4 style="color: var(--gold); font-family: 'Goldman'; margin-top: 0;">ADD NEW ACCOUNT</h4>
            <div class="form-group">
                <input type="text" id="v-name" placeholder="Account Name (e.g. Ken Cruz)">
            </div>
            <div class="form-group">
                <input type="text" id="v-number" placeholder="Mobile / Account Number">
            </div>
            <button class="btn-submit" style="background: #222; color: var(--gold); border: 1px solid var(--gold);" onclick="saveToVault()">SAVE TO VAULT</button>
            <div id="vault-manager" style="margin-top: 20px;"></div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, getDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
        import { injectMenu } from "/menu.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseAuth = auth;
        window.firebaseDb = db;
        injectMenu();

        let myData = null;
        let selectedVaultAccount = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    myData = snap.data();
                    const bal = myData.balance || 0;
                    document.getElementById('main-balance').innerText = `₱${bal.toLocaleString()}`;
                    document.getElementById('nav-bal').innerText = `₱${bal.toLocaleString()}`;
                    document.getElementById('player-id').innerText = `ID: ${myData.username.toUpperCase()}`;
                    
                    // Update Revenue
                    document.getElementById('rev-total').innerText = `₱${(myData.totalCommission || 0).toLocaleString()}`;
                    document.getElementById('rev-rate').innerText = `${myData.commissionRate}%`;

                    renderVault();
                });
            } else { window.location.href = "/login/"; }
        });

        window.switchTab = (el, tabId) => {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.w-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        };

        window.toggleBlur = () => {
            document.getElementById('main-balance').classList.toggle('blurred');
        };

        window.saveToVault = async () => {
            const name = document.getElementById('v-name').value.trim();
            const num = document.getElementById('v-number').value.trim();
            const bank = document.getElementById('w-bank').value;
            if(!name || !num) return alert("Fill all fields");

            const vault = myData.vault || [];
            vault.push({ name, number: num, bank });
            await updateDoc(doc(db, "users", auth.currentUser.uid), { vault });
            alert("Added to Vault");
            document.getElementById('v-name').value = "";
            document.getElementById('v-number').value = "";
        };

        function renderVault() {
            const container = document.getElementById('vault-items');
            const manager = document.getElementById('vault-manager');
            const vault = myData.vault || [];
            
            container.innerHTML = vault.length ? "" : '<small style="color:#333">No saved accounts</small>';
            manager.innerHTML = "";

            vault.forEach((acc, i) => {
                // Main Withdrawal Scroll
                const card = document.createElement('div');
                card.className = "vault-card";
                card.innerHTML = `<small>${acc.bank}</small><span>${acc.name}</span>`;
                card.onclick = () => {
                    selectedVaultAccount = acc;
                    document.getElementById('w-bank').value = acc.bank;
                    document.querySelectorAll('.vault-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                };
                container.appendChild(card);

                // Manager View
                manager.innerHTML += `
                    <div style="background:#000; padding:15px; border-radius:10px; border:1px solid #222; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <small style="color:var(--gold)">${acc.bank}</small>
                            <div style="font-size:0.8rem; color:white;">${acc.name} - ${acc.number}</div>
                        </div>
                    </div>`;
            });
        }

        document.getElementById('btn-withdraw').onclick = async () => {
            const amt = parseInt(document.getElementById('w-amount').value);
            const bank = document.getElementById('w-bank').value;

            if(!amt || amt < 100) return alert("Min ₱100");
            if(amt > myData.balance) return alert("Insufficient balance");

            const accName = selectedVaultAccount ? selectedVaultAccount.name : "Manual Entry";
            const accNum = selectedVaultAccount ? selectedVaultAccount.number : "Check Records";

            if(confirm(`Withdraw ₱${amt} to ${bank}?`)) {
                await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: increment(-amt) });
                await addDoc(collection(db, "withdrawals"), {
                    uid: auth.currentUser.uid,
                    username: myData.username,
                    bank, accountName: accName, accountNumber: accNum,
                    amount: amt, status: "PENDING", timestamp: new Date()
                });
                alert("Withdrawal submitted!");
                location.reload();
            }
        };
    </script>
</body>
</html>
