<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Wallet | Premium</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --green: #00ff88; --bg-dark: #050505; --panel-bg: #0f0f0f; --red: #ff4444; }
        body { background: #000; overflow-x: hidden; padding-bottom: 100px; }
        
        .top-nav { position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #000; border-bottom: 2px solid #222; }

        .wallet-wrapper { max-width: 500px; margin: 20px auto; padding: 0 15px; }
        .wallet-card { background: linear-gradient(145deg, #121212, #080808); border-radius: 24px; border: 1px solid #222; padding: 35px 30px; margin-bottom: 25px; text-align: center; position: relative; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }

        .balance-display { font-family: 'Goldman'; font-size: 2.6rem; color: var(--green); margin: 8px 0; cursor: pointer; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); letter-spacing: -1px; filter: blur(15px); }
        .balance-display.visible { filter: blur(0); }

        .eye-btn { position: absolute; top: 22px; right: 25px; width: 24px; height: 24px; cursor: pointer; fill: #444; transition: 0.3s; }
        .eye-btn.active { fill: var(--green); }

        .wallet-tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .w-tab { color: #555; font-size: 0.65rem; font-weight: bold; cursor: pointer; text-transform: uppercase; padding: 12px 18px; border-radius: 12px; background: #111; transition: 0.3s; font-family: 'Goldman'; border: 1px solid #222; white-space: nowrap; }
        .w-tab.active { color: var(--gold); border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        .panel { background: var(--panel-bg); border: 1px solid #222; border-radius: 24px; padding: 25px; display: none; animation: fadeIn 0.4s ease; }
        .panel.active { display: block; }

        .vault-item { min-width: 140px; background: #000; border: 1px solid #222; padding: 15px; border-radius: 12px; cursor: pointer; text-align: left; transition: 0.2s; border-left: 4px solid #333; }
        .vault-item.selected { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }
        .vault-item small { color: var(--gold); font-size: 0.55rem; font-weight: bold; text-transform: uppercase; }
        .vault-item div { font-size: 0.8rem; margin-top: 4px; color: #eee; }

        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #1a1a1a; font-size: 0.75rem; }
        .amt-pos { color: var(--green); } .amt-neg { color: var(--red); }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 0.6rem; color: #555; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        input, select { width: 100%; padding: 16px; background: #000; border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); }
        
        .chip-row { display: flex; gap: 8px; margin: 10px 0 20px; overflow-x: auto; padding-bottom: 5px; }
        .chip { background: #1a1a1a; border: 1px solid #333; color: #777; padding: 8px 14px; border-radius: 8px; font-size: 0.65rem; cursor: pointer; font-family: 'Goldman'; transition: 0.2s; }
        .chip:hover { color: var(--gold); border-color: var(--gold); }

        .btn-submit { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-family: 'Goldman'; text-transform: uppercase; margin-top: 10px; cursor: pointer; transition: 0.3s; }
        .btn-submit:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

        @media (min-width: 900px) { .top-nav { padding-left: 20px !important; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(100px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo" style="color:var(--gold); font-family:'Goldman'; font-weight:bold; font-size:1.2rem;">NEXUS FINANCE</div>
        <div style="color: var(--green); font-weight: bold; font-family: 'Goldman';" id="nav-bal">₱0.00</div>
    </nav>

    <div class="wallet-wrapper">
        <div class="wallet-card">
            <svg class="eye-btn" id="eye-toggle" viewBox="0 0 24 24">
                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
            <small style="color: #666; letter-spacing: 3px; font-size: 0.6rem;">SECURE VAULT</small>
            <div class="balance-display" id="main-balance">₱0.00</div>
            <div id="player-id" style="font-size: 0.6rem; color: #444; letter-spacing: 1.5px; font-family: 'Goldman';">ID: ---</div>
        </div>

        <div class="wallet-tabs">
            <div class="w-tab active" onclick="switchTab(this, 'withdraw')">Withdraw</div>
            <div class="w-tab" onclick="switchTab(this, 'p2p')">Transfer</div>
            <div class="w-tab" onclick="switchTab(this, 'history')">Activity</div>
            <div class="w-tab" onclick="switchTab(this, 'vault')">Vault</div>
        </div>

        <!-- WITHDRAW PANEL -->
        <div id="withdraw" class="panel active">
            <label style="font-size: 0.6rem; color: #555; letter-spacing: 1px; display:block; margin-bottom:10px;">TARGET DESTINATION</label>
            <div id="vault-items" style="display:flex; gap:10px; overflow-x:auto; padding-bottom:15px; margin-bottom:10px; scrollbar-width:none;"></div>
            <div class="form-group">
                <label>Liquidation Amount</label>
                <div class="chip-row">
                    <div class="chip" onclick="setWAmount(500)">₱500</div>
                    <div class="chip" onclick="setWAmount(1000)">₱1,000</div>
                    <div class="chip" onclick="setWAmount(5000)">₱5,000</div>
                    <div class="chip" onclick="setWAmount('MAX')">MAX</div>
                </div>
                <input type="number" id="w-amount" placeholder="0.00">
            </div>
            <button class="btn-submit" id="btn-withdraw-action" style="background:var(--gold); color:black;">REQUEST SETTLEMENT</button>
        </div>

        <!-- P2P PANEL -->
        <div id="p2p" class="panel">
            <div class="form-group">
                <label>Target Node ID (Username)</label>
                <input type="text" id="p2p-target" placeholder="Recipient Codename" oninput="verifyP2PTarget(this.value)">
                <div id="p2p-verify-hint" style="font-size: 0.6rem; margin-top: 5px; font-weight: bold;"></div>
            </div>
            <div class="form-group">
                <label>Transfer Value</label>
                <input type="number" id="p2p-amount" placeholder="₱0.00">
            </div>
            <button class="btn-submit" id="btn-p2p" onclick="handleP2P()" style="background:var(--green); color:black;" disabled>EXECUTE P2P</button>
        </div>

        <!-- HISTORY PANEL -->
        <div id="history" class="panel">
            <div id="wallet-history-list" style="max-height: 400px; overflow-y: auto;"></div>
        </div>

        <!-- VAULT PANEL -->
        <div id="vault" class="panel">
            <div class="form-group">
                <label>Gateway</label>
                <select id="v-bank">
                    <option value="GCASH">GCASH</option>
                    <option value="MAYA">MAYA</option>
                    <option value="BDO">BDO</option>
                </select>
            </div>
            <div class="form-group">
                <label>Verified Name</label>
                <input type="text" id="v-name" placeholder="Legal account name">
            </div>
            <div class="form-group">
                <label>Account Reference</label>
                <input type="text" id="v-number" placeholder="Mobile or Card Number">
            </div>
            <button class="btn-submit" onclick="saveToVault()" style="background:#222; color:var(--gold); border:1px solid var(--gold);">SAVE TO VAULT</button>
            <div id="vault-manager" style="margin-top: 25px; border-top: 1px solid #222; padding-top: 20px;"></div>
        </div>
    </div>

    <script type="module">
        import { supabase } from "/supabase.js";
        import { injectMenu } from "/menu.js";

        let myData = null;
        let selectedAcc = null;
        let targetUid = null;

        injectMenu();

        async function initWallet() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { window.location.href = "/login/"; return; }

            const userId = session.user.id;

            const updateUI = (data) => {
                myData = data;
                const bal = parseFloat(data.balance || 0);
                document.getElementById('main-balance').innerText = `₱${bal.toLocaleString(undefined, {minimumFractionDigits:2})}`;
                document.getElementById('nav-bal').innerText = `₱${bal.toLocaleString()}`;
                document.getElementById('player-id').innerText = `ID: ${data.username.toUpperCase()}`;
                renderVault();
            };

            // Initial Profile Fetch
            const { data: profile } = await supabase.from('profiles').select('*').eq('id', userId).single();
            if (profile) updateUI(profile);

            // Real-time Balance
            supabase.channel('wallet-sync')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'profiles', filter: `id=eq.${userId}` }, 
                    payload => updateUI(payload.new)).subscribe();

            loadRecentActivity(userId);
        }

        window.verifyP2PTarget = async (val) => {
            const hint = document.getElementById('p2p-verify-hint');
            const btn = document.getElementById('btn-p2p');
            if(val.length < 3) { hint.innerText = ""; return; }
            
            const { data } = await supabase.from('profiles').select('id, username').eq('username', val.toLowerCase()).single();
            
            if(data && data.username !== myData.username) {
                targetUid = data.id;
                hint.innerText = `✓ IDENTIFIED: ${val.toUpperCase()}`;
                hint.style.color = "var(--green)";
                btn.disabled = false;
            } else {
                targetUid = null;
                hint.innerText = data?.username === myData.username ? "× SELF-TRANSFER BLOCKED" : "× NODE UNKNOWN";
                hint.style.color = "var(--red)";
                btn.disabled = true;
            }
        };

        async function loadRecentActivity(uid) {
            const { data: logs } = await supabase.from('wallet_logs').select('*').eq('user_id', uid).order('timestamp', { ascending: false }).limit(15);
            const list = document.getElementById('wallet-history-list');
            list.innerHTML = logs?.length ? "" : `<p style="text-align:center; color:#222; font-family:Goldman;">NO DATA TRAILS</p>`;
            
            logs?.forEach(l => {
                const isNeg = ["TRANSFER_OUT", "WITHDRAWAL"].includes(l.type);
                list.innerHTML += `
                    <div class="log-item">
                        <div>
                            <div style="font-weight:bold; color:#eee; font-size:0.6rem; font-family:Goldman;">${l.type.replace("_", " ")}</div>
                            <small style="color:#444;">${new Date(l.timestamp).toLocaleDateString()}</small>
                        </div>
                        <div class="${isNeg ? 'amt-neg' : 'amt-pos'}" style="font-family:'Goldman';">
                            ${isNeg ? '-' : '+'}₱${parseFloat(l.amount).toLocaleString()}
                        </div>
                    </div>`;
            });
        }

        window.switchTab = (el, id) => {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.w-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        };

        window.setWAmount = (val) => { document.getElementById('w-amount').value = (val === 'MAX') ? Math.floor(myData.balance) : val; };

        document.getElementById('eye-toggle').onclick = function() {
            this.classList.toggle('active');
            document.getElementById('main-balance').classList.toggle('visible');
        };

        window.saveToVault = async () => {
            const name = document.getElementById('v-name').value.trim();
            const num = document.getElementById('v-number').value.trim();
            const bank = document.getElementById('v-bank').value;
            if(!name || !num) return alert("All fields required.");
            
            // Supabase uses 'vault' JSONB column in profiles
            const vault = myData.vault || [];
            vault.push({ name, number: num, bank });
            await supabase.from('profiles').update({ vault }).eq('id', myData.id);
            
            document.getElementById('v-name').value = ""; 
            document.getElementById('v-number').value = "";
        };

        function renderVault() {
            const container = document.getElementById('vault-items');
            const manager = document.getElementById('vault-manager');
            const vault = myData.vault || [];
            container.innerHTML = vault.length ? "" : '<small style="color:#222;">NO SECURE ACCOUNTS</small>';
            manager.innerHTML = "";

            vault.forEach((acc, i) => {
                const card = document.createElement('div');
                card.className = `vault-item ${selectedAcc && selectedAcc.number === acc.number ? 'selected' : ''}`;
                card.innerHTML = `<small>${acc.bank}</small><div>${acc.name}</div>`;
                card.onclick = () => { selectedAcc = acc; renderVault(); };
                container.appendChild(card);

                manager.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; background:#000; padding:15px; border-radius:12px; margin-bottom:10px; border:1px solid #1a1a1a;">
                    <div style="font-size:0.7rem;"><span style="color:var(--gold)">${acc.bank}</span>: ${acc.number}</div>
                    <span style="color:var(--red); cursor:pointer; font-size:0.6rem; font-weight:bold; font-family:Goldman;" onclick="deleteVaultItem(${i})">WIPE</span>
                </div>`;
            });
        }

        window.deleteVaultItem = async (i) => {
            const v = [...myData.vault]; v.splice(i, 1);
            await supabase.from('profiles').update({ vault: v }).eq('id', myData.id);
        };

        window.handleP2P = async () => {
            const amt = parseFloat(document.getElementById('p2p-amount').value);
            if(isNaN(amt) || amt <= 0 || amt > myData.balance || !targetUid) return alert("Protocol Failure.");
            
            const { error } = await supabase.rpc('p2p_transfer', {
                sender_uid: myData.id,
                receiver_uid: targetUid,
                transfer_amt: amt,
                sender_name: myData.username,
                receiver_name: document.getElementById('p2p-target').value
            });

            if(error) alert(error.message);
            else { alert("Transfer Complete."); location.reload(); }
        };

        document.getElementById('btn-withdraw-action').onclick = async () => {
            const amt = parseFloat(document.getElementById('w-amount').value);
            if(isNaN(amt) || amt < 100 || amt > myData.balance || !selectedAcc) return alert("Min ₱100 / Select Account.");
            
            const { error } = await supabase.rpc('request_withdrawal', {
                user_uid: myData.id,
                u_name: myData.username,
                w_amt: amt,
                w_bank: selectedAcc.bank,
                w_acc_name: selectedAcc.name,
                w_acc_num: selectedAcc.number
            });

            if(error) alert(error.message);
            else { alert("Settlement Requested."); location.reload(); }
        };

        initWallet();
    </script>
</body>
</html>
