<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet | NEXUS</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .wallet-wrapper { max-width: 450px; margin: 40px auto; padding: 0 20px; }
        .wallet-card { background: #111; padding: 25px; border-radius: 16px; border: 1px solid #222; margin-bottom: 25px; text-align: center; }
        .gold-title { color: #D4AF37; text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; font-family: 'Goldman'; margin-top: 0; margin-bottom: 15px; }
        
        .id-box { background: #000; padding: 15px; border: 2px dashed #333; border-radius: 12px; margin: 15px 0; cursor: pointer; transition: 0.2s; }
        .id-box:hover { border-color: var(--gold); background: #050505; }
        .id-box code { font-size: 1.4rem; color: #D4AF37; font-family: 'Goldman', monospace; font-weight: bold; }

        /* SAVED ACCOUNTS CHIPS */
        .saved-accounts { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; justify-content: center; }
        .acc-chip { background: rgba(212, 175, 55, 0.1); border: 1px solid #333; color: #888; padding: 6px 12px; border-radius: 20px; font-size: 0.65rem; cursor: pointer; white-space: nowrap; }
        .acc-chip.active { border-color: var(--gold); color: var(--gold); }

        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; color: #555; font-size: 0.65rem; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        select, input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; transition: 0.3s; }
        select:focus, input:focus { border-color: #D4AF37; }
        
        .chip-row { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .chip { background: #222; border: 1px solid #333; color: #888; padding: 8px 12px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; white-space: nowrap; }
        .chip:hover { border-color: var(--gold); color: var(--gold); }

        .btn-withdraw { background: #D4AF37; color: black; width: 100%; padding: 16px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; font-family: 'Goldman'; }
        .pending-status { background: rgba(255, 170, 0, 0.1); border: 1px solid #ffaa00; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: none; text-align: left; }
        .top-nav { position: relative; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px 12px 75px; background: #000; border-bottom: 2px solid #222; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #D4AF37; color: black; padding: 10px 25px; border-radius: 30px; display: none; z-index: 1000; font-weight: bold; font-size: 0.8rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo" style="color:var(--gold); font-family:'Goldman'; font-weight:bold; font-size:1.2rem;">NEXUS WALLET</div>
        <div style="color: #00ff88; font-weight: bold; font-family: 'Goldman';">₱<span id="display-balance">0.00</span></div>
    </nav>

    <div class="wallet-wrapper">
        <div id="pending-container" class="pending-status">
            <small style="color:#ffaa00; font-weight:bold; text-transform:uppercase; letter-spacing:1px;">Ticket Active</small>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                <span id="pending-amt" style="color:white; font-weight:bold; font-family:'Goldman';">₱0.00</span>
                <span style="font-size:0.7rem; color:#888;" id="pending-bank">---</span>
            </div>
        </div>
        
        <div class="wallet-card">
            <h3 class="gold-title">ARENA IDENTITY</h3>
            <div class="id-box" onclick="copyUsername()">
                <code id="user-id">---</code>
            </div>
            <p style="font-size: 0.6rem; color: #444; text-transform: uppercase;">Tap to copy your ID for Cash-In requests</p>
        </div>

        <div class="wallet-card">
            <h3 class="gold-title">CASH-OUT REQUEST</h3>
            
            <div id="saved-profiles-container" class="saved-accounts">
                </div>

            <div class="form-group">
                <label>Channel</label>
                <select id="w-bank">
                    <option value="GCASH">GCASH</option>
                    <option value="MAYA">MAYA</option>
                    <option value="BDO">BDO</option>
                    <option value="GOTYME">GOTYME</option>
                </select>
            </div>

            <div class="form-group">
                <label>Account Holder Name</label>
                <input type="text" id="w-name" placeholder="Full Name">
            </div>

            <div class="form-group">
                <label>Account Number</label>
                <input type="text" id="w-number" placeholder="09XX or Card #">
            </div>

            <div class="form-group">
                <label>Amount</label>
                <div class="chip-row">
                    <div class="chip" onclick="setAmt(500)">₱500</div>
                    <div class="chip" onclick="setAmt(1000)">₱1K</div>
                    <div class="chip" onclick="setAmt(5000)">₱5K</div>
                    <div class="chip" onclick="setAmt('MAX')">ALL</div>
                </div>
                <input type="number" id="w-amount" placeholder="Min: ₱100">
            </div>

            <button class="btn-withdraw" id="btn-submit-w">SUBMIT WITHDRAWAL</button>
            <p style="font-size: 0.6rem; color: #444; margin-top: 10px;">Submitting will save this account to your profiles.</p>
        </div>

        <div class="wallet-card" style="border-color: #0084FF;">
            <h3 class="gold-title" style="color:#0084FF;">GET CREDITS</h3>
            <div class="form-group">
                <label style="text-align:center;">I want to Cash-In:</label>
                <input type="number" id="cashin-amt" placeholder="Enter desired amount" style="border-color: #0084FF33; text-align:center;">
            </div>
            <button onclick="requestCashIn()" style="background:#0084FF; color:white; width:100%; padding:15px; border-radius:10px; font-weight:bold; border:none; cursor:pointer; font-family:'Goldman';">REQUEST VIA FB</button>
        </div>
    </div>

    <div id="toast">ACTION SUCCESSFUL</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, addDoc, collection, query, where, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";
        import { injectMenu } from "/menu.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseAuth = auth;
        window.firebaseDb = db;
        injectMenu();

        let currentBal = 0;
        let myUser = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    const d = snap.data();
                    myUser = d.username;
                    currentBal = d.balance || 0;
                    document.getElementById('user-id').innerText = myUser.toUpperCase();
                    document.getElementById('display-balance').innerText = currentBal.toLocaleString(undefined, {minimumFractionDigits: 2});
                    loadSavedProfiles();
                });

                onSnapshot(query(collection(db, "withdrawals"), where("uid", "==", user.uid), where("status", "==", "PENDING")), (snap) => {
                    const container = document.getElementById('pending-container');
                    if (!snap.empty) {
                        const d = snap.docs[0].data();
                        container.style.display = "block";
                        document.getElementById('pending-amt').innerText = `₱${d.amount.toLocaleString()}`;
                        document.getElementById('pending-bank').innerText = d.bank;
                    } else { container.style.display = "none"; }
                });
            } else { window.location.href = "/login/"; }
        });

        // SAVED PROFILES LOGIC
        function loadSavedProfiles() {
            const profiles = JSON.parse(localStorage.getItem(`nexus_profiles_${myUser}`)) || [];
            const container = document.getElementById('saved-profiles-container');
            container.innerHTML = profiles.length ? "" : "<small style='color:#333'>No saved accounts</small>";
            profiles.forEach((p, index) => {
                const chip = document.createElement('div');
                chip.className = 'acc-chip';
                chip.innerText = `${p.bank}: ${p.number.slice(-4)}`;
                chip.onclick = () => {
                    document.getElementById('w-bank').value = p.bank;
                    document.getElementById('w-name').value = p.name;
                    document.getElementById('w-number').value = p.number;
                    showToast("Account Loaded");
                };
                container.appendChild(chip);
            });
        }

        function saveProfile(bank, name, number) {
            let profiles = JSON.parse(localStorage.getItem(`nexus_profiles_${myUser}`)) || [];
            const exists = profiles.find(p => p.number === number);
            if (!exists) {
                profiles.push({ bank, name, number });
                localStorage.setItem(`nexus_profiles_${myUser}`, JSON.stringify(profiles.slice(-3)));
                loadSavedProfiles();
            }
        }

        window.setAmt = (val) => {
            document.getElementById('w-amount').value = (val === 'MAX') ? Math.floor(currentBal) : val;
        };

        window.requestCashIn = () => {
            const amt = document.getElementById('cashin-amt').value || "0";
            const msg = `Hi Agent! My Arena ID is ${myUser.toUpperCase()}. I want to Cash-In ₱${amt}. Please send instructions.`;
            window.open(`https://m.me/YOUR_PAGE?text=${encodeURIComponent(msg)}`, '_blank');
        };

        document.getElementById('btn-submit-w').onclick = async () => {
            const bank = document.getElementById('w-bank').value;
            const name = document.getElementById('w-name').value.trim();
            const num = document.getElementById('w-number').value.trim();
            const amt = parseInt(document.getElementById('w-amount').value);

            if (!name || !num || isNaN(amt) || amt < 100) return alert("Fill all fields correctly.");
            if (amt > currentBal) return alert("Insufficient balance!");

            if(confirm(`Confirm ₱${amt} Withdrawal? Credits will be locked.`)) {
                try {
                    await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: increment(-amt) });
                    await addDoc(collection(db, "withdrawals"), {
                        uid: auth.currentUser.uid, username: myUser, bank, accountName: name, accountNumber: num, amount: amt, status: "PENDING", timestamp: new Date()
                    });
                    saveProfile(bank, name, num);
                    showToast("Withdrawal Submitted!");
                    setTimeout(() => location.reload(), 1500);
                } catch (e) { alert("Submission error."); }
            }
        };

        window.copyUsername = () => {
            navigator.clipboard.writeText(myUser.toUpperCase());
            showToast("ID Copied");
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = "block";
            setTimeout(() => t.style.display = "none", 2000);
        }
    </script>
</body>
</html>
