<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet | NEXUS Sabong</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .wallet-card { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; text-align: center; }
        .uid-box { background: #000; padding: 15px; border: 1px dashed var(--gold); border-radius: 8px; margin: 15px 0; cursor: pointer; position: relative; }
        .uid-box code { color: var(--gold); font-family: monospace; font-size: 1rem; }
        .agent-btn { display: block; width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; transition: 0.2s; }
        .messenger { background: #0084FF; color: white; }
        .telegram { background: #229ED9; color: white; }
        .copy-popup { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 10px 20px; border-radius: 20px; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="/" style="color: var(--gold); text-decoration: none;">← ARENA</a>
        <div class="balance-box">₱<span id="display-balance">0.00</span></div>
    </nav>

    <div style="max-width: 450px; margin: auto; padding: 20px;">
        
        <div class="wallet-card">
            <h3 style="color: var(--gold); margin-top: 0;">MY PLAYER ID</h3>
            <p class="text-muted">Click the box below to copy your ID. Send this to your Agent to Cash-In or Cash-Out.</p>
            <div class="uid-box" onclick="copyUID()">
                <code id="user-id">LOADING...</code>
                <div style="font-size: 0.6rem; color: #555; margin-top: 5px;">TAP TO COPY ID</div>
            </div>
        </div>

        <div class="wallet-card">
            <h3 style="color: var(--gold); margin-top: 0;">CONTACT AGENT</h3>
            <p class="text-muted">Message an official agent to process your transaction via GCash or Maya.</p>
            
            <a href="https://m.me/YOUR_FB_PAGE" target="_blank" class="agent-btn messenger">
                CASH-IN / WITHDRAW VIA FB
            </a>
            
            <a href="https://t.me/YOUR_TG_USERNAME" target="_blank" class="agent-btn telegram">
                CASH-IN / WITHDRAW VIA TELEGRAM
            </a>
        </div>

    </div>

    <div id="copy-toast" class="copy-popup">ID COPIED!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a",
            measurementId: "G-W2B0R09D8L"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-id').innerText = user.uid;
                // Live Balance Listener
                onSnapshot(doc(db, "users", user.uid), (snapshot) => {
                    if (snapshot.exists()) {
                        const bal = snapshot.data().balance || 0;
                        document.getElementById('display-balance').innerText = bal.toLocaleString(undefined, {minimumFractionDigits: 2});
                    }
                });
            } else { window.location.href = "/login/"; }
        });

        // Copy Function
        window.copyUID = () => {
            const uid = document.getElementById('user-id').innerText;
            navigator.clipboard.writeText(uid).then(() => {
                const toast = document.getElementById('copy-toast');
                toast.style.display = "block";
                setTimeout(() => { toast.style.display = "none"; }, 2000);
            });
        };
    </script>
</body>
</html>
