<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet | NEXUS Sabong</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        /* CSS TO FIX THE "WONKY" ALIGNMENT */
        .wallet-wrapper {
            max-width: 450px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .wallet-card {
            background: #151515;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #222;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .gold-title {
            color: #D4AF37;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 10px;
        }

        /* THE ID BOX FIX */
        .id-box {
            background: #000;
            padding: 20px;
            border: 2px dashed #333;
            border-radius: 12px;
            margin: 20px 0;
            cursor: pointer;
            transition: 0.3s;
        }
        .id-box:hover { border-color: #D4AF37; }
        .id-box code { 
            font-size: 1.6rem; 
            color: #D4AF37; 
            font-family: 'Courier New', Courier, monospace; 
            font-weight: bold;
        }
        .tap-hint { font-size: 0.65rem; color: #555; margin-top: 10px; letter-spacing: 1px; }

        /* THE BUTTON FIX (No more touching!) */
        .agent-container {
            display: flex;
            flex-direction: column;
            gap: 15px; /* THE GAP YOU WERE MISSING */
            margin-top: 25px;
        }

        .btn-agent {
            display: block;
            padding: 18px;
            border-radius: 10px;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            border: none;
            color: white;
            text-transform: uppercase;
        }

        .btn-messenger { background: #0084FF; box-shadow: 0 4px 15px rgba(0, 132, 255, 0.2); }
        .btn-telegram { background: #229ED9; box-shadow: 0 4px 15px rgba(34, 158, 217, 0.2); }

        .btn-agent:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .btn-agent:active { transform: translateY(0); }

        /* TOAST NOTIFICATION */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #D4AF37; color: black; padding: 12px 25px;
            border-radius: 30px; font-weight: bold; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="/" style="color: #D4AF37; text-decoration: none; font-weight: bold;">← ARENA</a>
        <div class="balance-box">₱<span id="display-balance">0.00</span></div>
    </nav>

    <div class="wallet-wrapper">
        
        <div class="wallet-card">
            <h3 class="gold-title">MY PLAYER ID</h3>
            <p class="text-muted" style="font-size: 0.85rem;">Give this Username to your Agent to load or withdraw credits.</p>
            <div class="id-box" onclick="copyUsername()">
                <code id="user-id">LOADING...</code>
                <div class="tap-hint">TAP TO COPY USERNAME</div>
            </div>
        </div>

        <div class="wallet-card">
            <h3 class="gold-title">CONTACT AGENT</h3>
            <p class="text-muted" style="font-size: 0.85rem;">Message an official agent to process your GCash or Maya transaction.</p>
            
            <div class="agent-container">
                <a href="https://m.me/YOUR_FB_PAGE" target="_blank" class="btn-agent btn-messenger">
                    CASH-IN / WITHDRAW (FB)
                </a>
                
                <a href="https://t.me/YOUR_TG_USERNAME" target="_blank" class="btn-agent btn-telegram">
                    CASH-IN / WITHDRAW (TG)
                </a>
            </div>
        </div>

    </div>

    <div id="toast">USERNAME COPIED!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a",
            measurementId: "G-W2B0R09D8L"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Fetch Username from Firestore
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    const username = userSnap.data().username || "NO_NAME";
                    document.getElementById('user-id').innerText = username.toUpperCase();
                } else {
                    document.getElementById('user-id').innerText = "ERROR";
                }

                // Live Balance Listener
                onSnapshot(userRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const bal = snapshot.data().balance || 0;
                        document.getElementById('display-balance').innerText = bal.toLocaleString(undefined, {
                            minimumFractionDigits: 2,
                            maximumFractionDigits: 2
                        });
                    }
                });
            } else {
                window.location.href = "/login/";
            }
        });

        // Copy Username Function
        window.copyUsername = () => {
            const username = document.getElementById('user-id').innerText;
            if(username === "LOADING..." || username === "ERROR") return;
            
            navigator.clipboard.writeText(username).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = "block";
                setTimeout(() => { toast.style.display = "none"; }, 2000);
            });
        };
    </script>
</body>
</html>
