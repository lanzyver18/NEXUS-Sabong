<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | NEXUS</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --gold-dark: #aa8c2c; }
        body.auth-page { 
            background: #050505; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        .auth-card { 
            background: linear-gradient(145deg, #0f0f0f, #080808);
            padding: 40px; 
            border-radius: 24px; 
            border: 1px solid #222; 
            width: 100%; 
            max-width: 380px; 
            text-align: center; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }
        .logo { font-family: 'Goldman', sans-serif; color: var(--gold); font-size: 2.2rem; margin-bottom: 5px; letter-spacing: 2px; }
        
        .input-group { text-align: left; margin-bottom: 18px; position: relative; }
        .input-group label { font-size: 0.65rem; color: #555; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; }
        
        input { 
            width: 100%; padding: 14px; background: #000; border: 1px solid #333; 
            color: white; border-radius: 10px; box-sizing: border-box; transition: 0.3s;
            font-size: 0.9rem;
        }
        input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }

        .availability-hint { font-size: 0.6rem; margin-top: 5px; position: absolute; right: 0; top: 0; }
        .available { color: #00ff88; }
        .taken { color: #ff4444; }

        .toggle-pass { position: absolute; right: 12px; bottom: 12px; cursor: pointer; color: #444; font-size: 0.7rem; font-weight: bold; }

        .tier-badge {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--gold);
            font-size: 0.7rem;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: none;
            font-family: 'Goldman', sans-serif;
            letter-spacing: 1px;
            animation: fadeIn 0.5s ease;
        }
        
        .strength-meter { height: 4px; background: #1a1a1a; margin-top: 8px; border-radius: 2px; overflow: hidden; }
        .strength-bar { height: 100%; width: 0%; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        .btn-action.gold { 
            width: 100%; padding: 18px; font-weight: bold; font-size: 0.95rem;
            background: linear-gradient(to right, var(--gold-dark), var(--gold));
            color: black; border: none; border-radius: 12px;
            font-family: 'Goldman', sans-serif; cursor: pointer; transition: 0.3s;
            margin-top: 15px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-action.gold:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.2); }
        .btn-action.gold:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="logo">NEXUS</div>
        <h2 style="font-size: 0.7rem; letter-spacing: 3px; color: #444; margin-bottom: 25px; text-transform: uppercase;">Recruitment Center</h2>
        
        <div id="tier-preview" class="tier-badge">
            JOINING AS: <span id="assigned-role-text">PLAYER</span>
        </div>

        <p id="ref-status" style="font-size: 0.75rem; color: #666; margin-bottom: 20px;">Register a unique Arena ID to begin.</p>
        
        <div class="input-group">
            <label>Arena Username</label>
            <input type="text" id="reg-username" placeholder="e.g. NexusWarrior" maxlength="15" autocomplete="off">
            <span id="avail-status" class="availability-hint"></span>
        </div>

        <div class="input-group">
            <label>Security Password</label>
            <input type="password" id="reg-pass" placeholder="Min. 6 characters">
            <span class="toggle-pass" onclick="togglePass()">SHOW</span>
            <div class="strength-meter"><div id="strength-bar" class="strength-bar"></div></div>
        </div>
        
        <button class="btn-action gold" id="btn-register">REGISTER & ENTER</button>
        
        <p class="auth-footer" style="margin-top: 30px; font-size: 0.8rem; color: #555;">
            Already have an ID? <a href="/login/" style="color: var(--gold); text-decoration: none; font-weight: bold; margin-left: 5px;">Sign In</a>
        </p>
    </div>

    <script type="module">
        import { supabase } from "/supabase.js";

        // 6-TIER HIERARCHY
        const TIERS = [
            { role: "ADMIN", level: 1 },
            { role: "OPERATOR", level: 2 },
            { role: "INCO", level: 3 },
            { role: "SUBOP", level: 4 },
            { role: "AGENT", level: 5 },
            { role: "PLAYER", level: 6 }
        ];

        const urlParams = new URLSearchParams(window.location.search);
        const referrerId = urlParams.get('ref');
        const userInp = document.getElementById('reg-username');
        const passInp = document.getElementById('reg-pass');
        const btn = document.getElementById('btn-register');

        let assignedRole = "PLAYER";
        let assignedLevel = 6;
        let uplinePath = [];

        // Verify Referral and determine Rank
        async function checkReferral() {
            if (referrerId) {
                try {
                    const { data: refData, error } = await supabase
                        .from('profiles')
                        .select('username, role, level, upline_path')
                        .eq('id', referrerId)
                        .single();

                    if (refData) {
                        const currentTierIndex = TIERS.findIndex(t => t.role === refData.role);
                        const nextTier = TIERS[currentTierIndex + 1] || TIERS[5];
                        
                        assignedRole = nextTier.role;
                        assignedLevel = nextTier.level;
                        uplinePath = [...(refData.upline_path || []), referrerId];

                        document.getElementById('ref-status').innerHTML = `Recruited by <b>${refData.username.toUpperCase()}</b>`;
                        document.getElementById('tier-preview').style.display = "block";
                        document.getElementById('assigned-role-text').innerText = assignedRole.replace("_", " ");
                    }
                } catch (e) { console.warn("Referral ID inactive."); }
            }
        }
        checkReferral();

        // Real-time Username Availability
        let checkTimeout;
        userInp.oninput = () => {
            const val = userInp.value.trim().toLowerCase();
            const hint = document.getElementById('avail-status');
            hint.innerHTML = "";
            clearTimeout(checkTimeout);
            
            if (val.length < 4) return;
            
            checkTimeout = setTimeout(async () => {
                const { data } = await supabase
                    .from('profiles')
                    .select('username')
                    .eq('username', val)
                    .maybeSingle();

                if (data) {
                    hint.innerHTML = "TAKEN"; hint.className = "availability-hint taken";
                } else {
                    hint.innerHTML = "AVAILABLE"; hint.className = "availability-hint available";
                }
            }, 500);
        };

        // Password Strength Logic
        passInp.oninput = () => {
            const p = passInp.value;
            const bar = document.getElementById('strength-bar');
            let s = 0;
            if (p.length > 5) s += 33;
            if (/[A-Z]/.test(p)) s += 33;
            if (/[0-9]/.test(p)) s += 34;
            bar.style.width = s + "%";
            bar.style.background = s < 40 ? "#ff4444" : s < 80 ? "#ffaa00" : "#00ff88";
        };

        window.togglePass = () => {
            const type = passInp.type === 'password' ? 'text' : 'password';
            passInp.type = type;
            document.querySelector('.toggle-pass').innerText = type === 'password' ? 'SHOW' : 'HIDE';
        };

        btn.onclick = async () => {
            const user = userInp.value.trim().toLowerCase();
            const pass = passInp.value;

            if(user.length < 4) return alert("Username too short (Min 4 characters).");
            if(pass.length < 6) return alert("Password too weak (Min 6 characters).");
            if(document.getElementById('avail-status').innerText === "TAKEN") return alert("Username taken.");

            btn.disabled = true;
            btn.innerText = "AUTHENTICATING...";

            // Create Supabase Auth User
            const { data, error } = await supabase.auth.signUp({
                email: `${user}@nexus-sabong.com`,
                password: pass,
                options: {
                    data: {
                        username: user,
                        role: assignedRole,
                        level: assignedLevel,
                        upline_id: referrerId || null,
                        upline_path: uplinePath
                    }
                }
            });

            if (error) {
                alert(error.message);
                btn.disabled = false;
                btn.innerText = "REGISTER & ENTER";
            } else {
                // Success - the PostgreSQL trigger 'handle_new_user' will automatically 
                // handle the creation of the public.profiles entry.
                window.location.href = "/";
            }
        };
    </script>
</body>
</html>
