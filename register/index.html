<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | NEXUS</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="logo">NEXUS</div>
        <h2 id="reg-title">CREATE ACCOUNT</h2>
        <p class="text-muted" id="ref-status">Choose a unique name to use as your ID.</p>
        
        <input type="text" id="reg-username" placeholder="Enter Username (e.g. BossKenny)">
        <input type="password" id="reg-pass" placeholder="Create Password">
        
        <button class="btn-action gold" id="btn-register">REGISTER & ENTER</button>
        <p class="auth-footer">Existing player? <a href="/login/">Login here</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBvOw8HrMhZD0aYSHqFdE196ZITdYBU3Q",
            authDomain: "nexus-sabong.firebaseapp.com",
            projectId: "nexus-sabong",
            storageBucket: "nexus-sabong.firebasestorage.app",
            messagingSenderId: "421723311",
            appId: "1:421723311:web:1780f179e7c2a7cc0e285a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Defined Hierarchy with corresponding Levels
        const TIERS = [
            { role: "ADMIN", level: 1 },
            { role: "OPERATOR", level: 2 },
            { role: "SUB_OPERATOR", level: 3 },
            { role: "INCO", level: 4 },
            { role: "MASTER_AGENT", level: 5 },
            { role: "SUB_AGENT", level: 6 },
            { role: "PLAYER", level: 7 }
        ];

        // 1. URL REFERRAL DETECTION
        const urlParams = new URLSearchParams(window.location.search);
        const referrerUid = urlParams.get('ref');

        async function checkReferral() {
            if (referrerUid) {
                try {
                    const refSnap = await getDoc(doc(db, "users", referrerUid));
                    if (refSnap.exists()) {
                        const refData = refSnap.data();
                        document.getElementById('ref-status').innerHTML = `You are being recruited by <b>${refData.username.toUpperCase()}</b>`;
                        document.getElementById('ref-status').style.color = "#D4AF37";
                    }
                } catch (e) { console.log("Referral invalid"); }
            }
        }
        checkReferral();

        document.getElementById('btn-register').onclick = async () => {
            const user = document.getElementById('reg-username').value.trim().toLowerCase();
            const pass = document.getElementById('reg-pass').value;

            if(user.length < 4) return alert("Username too short!");
            if(pass.length < 6) return alert("Password must be at least 6 characters.");

            try {
                // Determine Upline, Role, and Level
                let uplineId = "SYSTEM";
                let uplinePath = [];
                let assignedRole = "PLAYER";
                let assignedLevel = 7;

                if (referrerUid) {
                    const refSnap = await getDoc(doc(db, "users", referrerUid));
                    if (refSnap.exists()) {
                        const refData = refSnap.data();
                        uplineId = referrerUid;
                        
                        // Path inheritance: All parents + the person who invited them
                        uplinePath = [...(refData.uplinePath || []), referrerUid];
                        
                        // Logic: Find current index in TIERS and move down by 1
                        const currentTierIndex = TIERS.findIndex(t => t.role === refData.role);
                        const nextTier = TIERS[currentTierIndex + 1] || TIERS[TIERS.length - 1];
                        
                        assignedRole = nextTier.role;
                        assignedLevel = nextTier.level;
                    }
                }

                const fakeEmail = `${user}@nexus-sabong.com`;
                const userCredential = await createUserWithEmailAndPassword(auth, fakeEmail, pass);
                
                // FINAL DATABASE SCHEMA
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    uid: userCredential.user.uid,
                    username: user,
                    role: assignedRole,
                    level: assignedLevel, // CRITICAL: Used by menu.js for admin visibility
                    commissionRate: 0, 
                    uplineId: uplineId,
                    uplinePath: uplinePath, // CRITICAL: Used by payout engine for spreads
                    balance: 0,
                    totalTurnover: 0,
                    isAdmin: (assignedLevel === 1), // Legacy support
                    createdAt: new Date()
                });

                window.location.href = "/";
            } catch (error) { 
                console.error(error);
                alert("Username taken or error during registration."); 
            }
        };
    </script>
</body>
</html>
